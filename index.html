 título original: \"Quarterly Report March 2026\" (ASX/LSE/JSE)", "source_url": "https://www.south32.net/docs/default-source/all-financial-results/quarterly-report-march-2026.pdf", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**South32 — Relatório de Produção do Trimestre encerrado em Março de 2026 (3T FY26 / 9M FY26)**\n\nAprovado por Graham Kerr, CEO, em 22/04/2026 [PR]. Relatório operacional — South32 não publica receita/EBITDA/lucro trimestralmente, só semestral/anual.\n\n**Caixa e capital**\n- Caixa líquido aumentou US$121M no trimestre, para US$96M [PR]\n- Investimento de crescimento de US$158M no projeto Hermosa (Taylor zinc-lead-silver); US$496M nos 9M FY26 [PR]\n\n**Retornos a acionistas**\n- Buyback on-market: US$35M nos 9M FY26; programa ampliado em fevereiro para US$2,6B, com US$209M restantes [PR]\n- Dividendo ordinário interino de US$175M pago após o fechamento do trimestre [PR]\n\n**Produção por operação (9M YTD FY26 vs guidance FY26e)**\n- Worsley Alumina: 2.779kt (guidance 3.750kt, 74%) [PR]\n- Brazil Alumina: recorde de 1.060kt (+5% a/a), guidance 78% atingido [PR]\n- Hillside Aluminium: 538kt, guidance 75% atingido, testando capacidade técnica máxima com preços de alumínio mais altos [PR]\n- Sierra Gorda (cobre): 67,2kt eq., guidance 78% atingido; 3T caiu 9% por chuvas fortes [PR]\n- Australia Manganese: 2.249kwmt (+252% a/a); guidance FY26 revisada 6% para baixo por níveis elevados de água no site [PR]\n\n**Eventos**\n- Fatalidade em Worsley Alumina em 14/03/2026 (Simon Mukwarami), trabalhos não críticos suspensos temporariamente [PR]\n- Conflito no Oriente Médio elevou fretes globais e preço de insumos (soda cáustica) [PR]", "conference_call_summary": "Sem teleconferência associada a relatórios trimestrais de produção (só nos releases semestral/anual). Citação do CEO Graham Kerr: \"Our operating performance, combined with favourable commodity price tailwinds, generated net cash generation of US$121M in the March quarter.\"\n^Tradução livre: \"Nosso desempenho operacional, combinado com ventos favoráveis de preços de commodities, gerou geração de caixa líquido de US$121M no trimestre de março.\"", "commodity_commentary": "A Reuters cobriu o resultado do primeiro semestre do ano fiscal de 2026 da South32, divulgado em 12 de fevereiro de 2026, destacando que o lucro subjacente superou as estimativas dos analistas [Reuters]. Segundo a agência, o lucro subjacente somou US$ 435 milhões, alta de 16% ante o mesmo período do ano anterior e acima do consenso de US$ 386,6 milhões, enquanto o EBITDA subjacente cresceu 9%, para US$ 1,1 bilhão [Reuters]. A Reuters atribuiu o avanço a preços mais altos de cobre, prata e alumínio e a custos controláveis menores [Reuters].\n\nDe acordo com a agência, a South32 reafirmou que colocaria a planta de alumínio de Mozal, em Moçambique, em regime de manutenção a partir de março, após a seca ter comprometido o fornecimento de energia — decisão que não impediu a alta das ações, que chegaram a subir 5% no pregão [Reuters]. A Reuters também registrou reações de analistas: o Citi elevou o preço-alvo mantendo recomendação neutra, e o UBS elevou a recomendação para compra [Reuters].\n\nMais recentemente, em julho de 2026, a Bloomberg noticiou que o novo CEO da South32, Matt Daley, anunciou a venda da maior parte do portfólio de alumínio para a Alcoa por até US$ 5,6 bilhões, redirecionando a companhia para cobre e zinco, que passam a responder por cerca de 85% do EBITDA pro-forma [Bloomberg]. A operação inclui distribuição de dividendo especial de cerca de US$ 500 milhões e foi anunciada no primeiro dia de Daley no cargo [Bloomberg]."}, "generated_by": "claude-research", "generated_at": "2026-07-07T12:00:00Z", "status": "summarized", "note_for_reviewer": "Relatório de produção trimestral — sem receita/EBITDA/lucro consolidados (South32 só publica isso semestralmente). Nenhum ID de anúncio ASX localizado.", "commentary_sources": [{"outlet": "Reuters", "title": "Australia's South32 posts 16% rise in first-half profit", "url": "https://www.investing.com/news/stock-market-news/australias-south32-posts-16-rise-in-firsthalf-profit-4501347", "captured_at": "2026-07-07T00:00:00Z"}, {"outlet": "Bloomberg", "title": "South32's New CEO Looks to Focus on Copper After Aluminum Deal", "url": "https://www.bloomberg.com/news/articles/2026-07-01/south32-s-new-ceo-looks-to-focus-on-copper-after-aluminum-deal", "captured_at": "2026-07-07T00:00:00Z"}]}, "norsk-hydro": {"company_id": "norsk-hydro", "accession_number": null, "company_name": "Norsk Hydro ASA", "commodities": ["aluminum", "alumina", "bauxite"], "document_type": "earnings", "document_type_label": "Earnings Completo (Relatório do Primeiro Trimestre)", "sources": [{"filename": "first-quarter-report-2026.pdf", "label": "Relatório trimestral oficial — \"First Quarter Report 2026\" (aprovado 28/04/2026)", "source_url": "https://www.hydro.com/globalassets/06-investors/reports-and-presentations/quarterly-reports/2026/q1a0n5lk/first-quarter-report-2026.pdf", "captured_at": "2026-07-07T00:00:00Z"}, {"filename": "hydros-first-quarter-2026", "label": "Press release oficial — \"Hydro's first quarter 2026: Strong results reflect solid operational performance\"", "source_url": "https://www.hydro.com/en/global/media/news/2026/hydros-first-quarter-2026-strong-results-reflect-solid-operational-performance/", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Resultados do 1T2026 (encerrado 31/03/2026), divulgado 29/04/2026 — valores em NOK**\n\n- Receita: NOK 50.388 milhões, queda de 12% vs NOK 57.094 milhões no 1T25 [IP]\n- EBITDA ajustado: NOK 8.668 milhões, queda de 9% vs NOK 9.516 milhões no 1T25 [PR][IP]\n- Lucro líquido: NOK 4.341 milhões, ante NOK 5.861 milhões no 1T25 [IP]\n- LPA ajustado: NOK 2,07, alta de 27% vs NOK 1,63 no 1T25 [PR][IP]\n\n**Fluxo de caixa e balanço**\n- Fluxo de caixa livre negativo em NOK 4 bilhões, por aumento de capital de giro [PR]\n- Dívida líquida subiu de NOK 9,7 bi para NOK 12,9 bi [PR][IP]\n- RoaCE ajustado (12 meses): 10,1% [PR]\n\n**Segmentos (EBITDA ajustado)**\n- Bauxite & Alumina: NOK 747M, queda de 85% a/a — preço de alumina caiu para US$345/t (de US$587/t) [IP]\n- Aluminium Metal: NOK 5.034M, alta de 98% a/a — preço LME realizado US$2.929/t (+15% a/a) [IP]\n- Metal Markets: NOK 541M (vs -NOK 14M no 1T25) — melhores resultados de reciclagem desde 2023 [PR][IP]\n\n**Marcos**\n- Comissionamento da instalação de teste HalZero (nova tecnologia de alumínio) [PR]\n- Fatalidade de contratado na refinaria Alunorte (Brasil) em 30/03/2026, sob investigação [PR]", "conference_call_summary": "Nenhuma transcrição completa localizada. Citação do CEO Eivind Kallevik: \"Strong operational performance in our upstream and recycling businesses, combined with favorable metal prices, drove a strong first quarter.\"\n^Tradução livre: \"Forte desempenho operacional em nossos negócios upstream e de reciclagem, combinado com preços favoráveis de metais, impulsionou um primeiro trimestre forte.\"", "commodity_commentary": "Segundo a Reuters, a Norsk Hydro reportou lucro operacional do primeiro trimestre de 2026 acima do esperado, divulgado em 29 de abril, à medida que a guerra no Oriente Médio apertou o mercado global de alumínio e elevou os preços do metal [Reuters]. O EBITDA ajustado somou 8,67 bilhões de coroas norueguesas, contra expectativa média de 7,13 bilhões [Reuters].\n\nA Reuters destacou que preços e volumes maiores de metal mais do que compensaram a fraqueza nos preços de alumina e a queda na geração de energia [Reuters]. O EBITDA ajustado do segmento de Alumínio Metálico quase dobrou na comparação anual [Reuters]. O contexto de mercado citado pela imprensa é o conflito no Oriente Médio: a planta de alumínio no Catar operou com cerca de 40% de corte de produção, e as perdas de produção no Golfo Pérsico somaram cerca de 3 milhões de toneladas, contribuindo para um déficit global que levou o preço de três meses na LME de US$ 2.995 para US$ 3.467 por tonelada ao longo do trimestre [Reuters].\n\nApós a forte alta acumulada pelas ações da Hydro em torno do resultado, casas de análise passaram a adotar postura mais cautelosa: o Citi rebaixou a recomendação da ação para neutra, avaliando que boa parte da alta do alumínio já estava precificada no papel [Reuters]."}, "generated_by": "claude-research", "generated_at": "2026-07-07T12:00:00Z", "status": "summarized", "note_for_reviewer": "1T26 é o relatório mais recente disponível em 07/07/2026. Nenhum ID de mensagem Oslo Newsweb localizado.", "commentary_sources": [{"outlet": "Reuters", "title": "Norsk Hydro beats profit view as Iran war pushes up aluminium prices", "url": "https://www.globalbankingandfinance.com/aluminium-producer-norsk-hydros-q1-core-profit-beats/", "captured_at": "2026-07-07T00:00:00Z"}]}, "valero-energy": {"company_id": "valero-energy", "accession_number": "0001628280-26-028602", "company_name": "Valero Energy Corporation", "commodities": ["oil", "refined products", "renewable fuels"], "document_type": "earnings", "document_type_label": "Earnings Completo", "sources": [{"filename": "a3312026exh9901earningsrel.htm", "label": "Press release — \"Valero Energy Reports First Quarter 2026 Results\" (Anexo 99.01 ao Formulário 8-K)", "source_url": "https://www.sec.gov/Archives/edgar/data/1035002/000162828026028602/a3312026exh9901earningsrel.htm", "captured_at": "2026-07-07T00:00:00Z"}, {"filename": "vlo-20260331.htm", "label": "Formulário 10-Q referente ao trimestre encerrado em 31/03/2026", "source_url": "https://www.sec.gov/Archives/edgar/data/1035002/000162828026028690/vlo-20260331.htm", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Resultados do 1T26 (encerrado 31/03/2026), divulgado 30/04/2026**\n\n- Receita total: US$ 32.381 bilhões, ante US$ 30.258 bilhões no 1T25 [PR]\n- Lucro líquido atribuível: US$ 1,263 bilhão (US$ 4,22/ação), revertendo prejuízo de US$ 595 milhões (-US$ 1,90/ação) no 1T25 [PR]\n\n**Segmentos**\n- Refining: resultado operacional US$ 1,806 bilhão, revertendo prejuízo de US$ 530 milhões no 1T25 [PR]. Margem de refino de US$ 14,90/barril, ante US$ 9,78 no 1T25 [PR]. Alta atribuída a margens de diesel mais altas e maiores diferenciais de petróleo bruto [10-Q]\n- Renewable Diesel (DGD): resultado operacional US$ 139 milhões, revertendo prejuízo de US$ 141 milhões no 1T25 [PR]\n- Ethanol: resultado operacional US$ 90 milhões, ante US$ 20 milhões no 1T25 [PR]\n\n**Fluxo de Caixa e Capex**\n- Caixa operacional: US$ 1,390 bilhão, ante US$ 952 milhões no 1T25 [PR]\n- Capex total: US$ 448 milhões, ante US$ 660 milhões no 1T25 [PR]\n- Emissão de US$ 850 milhões em notas seniores a 5,150% (2036) [PR]\n- Liquidez total: US$ 10,8 bilhões [10-Q]\n\n**Volumes**\n- Throughput total: 2.914 mil bpd, ante 2.828 mil bpd no 1T25 [PR]\n- Incêndio na Refinaria Port Arthur em 23/03/2026 impactou guidance de throughput do 2T26 (1.690-1.740 mil bpd na Costa do Golfo) [10-Q]\n- Desativação total da Refinaria de Benicia concluída em abril/2026 [PR/10-Q]\n\n**Retorno de Capital**\n- Dividendo de US$ 1,20/ação (+6% a/a) [PR]. Retorno total de US$ 938 milhões, payout de 59% do caixa operacional ajustado [PR]", "conference_call_summary": "Nenhuma transcrição localizada na SEC. Citação do CEO Lane Riggs no release: \"I'm pleased to report that Valero had an excellent first quarter, demonstrating our team's ability to optimize our refining system and deliver solid financial returns.\"\n^Tradução livre: \"Estou satisfeito em informar que a Valero teve um excelente primeiro trimestre, demonstrando a capacidade de nossa equipe de otimizar nosso sistema de refino e entregar retornos financeiros sólidos.\"", "commodity_commentary": "A Reuters informou que a Valero Energy superou com folga as expectativas de Wall Street para o lucro ajustado do primeiro trimestre de 2026, beneficiada pela força do segmento de refino [Reuters]. O lucro por ação ajustado ficou em US$ 4,22, US$ 1,06 acima da estimativa média [Reuters]. Segundo a agência, o segmento de refino teve lucro operacional de US$ 1,8 bilhão, revertendo um prejuízo de US$ 530 milhões um ano antes, com margem de refino por barril subindo de US$ 9,78 para US$ 14,90 [Reuters].\n\nA Reuters atribuiu o salto de rentabilidade ao aumento das margens de diesel e querosene de aviação depois que os ataques dos EUA e de Israel ao Irã interromperam parte da oferta do Oriente Médio; o spread de crack 3-2-1 nos EUA subiu cerca de 73% na comparação anual [Reuters]. A companhia elevou o dividendo trimestral em 6%, para US$ 1,20 por ação, e devolveu US$ 938 milhões aos acionistas no trimestre [Reuters].\n\nApesar do resultado acima do esperado, a reação inicial das ações foi negativa — fontes de mercado registraram quedas entre 2% e quase 4% em torno da divulgação —, padrão comum entre refinadoras americanas no período, cujas ações já haviam subido mais de 20% no ano [Reuters]."}, "generated_by": "claude-research", "generated_at": "2026-07-07T00:00:00Z", "status": "summarized", "note_for_reviewer": "8-K de 30/04/2026 (1T26) — release mais recente disponível em 07/07/2026. Nenhuma transcrição de call encontrada.", "commentary_sources": [{"outlet": "Reuters", "title": "Valero Energy Beats Profit Estimates on Strong Refining Performance", "url": "https://www.todayinoilandgas.com/2026/04/30/valero-energy-beats-profit-estimates-on-strong-refining-performance/", "captured_at": "2026-07-07T00:00:00Z"}]}, "chalco": {"company_id": "chalco", "accession_number": "601600_20260424_H8NF", "company_name": "Aluminum Corporation of China Limited (Chalco)", "commodities": ["aluminum", "alumina"], "document_type": "earnings", "document_type_label": "Resultados do 1º Trimestre 2026", "sources": [{"filename": "601600_20260424_H8NF.pdf", "label": "Relatório trimestral oficial — \"Aluminum Corporation of China Limited 2026 First Quarterly Report\", SSE, aprovado 23/04/2026", "source_url": "https://static.sse.c   const commodityLabel = { oil: 'Petróleo', copper: 'Cobre', gold: 'Ouro', aluminum: 'Alumínio', platinum: 'Platina', palladium: 'Paládio' };
  const commodityOrder = ['oil', 'aluminum', 'copper', 'gold', 'platinum', 'palladium'];

  const activeCount = data.companies.filter(c => c.status !== 'not_traded').length;
  document.getElementById('stat-total').textContent = data.companies.length;
  document.getElementById('stat-active').textContent = activeCount;
  document.getElementById('stat-new').textContent = data.companies.filter(c => c.status === 'new').length;
  document.getElementById('stat-checked').textContent = new Date(data.checked_at).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

  const groups = {};
  data.companies.forEach(c => { const key = c.commodities[0]; (groups[key] = groups[key] || []).push(c); });

  function statusRank(c) {
    return { new: 0, gap: 1, needs_verification: 2, clear: 3, not_traded: 4 }[c.status] ?? 5;
  }

  let railHtml = '';
  const orderedKeys = commodityOrder.filter(k => groups[k]).concat(Object.keys(groups).filter(k => !commodityOrder.includes(k)));
  orderedKeys.forEach(key => {
    const list = groups[key].slice().sort((a, b) => statusRank(a) - statusRank(b) || a.name.localeCompare(b.name));
    railHtml += `<div class="rail-group" data-group="${key}"><h3><span>${commodityLabel[key] || key}</span><span class="count">${list.length}</span></h3>`;
    list.forEach(c => {
      const notTraded = c.status === 'not_traded' ? ' not-traded' : '';
      railHtml += `<div class="company-row${notTraded}" data-id="${c.id}" data-search="${(c.name + ' ' + (c.ticker||'')).toLowerCase()}">
        <span class="dot ${c.status}"></span>
        <span class="ticker">${c.ticker || ''}</span>
        <span class="name">${c.name}</span>
      </div>`;
    });
    railHtml += `</div>`;
  });
  railNav.innerHTML = railHtml;

  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll('.company-row').forEach(row => {
      row.classList.toggle('hidden', q.length > 0 && !row.dataset.search.includes(q));
    });
    document.querySelectorAll('.rail-group').forEach(g => {
      const anyVisible = Array.from(g.querySelectorAll('.company-row')).some(r => !r.classList.contains('hidden'));
      g.classList.toggle('hidden', q.length > 0 && !anyVisible);
    });
  });

  function renderMd(src) {
    const escapeHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const blocks = src.split(/\n\n+/);
    let html = '';
    blocks.forEach(block => {
      const lines = block.split('\n');
      if (lines.every(l => l.trim().startsWith('- '))) {
        html += '<ul>' + lines.map(l => `<li>${inline(l.trim().slice(2))}</li>`).join('') + '</ul>';
      } else if (block.trim().startsWith('>')) {
        html += `<div class="quote-block">${inline(block.replace(/^>\s?/, ''))}</div>`;
      } else if (block.trim().startsWith('^')) {
        html += `<div class="translation-note">${inline(block.replace(/^\^\s?/, ''))}</div>`;
      } else {
        html += `<p>${inline(block)}</p>`;
      }
    });
    return html;

    function inline(s) {
      s = escapeHtml(s);
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\[([A-Z0-9\-, ]+)\]/g, '<span class="cite">[$1]</span>');
      s = s.replace(/\n/g, '<br>');
      return s;
    }
  }

  function renderFiling(company, filing) {
    const sourcesHtml = filing.sources.map((s, i) => `
      <div class="source-item">
        <span class="src-code">${String.fromCharCode(65 + i)}</span>
        <a href="${s.source_url}" target="_blank" rel="noopener">${s.label}</a>
        <span class="captured">${new Date(s.captured_at).toISOString().replace('T',' ').slice(0,16)}Z</span>
      </div>`).join('');

    const commentarySources = filing.commentary_sources || [];
    const commentarySourcesHtml = commentarySources.length
      ? `<div class="sources commentary-sources">
          <div class="label">Matérias de imprensa citadas</div>
          ${commentarySources.map(s => `
          <div class="source-item">
            <span class="src-code">${(s.outlet || '').slice(0,2).toUpperCase()}</span>
            <a href="${s.url}" target="_blank" rel="noopener">${s.title || s.outlet}</a>
            <span class="captured">${s.outlet || ''}</span>
          </div>`).join('')}
        </div>`
      : `<div class="sources commentary-sources"><div class="label">Matérias de imprensa citadas</div><div class="source-item" style="color:var(--text-faint)">Nenhuma URL de matéria confirmada para esta empresa — ver ressalva no texto acima.</div></div>`;

    const tagLine = filing.commodities.map(c => commodityLabel[c] || c).join(' · ');
    const isTradingUpdate = filing.document_type === 'trading_update';
    const badgeLabel = isTradingUpdate ? 'Trading Update' : 'Earnings';
    const warnBanner = isTradingUpdate
      ? `<div class="warn-banner">Isto NÃO é o earnings completo — é uma atualização de guidance pré-resultados. ${filing.document_type_label ? filing.document_type_label.split('—')[1] || '' : ''} Veja a Aba 1 para os detalhes e a data do earnings real.</div>`
      : '';

    return `<div class="main-inner">
      <div class="filing-head">
        <div class="toprow">
          <div class="commodities">${tagLine}</div>
          <span class="doc-badge ${filing.document_type || 'earnings'}">${badgeLabel}</span>
        </div>
        <h1>${filing.company_name}</h1>
        <div class="sub"><span>Accession ${filing.accession_number}</span></div>
        <div class="sources">
          <div class="label">Fontes primárias usadas nesta análise (dados)</div>
          ${sourcesHtml}
        </div>
      </div>
      ${warnBanner}
      <div class="tabs">
        <button class="tab-btn active" data-tab="commodity_commentary">Comentários de Mercado</button>
        <button class="tab-btn" data-tab="earnings_summary">Dados do Earnings</button>
        <button class="tab-btn" data-tab="conference_call_summary">Conference Call</button>
      </div>
      <div class="tabpanel active" data-panel="commodity_commentary">${renderMd(filing.tabs.commodity_commentary)}${commentarySourcesHtml}</div>
      <div class="tabpanel" data-panel="earnings_summary">${renderMd(filing.tabs.earnings_summary)}</div>
      <div class="tabpanel" data-panel="conference_call_summary">${renderMd(filing.tabs.conference_call_summary)}</div>
      <div class="footer-note">Dados sourced de documentos primários (SEC EDGAR, IR, RNS, SENS, HKEX, CVM) · Comentários de mercado sourced de imprensa financeira (Bloomberg, Reuters e afins)</div>
    </div>`;
  }

  function renderEmpty(company) {
    if (company.status === 'gap') {
      return `<div class="empty-state">
        <h2>Detecção automática pendente — ${company.name}</h2>
        <p>Emissor privado estrangeiro — reporta via Form 6-K, sem classificação Item 2.02 no EDGAR. A heurística de descoberta usada para emissores domésticos (8-K Item 2.02) não funciona para este caso. Ver notas da empresa em companies.yaml para o plano de correção.</p>
      </div>`;
    }
    if (company.status === 'needs_verification') {
      return `<div class="empty-state">
        <h2>Dados incompletos — ${company.name}</h2>
        <p>Esta empresa está na base, mas ao menos um campo (ticker, URL de IR ou CIK) ainda não foi verificado ao vivo nesta pesquisa — está marcado como <em>null</em> com uma nota "needs follow-up" em vez de ser inventado. Sem esse dado, o pipeline de descoberta automática não roda com confiança total para esta empresa ainda.</p>
      </div>`;
    }
    if (company.status === 'not_traded') {
      return `<div class="empty-state">
        <h2>${company.name}</h2>
        <p>Entidade privada, estatal ou joint venture sem obrigação de disclosure público — mantida na base apenas como referência. Não faz parte do pipeline de monitoramento ativo de earnings.</p>
      </div>`;
    }
    return `<div class="empty-state">
      <h2>Nenhum earnings novo — ${company.name}</h2>
      <p>Verificado nas últimas 36h via SEC EDGAR. Nada publicado no período — nenhum resumo é gerado até que um earnings real seja divulgado.</p>
    </div>`;
  }

  function selectCompany(id) {
    document.querySelectorAll('.company-row').forEach(r => r.classList.toggle('active', r.dataset.id === id));
    const company = data.companies.find(c => c.id === id);
    const filing = data.filings[id];
    if (filing) {
      main.innerHTML = renderFiling(company, filing);
      wireTabs();
    } else {
      main.innerHTML = renderEmpty(company);
    }
  }

  function wireTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tabpanel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.querySelector(`.tabpanel[data-panel="${btn.dataset.tab}"]`).classList.add('active');
      });
    });
  }

  railNav.addEventListener('click', e => {
    const row = e.target.closest('.company-row');
    if (row) selectCompany(row.dataset.id);
  });

  // land on Freeport-McMoRan by default (has a real earnings summary)
  selectCompany('freeport-mcmoran');
})();
</script>

</body></html>
