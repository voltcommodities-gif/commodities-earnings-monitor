388 milhões, queda de 12% vs NOK 57.094 milhões no 1T25 [IP]\n- EBITDA ajustado: NOK 8.668 milhões, queda de 9% vs NOK 9.516 milhões no 1T25 [PR][IP]\n- Lucro líquido: NOK 4.341 milhões, ante NOK 5.861 milhões no 1T25 [IP]\n- LPA ajustado: NOK 2,07, alta de 27% vs NOK 1,63 no 1T25 [PR][IP]\n\n**Fluxo de caixa e balanço**\n- Fluxo de caixa livre negativo em NOK 4 bilhões, por aumento de capital de giro [PR]\n- Dívida líquida subiu de NOK 9,7 bi para NOK 12,9 bi [PR][IP]\n- RoaCE ajustado (12 meses): 10,1% [PR]\n\n**Segmentos (EBITDA ajustado)**\n- Bauxite & Alumina: NOK 747M, queda de 85% a/a — preço de alumina caiu para US$345/t (de US$587/t) [IP]\n- Aluminium Metal: NOK 5.034M, alta de 98% a/a — preço LME realizado US$2.929/t (+15% a/a) [IP]\n- Metal Markets: NOK 541M (vs -NOK 14M no 1T25) — melhores resultados de reciclagem desde 2023 [PR][IP]\n\n**Marcos**\n- Comissionamento da instalação de teste HalZero (nova tecnologia de alumínio) [PR]\n- Fatalidade de contratado na refinaria Alunorte (Brasil) em 30/03/2026, sob investigação [PR]","conference_call_summary":"Nenhuma transcrição completa localizada. Citação do CEO Eivind Kallevik: \"Strong operational performance in our upstream and recycling businesses, combined with favorable metal prices, drove a strong first quarter.\"\n^Tradução livre: \"Forte desempenho operacional em nossos negócios upstream e de reciclagem, combinado com preços favoráveis de metais, impulsionou um primeiro trimestre forte.\"","commodity_commentary":"Segundo a Reuters, a Norsk Hydro reportou lucro operacional do primeiro trimestre de 2026 acima do esperado, divulgado em 29 de abril, à medida que a guerra no Oriente Médio apertou o mercado global de alumínio e elevou os preços do metal [Reuters]. O EBITDA ajustado somou 8,67 bilhões de coroas norueguesas, contra expectativa média de 7,13 bilhões [Reuters].\n\nA Reuters destacou que preços e volumes maiores de metal mais do que compensaram a fraqueza nos preços de alumina e a queda na geração de energia [Reuters]. O EBITDA ajustado do segmento de Alumínio Metálico quase dobrou na comparação anual [Reuters]. O contexto de mercado citado pela imprensa é o conflito no Oriente Médio: a planta de alumínio no Catar operou com cerca de 40% de corte de produção, e as perdas de produção no Golfo Pérsico somaram cerca de 3 milhões de toneladas, contribuindo para um déficit global que levou o preço de três meses na LME de US$ 2.995 para US$ 3.467 por tonelada ao longo do trimestre [Reuters].\n\nApós a forte alta acumulada pelas ações da Hydro em torno do resultado, casas de análise passaram a adotar postura mais cautelosa: o Citi rebaixou a recomendação da ação para neutra, avaliando que boa parte da alta do alumínio já estava precificada no papel [Reuters]."},"generated_by":"claude-research","generated_at":"2026-07-07T12:00:00Z","status":"summarized","note_for_reviewer":"1T26 é o relatório mais recente disponível em 07/07/2026. Nenhum ID de mensagem Oslo Newsweb localizado.","commentary_sources":[{"outlet":"Reuters","title":"Norsk Hydro beats profit view as Iran war pushes up aluminium prices","url":"https://www.globalbankingandfinance.com/aluminium-producer-norsk-hydros-q1-core-profit-beats/","captured_at":"2026-07-07T00:00:00Z"}]},"valero-energy":{"company_id":"valero-energy","accession_number":"0001628280-26-028602","company_name":"Valero Energy Corporation","commodities":["oil","refined products","renewable fuels"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"a3312026exh9901earningsrel.htm","label":"Press release — \"Valero Energy Reports First Quarter 2026 Results\" (Anexo 99.01 ao Formulário 8-K)","source_url":"https://www.sec.gov/Archives/edgar/data/1035002/000162828026028602/a3312026exh9901earningsrel.htm","captured_at":"2026-07-07T00:00:00Z"},{"filename":"vlo-20260331.htm","label":"Formulário 10-Q referente ao trimestre encerrado em 31/03/2026","source_url":"https://www.sec.gov/Archives/edgar/data/1035002/000162828026028690/vlo-20260331.htm","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 1T26 (encerrado 31/03/2026), divulgado 30/04/2026**\n\n- Receita total: US$ 32.381 bilhões, ante US$ 30.258 bilhões no 1T25 [PR]\n- Lucro líquido atribuível: US$ 1,263 bilhão (US$ 4,22/ação), revertendo prejuízo de US$ 595 milhões (-US$ 1,90/ação) no 1T25 [PR]\n\n**Segmentos**\n- Refining: resultado operacional US$ 1,806 bilhão, revertendo prejuízo de US$ 530 milhões no 1T25 [PR]. Margem de refino de US$ 14,90/barril, ante US$ 9,78 no 1T25 [PR]. Alta atribuída a margens de diesel mais altas e maiores diferenciais de petróleo bruto [10-Q]\n- Renewable Diesel (DGD): resultado operacional US$ 139 milhões, revertendo prejuízo de US$ 141 milhões no 1T25 [PR]\n- Ethanol: resultado operacional US$ 90 milhões, ante US$ 20 milhões no 1T25 [PR]\n\n**Fluxo de Caixa e Capex**\n- Caixa operacional: US$ 1,390 bilhão, ante US$ 952 milhões no 1T25 [PR]\n- Capex total: US$ 448 milhões, ante US$ 660 milhões no 1T25 [PR]\n- Emissão de US$ 850 milhões em notas seniores a 5,150% (2036) [PR]\n- Liquidez total: US$ 10,8 bilhões [10-Q]\n\n**Volumes**\n- Throughput total: 2.914 mil bpd, ante 2.828 mil bpd no 1T25 [PR]\n- Incêndio na Refinaria Port Arthur em 23/03/2026 impactou guidance de throughput do 2T26 (1.690-1.740 mil bpd na Costa do Golfo) [10-Q]\n- Desativação total da Refinaria de Benicia concluída em abril/2026 [PR/10-Q]\n\n**Retorno de Capital**\n- Dividendo de US$ 1,20/ação (+6% a/a) [PR]. Retorno total de US$ 938 milhões, payout de 59% do caixa operacional ajustado [PR]","conference_call_summary":"Nenhuma transcrição localizada na SEC. Citação do CEO Lane Riggs no release: \"I'm pleased to report that Valero had an excellent first quarter, demonstrating our team's ability to optimize our refining system and deliver solid financial returns.\"\n^Tradução livre: \"Estou satisfeito em informar que a Valero teve um excelente primeiro trimestre, demonstrando a capacidade de nossa equipe de otimizar nosso sistema de refino e entregar retornos financeiros sólidos.\"","commodity_commentary":"A Reuters informou que a Valero Energy superou com folga as expectativas de Wall Street para o lucro ajustado do primeiro trimestre de 2026, beneficiada pela força do segmento de refino [Reuters]. O lucro por ação ajustado ficou em US$ 4,22, US$ 1,06 acima da estimativa média [Reuters]. Segundo a agência, o segmento de refino teve lucro operacional de US$ 1,8 bilhão, revertendo um prejuízo de US$ 530 milhões um ano antes, com margem de refino por barril subindo de US$ 9,78 para US$ 14,90 [Reuters].\n\nA Reuters atribuiu o salto de rentabilidade ao aumento das margens de diesel e querosene de aviação depois que os ataques dos EUA e de Israel ao Irã interromperam parte da oferta do Oriente Médio; o spread de crack 3-2-1 nos EUA subiu cerca de 73% na comparação anual [Reuters]. A companhia elevou o dividendo trimestral em 6%, para US$ 1,20 por ação, e devolveu US$ 938 milhões aos acionistas no trimestre [Reuters].\n\nApesar do resultado acima do esperado, a reação inicial das ações foi negativa — fontes de mercado registraram quedas entre 2% e quase 4% em torno da divulgação —, padrão comum entre refinadoras americanas no período, cujas ações já haviam subido mais de 20% no ano [Reuters]."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"8-K de 30/04/2026 (1T26) — release mais recente disponível em 07/07/2026. Nenhuma transcrição de call encontrada.","commentary_sources":[{"outlet":"Reuters","title":"Valero Energy Beats Profit Estimates on Strong Refining Performance","url":"https://www.todayinoilandgas.com/2026/04/30/valero-energy-beats-profit-estimates-on-strong-refining-performance/","captured_at":"2026-07-07T00:00:00Z"}]},"chalco":{"company_id":"chalco","accession_number":"601600_20260424_H8NF","company_name":"Aluminum Corporation of China Limited (Chalco)","commodities":["a \nDito isso, os dados amplamente replicados mostram que a Chalco anunciou em abril, via fato relevante, uma projeção de alta de 50% a 58% no lucro líquido do 1T26; o resultado final veio em RMB 5,53 bilhões, alta de 56,35% ante o mesmo trimestre de 2025. As ações da Chalco subiram cerca de 3% em Hong Kong na sessão seguinte ao anúncio. Analistas do Morgan Stanley, citados por veículos especializados do setor, classificaram o resultado como ligeiramente acima da própria estimativa do banco e reiteraram recomendação 'overweight' para o papel.\n\nO mercado atribuiu o salto de lucro à alta dos preços do alumínio, impulsionada por cortes de produção na China e por tarifas de importação dos EUA."},"generated_by":"claude-research","generated_at":"2026-07-07T19:05:00Z","status":"summarized","note_for_reviewer":"1T2026 é o relatório mais recente disponível em 07/07/2026 (próximo, 1S2026, previsto ~25/08/2026). Documento não tem MD&A/guidance por natureza do formato regulatório chinês.","commentary_sources":[]},"china-hongqiao":{"company_id":"china-hongqiao","accession_number":null,"company_name":"China Hongqiao Group Limited","commodities":["aluminum","alumina","bauxite"],"document_type":"profit_alert","document_type_label":"Alerta de Lucro (Profit Alert) — 1º Semestre 2026","sources":[{"filename":"hkexnews_positive_profit_alert_1H2026.pdf","label":"Anúncio de \"Positive Profit Alert\" (informação privilegiada) na HKEX — referente ao semestre encerrado em 30/06/2026. Link abaixo aponta para o portal oficial de IR da empresa (hongqiaochina.com), pois não foi possível confirmar com segurança a URL exata do PDF individual no hkexnews.hk (ver note_for_reviewer)","source_url":"http://en.hongqiaochina.com/Investors_report.html","captured_at":"2026-07-20T00:00:00Z"}],"tabs":{"earnings_summary":"**Alerta de lucro positivo — 1S2026 (encerrado em 30/06/2026)**: a China Hongqiao (HKEX: 1378) protocolou junto à HKEX, em meados de julho/2026 (~13/07/2026), um \"positive profit alert\" indicando que o lucro líquido do 1S2026 deve registrar alta de aproximadamente 39% frente ao 1S2025 [Filing HKEX]. O comunicado atribui o crescimento primariamente à alta nos preços de venda de produtos de liga de alumínio (aluminium alloy) no período [Filing HKEX].\n\n**Números implícitos (estimativa de analista, NÃO dado explícito do filing)**: com base em lucro líquido estimado de RMB 13,5 bilhões no 1S2025 (referência de mercado, não confirmada contra o resultado auditado), a alta de ~39% implicaria lucro líquido de aproximadamente RMB 18,8 bilhões no 1S2026 — cálculo de casa de research (BofA Securities, via cobertura secundária), não uma cifra publicada pela própria companhia no alerta [Análise de mercado — BofA, via cobertura secundária].\n\n**Escopo do documento — atenção**: este é um alerta de lucro (profit forecast sob a Regra 14.60A-14.62 da HKEX), NÃO o relatório financeiro interino completo. Não há detalhamento de receita, margem, volume de produção/vendas de alumina, bauxita ou alumínio primário, nem demonstrações financeiras. Os resultados interinos completos (com demonstrações financeiras auditadas em revisão) são esperados para publicação até o final de agosto/2026 [Filing HKEX / cobertura secundária].\n\n**Este registro complementa, não substitui**, o resultado anual FY2025 (auditado) já constante neste painel.","conference_call_summary":"Não há teleconferência associada a este documento — alertas de lucro (\"positive profit alert\") sob as regras da HKEX são comunicados unilaterais de guidance, sem earnings call. Uma teleconferência com detalhamento de resultados deve ocorrer apenas por ocasião da publicação dos resultados interinos completos do 1S2026, esperada para o final de agosto/2026. Recomenda-se voltar a este registro naquela data.","commodity_commentary":"A alta de ~39% no lucro do 1S2026 repercutiu positivamente nas ações da China Hongqiao em Hong Kong. Segundo o **Reuters** (via republicação da TradingView), a companhia \"expects HY net profit to increase by about 39%\", atribuindo o resultado a preços mais altos de produtos de liga de alumínio [Reuters, via TradingView]. A **AlCircle** (trade press do setor de alumínio) confirmou o mesmo racional, destacando que \"stronger aluminium alloy prices\" sustentaram a rentabilidade no semestre encerrado em 30 de junho de 2026 [AlCircle].\n\n**Atenção a possível confusão de nomes**: há uma segunda entidade com nome semelhante — Shandong Hongqiao (Aluminium) Holdings (SZSE: 002379), controladora/afiliada da China Hongqiao mas listada separadamente em Shenzhen — que divulgou guidance de lucro BEM MAIS forte para o mesmo período (+69,72% a +81,04% a/a). Os dois números não devem ser confundidos: o +39% citado acima é especificamente da China Hongqiao Group Limited (HKEX: 1378), a entidade coberta neste registro.\n\nNão foi localizada cobertura direta e específica da Bloomberg ou FT sobre este alerta nesta pesquisa; Reuters (via wire/TradingView) e AlCircle foram as fontes de maior qualidade confirmadas com URL real."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Este registro é um SUPLEMENTO ao resultado anual FY2025 (auditado) já existente no painel — NÃO o substitui. É um profit alert (guidance de lucro), não o relatório interino completo do 1S2026, que é esperado até o final de agosto/2026 conforme cobertura secundária (Eastmoney) — revisitar este registro naquela data e substituir por dados auditados/revisados completos assim que disponíveis.\n\nLimitação de sourcing: não consegui confirmar com segurança a URL exata do PDF do filing no hkexnews.hk nesta sessão — testei múltiplas datas candidatas e nenhuma pôde ser verificada com confiança como sendo especificamente o profit alert da China Hongqiao. O acesso direto (WebFetch) a hkexnews.hk, eastmoney, investing.com e outras fontes foi bloqueado por política de rede desta sessão (erro 403 em praticamente todos os domínios testados). Por isso, sources[] aponta para o portal de IR da empresa em vez do PDF específico — recomenda-se que um revisor humano confirme o número exato do anúncio diretamente em hkexnews.hk (title search por \"1378\") antes de citar este documento como fonte primária definitiva em material formal.\n\nO número de RMB 18,8 bilhões (lucro implícito) é um CÁLCULO DE ANALISTA (BofA, via cobertura secundária) sobre uma base também não-primária — não é uma cifra que conste no texto do próprio alerta de lucro, que tipicamente só declara o range percentual. Tratar como estimativa, não como dado confirmado da empresa.","commentary_sources":[{"outlet":"Reuters (via TradingView)","title":"China Hongqiao Expects HY Net Profit To Increase By About 39%","url":"https://www.tradingview.com/news/reuters.com,2026:newsml_FWN43C0K7:0-china-hongqiao-expects-hy-net-profit-to-increase-by-about-39/","captured_at":"2026-07-13T00:00:00Z"},{"outlet":"AlCircle","title":"China Hongqiao expects higher first-half profit on stronger aluminium alloy prices","url":"https://www.alcircle.com/press-release/china-hongqiao-expects-higher-first-half-profit-on-stronger-aluminium-alloy-prices-120302","captured_at":"2026-07-13T00:00:00Z"}]},"nalco":{"company_id":"nalco","accession_number":"NBC/S/4.5 & 4.5(A)/2026/699","company_name":"National Aluminium Company Limited (NALCO)","commodities":["aluminum","alumina","bauxite"],"document_type":"earnings","document_type_label":"Resultados Trimestrais (4T e Ano Fiscal FY26)","sources":[{"filename":"SELetterPressRelease.pdf","label":"Press release anexado à carta de divulgação BSE/NSE — \"Historic Annual Profit... NALCO Clocks Record Net Profit of Rs.5816 crore\" (30/04/2026, BSE 532234 / NSE NATIONALUM)","source_url":"https://nalcoindia.com/wp-content/uploads/2026/04/SELetterPressRelease.pdf","captured_at":"2026-07-07T14:30:00Z"}],"tabs":{"earnings_summary":"**Resultado do Ano Fiscal FY26 (encerrado 31/03/2026) — recorde histórico**\n\n- Lucro líquido recorde: Rs. 5.816 crore, alta de 9,22% a/a [PR]\n- Receita operacional recorde: Rs. 17.843 crore, ante Rs. 16.788 crore em FY25 [PR]\n\n**4T FY26**\n- Lucro líquido: Rs. 1.718 crore, alta de 7% sequencial [PR]\n- Receita: Rs. 5.103 crore no trimestre [PR]\n\n**Produção física — recordes em toda a cadeia**\n- Metal fundido (alumínio primário): 4,72 lakh toneladas (recorde histórico) [PR]\n- Escavação de bauxita: 77,01 lakh toneladas (recorde) [PR]\n\n**Dividendos**\n- 3º dividendo interino: Rs. 2,00/ação, totalizando Rs. 367,33 crore [PR]\n\nO press release primário não traz EBITDA, capex ou fluxo de caixa consolidados detalhados.","conference_call_summary":"ATENÇÃO: as citações da teleconferência de 30/04/2026 abaixo vêm de um agregador terceiro (Alpha Spread) e NÃO foram verificadas contra o PDF oficial do transcript — tratar com cautela. Segundo essa fonte não-primária, o CMD Brijendra Pratap Singh comentou expectativa de preço de alumina caindo para US$310-320/t (de média de US$376/t em FY26) e LME de alumínio em torno de US$3.000-3.100/t.","commodity_commentary":"Não foi possível localizar, em busca razoável, uma reportagem dedicada da Bloomberg, Reuters, Financial Times ou Wall Street Journal analisando especificamente a reação do mercado ao resultado do 4º trimestre do ano fiscal 2026 da NALCO (National Aluminium Company), divulgado em 30 de abril de 2026. A cobertura internacional de referência encontrada limitou-se a perfis de cotação, sem peça jornalística associada a este release específico. A Reuters cobriu resultados trimestrais da NALCO em períodos anteriores do mesmo ano fiscal — por exemplo, o trimestre encerrado em setembro de 2025, quando destacou alta de 36,7% no lucro, para 14,3 bilhões de rupias, impulsionada por preços mais firmes de alumínio e cobre [Reuters] — mas nenhuma peça equivalente foi encontrada para o trimestre encerrado em março de 2026.\n\nSegundo fontes financeiras indianas (Business Standard, MarketsMojo), não incluídas entre as exigidas para esta pesquisa, a estatal reportou lucro líquido consolidado de ₹1.722,44 crore no trimestre, queda de 16,7% ante o ano anterior, e as ações teriam recuado cerca de 7,8% no pregão seguinte à divulgação. Como essas informações não vêm de Bloomberg, Reuters, FT ou WSJ, são citadas aqui apenas como contexto não verificado pelos critérios desta tarefa."},"generated_by":"claude-research","generated_at":"2026-07-07T17:00:00Z","status":"summarized","note_for_reviewer":"FY26 (encerrado 31/03/2026) é o resultado mais recente. EBITDA/capex não confirmados por limitação de extração do PDF das demonstrações financeiras completas. Citações de teleconferência vêm de agregador terceiro não verificado — usar com cautela.","commentary_sources":[]},"hindalco":{"company_id":"hindalco","accession_number":null,"company_name":"Hindalco Industries Limited","commodities":["aluminum","copper"],"document_type":"earnings","document_type_label":"Earnings Completo (4T e Ano Fiscal FY26)","sources":[{"filename":"transcript-q4fy26-earnings-call.pdf","label":"Transcrição oficial da teleconferência \"Fourth Quarter FY '26 Results Call\" (22/05/2026), arquivada na BSE/NSE/Bolsa de Luxemburgo em 26/05/2026","source_url":"https://www.hindalco.com/Upload/PDF/transcript-q4fy26-earnings-call.pdf","captured_at":"2026-07-07T15:45:00Z"}],"tabs":{"earnings_summary":"**Resultados do 4T e Ano Fiscal FY26 (encerrado 31/03/2026), teleconferência 22/05/2026**\n\n- EBITDA consolidado por segmento: Rs. 10.812 crore no 4T, alta de 11% a/a [IP]\n- Receita consolidada recorde: Rs. 78.133 crore (+20% a/a); EBITDA consolidado recorde de Rs. 11.197 crore (+9% a/a) [PR]\n- PAT consolidado ajustado: Rs. 5.796 crore, alta de 10% a/a [IP]\n\n**Cobre (Índia)**\n- EBITDA trimestral recorde: Rs. 907 crore, alta de 48% a/a, por melhores realizações de subprodutos [IP]\n\n**Novelis**\n- EBITDA ajustado: US$ 498 milhões (US$ 543/t), alta de 5% a/a, excluindo impacto do incêndio em Oswego [IP]\n\n**Fluxo de caixa e alavancagem (FY26)**\n- Geração de caixa operacional: Rs. 21.858 crore, alta de 11% a/a [IP]\n- Capex: Rs. 31.619 crore, alta de 47% a/a (majoritariamente Novelis/Bay Minette) [IP]\n- Dívida líquida/EBITDA: 1,83x [IP]\n\n**Guidance**\n- Capex Índia FY27: ~Rs. 12.000 crore; Novelis FY27: US$ 2,3-2,4 bilhões [IP]\n- Bay Minette: comissionamento do laminador a quente em jun/2026, vendas comerciais a partir do início do FY28 [IP]","conference_call_summary":"Citação do MD Satish Pai: \"the India business is on a solid footing... I think that Novelis is heading to a recovery year in FY27.\"\n^Tradução livre: \"o negócio na Índia está em base sólida... acredito que a Novelis está caminhando para um ano de recuperação no FY27.\" Sobre déficit de alumínio: \"the market has moved from an earlier expectation of 0.3 million tons deficit to 1.5 million tons deficit for calendar year '26.\"\n^Tradução livre: \"o mercado passou de uma expectativa de déficit de 0,3 milhão de toneladas para 1,5 milhão de toneladas no ano-calendário 2026.\"","commodity_commentary":"Segundo a Reuters, a Hindalco Industries reportou lucro líquido consolidado de 25,97 bilhões de rupias (cerca de US$ 271 milhões) no trimestre encerrado em 31 de março de 2026, queda de 50,8% ante o ano anterior e abaixo da estimativa média de analistas de 43,12 bilhões de rupias [Reuters]. A receita operacional superou as expectativas, subindo 20,4% para 781,33 bilhões de rupias, impulsionada pela força do negócio indiano de alumínio e cobre [Reuters]. A agência destacou que a unidade americana Novelis, responsável por cerca de 60% da receita do grupo, sofreu encargo excepcional de 41,71 bilhões de rupias ligado aos incêndios na fábrica de Oswego, em Nova York, ocorridos em setembro e novembro de 2025 [Reuters]. Ainda assim, a receita da Novelis cresceu 10,3%, para 438,1 bilhões de rupias, sustentada pela alta de 21,8% no alumínio e 36,7% no cobre nos preços de referência trimestrais [Reuters]. O CEO Satish Pai afirmou à Reuters que \"a Novelis demonstrou forte dinamismo operacional subjacente\" [Reuters].\n\nReportagem da Reuters publicada em junho, quando a fábrica de Oswego finalmente foi religada após nove meses parada, mostrou que a interrupção custou à Hindalco cerca de US$ 437 milhões só no trimestre, e que a paralisação também pressionou a Ford, que sinalizou possíveis encargos de até US$ 2 bilhões por depender da Novelis para as carrocerias de alumínio da picape F-150 [Reuters]. O mercado tratou o resultado como um \"miss\" de lucro amplamente antecipado, com atenção dos investidores rapidamente migrando para o cronograma de retomada de Oswego."},"generated_by":"claude-research","generated_at":"2026-07-07T17:00:00Z","status":"summarized","note_for_reviewer":"Fonte primária: transcript oficial da teleconferência (BSE/NSE/Luxemburgo). Pequena divergência entre EBITDA \"recorde histórico\" do press release (Rs. 11.197 crore) e EBITDA \"por segmento\" do transcript (Rs. 10.812 crore) — provável diferença de metodologia, ambos reportados sem reconciliação adicional.","commentary_sources":[{"outlet":"Reuters","title":"India's Hindalco misses profit estimates as Novelis disruptions weigh","url":"https://www.tradingview.com/news/reuters.com,2026:newsml_L4N41Z0ZK:0-india-s-hindalco-misses-profit-estimates-as-novelis-disruptions-weigh/","captured_at":"2026-07-07T00:00:00Z"},{"outlet":"Reuters","title":"Novelis restarts production at New York plant key to Ford trucks","url":"https://www.investing.com/news/stock-market-news/novelis-restarts-production-at-new-york-plant-key-to-ford-trucks-4735577","captured_at":"2026-07-07T00:00:00Z"}]},"mytilineos-metlen":{"company_id":"mytilineos-metlen","accession_number":null,"company_name":"METLEN Energy & Metals PLC (ex-Mytilineos)","commodities":["aluminum"],"document_type":"earnings","document_type_label":"Atualização de Negócios Trimestral (Trading Update)","sources":[{"filename":"metlen_trading_update_q1_26_en.pdf","label":"\"METLEN Trading Update Q1 2026 — Strong Start to necimento.\"","commodity_commentary":"A Repsol reportou lucro líquido ajustado de €873 milhões no primeiro trimestre de 2026, alta de quase 57% frente ao mesmo período de 2025, mas o número ficou ligeiramente abaixo do consenso de analistas, de €897 milhões [Reuters]. Apesar do resultado aquém do esperado, as ações da companhia subiram 1,9% por volta das 12h22 (horário de Londres) no dia da divulgação, superando o índice europeu do setor de energia, que avançou 0,7% no mesmo pregão [Reuters]. Segundo analistas citados pela agência, o desvio em relação às projeções foi atribuído a efeitos de defasagem (\"price lag\") no negócio de downstream [Reuters]. Analistas do RBC Capital Markets destacaram que a companhia optou por manter integralmente sua orientação (guidance) para 2026 como uma abordagem prudente diante de um cenário macroeconômico volátil [Reuters]. A imprensa também apontou que a margem de refino na Espanha mais do que dobrou na comparação anual, para US$ 10,9 por barril, beneficiada pelas disrupções no fornecimento provocadas pelo conflito no Irã, o que levou a Repsol a destinar €1,2 bilhão no trimestre ao reforço de estoques em meio à volatilidade dos mercados de energia [Reuters]. O desempenho foi puxado pela divisão industrial, cujo lucro ajustado mais do que triplicou na comparação anual. A companhia reafirmou a meta de produção de 560 mil a 570 mil barris de óleo equivalente por dia para 2026 e manteve os planos de remuneração a acionistas, sinal que a imprensa financeira interpretou como confiança da administração apesar do ambiente turbulento [Reuters]."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"1T26, divulgado 30/04/2026. Não é registrante SEC. Cifras em EUR.","commentary_sources":[{"outlet":"Reuters","title":"Repsol Profit Jumps 57% in Q1 But Misses Forecast","url":"https://www.globalbankingandfinance.com/repsol-profit-surges-57-still-forecast/","captured_at":"2026-07-07T00:0 , até então destinado apenas ao mercado doméstico — embora tenha reduzido a projeção de utilização das refinarias para os próximos trimestres [Bloomberg]. Apesar do resultado acima do esperado, a reação imediata das ações foi negativa: os papéis caíram cerca de 6% no dia da divulgação, movimento atribuído pela reportagem sobretudo à queda dos preços do petróleo, não a preocupações operacionais [Bloomberg]. O analista David Trainer, CEO da New Constructs, classificou a queda como \"quase inteiramente relacionada ao petróleo\", descrevendo a Suncor como \"um negócio muito lucrativo\", com \"ótima utilização e eficiência operacional\", e manteve recomendação positiva para o investidor de longo prazo apesar da volatilidade recente de commodities [Bloomberg]. A companhia também ampliou o ritmo de recompra de ações para cerca de C$ 350 milhões mensais, projetando recompras totais de quase C$ 4 bilhões em 2026."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"1T26, divulgado 05/05/2026. Cifras em CAD. Fonte de comentário atualizada em 14/07/2026: substituída a Reuters (republicada via boereport.com) por reportagem original da BNN Bloomberg sobre o mesmo evento, incluindo comentário de analista (David Trainer, New Constructs) ausente na cobertura anterior.","commentary_sources":[{"outlet":"Bloomberg (BNN Bloomberg)","title":"Investor Outlook: Suncor shares fall despite stronger quarterly earnings","url":"https://www.bnnbloomberg.ca/investing/investor-outlook/2026/05/06/investor-outlook-suncor-shares-fall-despite-stronger-quarterly-earnings/","captured_at":"2026-07-14T00:00:00Z"}]},"omv":{"company_id":"omv","accession_number":null,"company_name":"OMV Aktiengesellschaft","commodities":["oil","gas","petrochemicals"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"OMV_Q1_26_EN.pdf","label":"\"OMV Group Report January–March 2026\"","source_url":"https://www.omv.com/downloads/2026/04/ce46987f-f2e6-e1a3-5a8c-6d78110dc34f/OMV_Q1_26_EN.pdf","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 1T26 (em EUR)**\n\n- Vendas do Grupo: EUR 5.855 milhões, queda de 6% a/a [PR]\n- Resultado Operacional CCS Limpo: EUR 1.025 milhões, queda de 12% a/a [PR]\n- Lucro líquido reportado: EUR 1.486 milhões (ante EUR 143 milhões), por ganho contábil de EUR 886 milhões com desconsolidação da Borouge [PR]\n\n**Segmentos**: Energy (E&P) EUR 723 mi (-21% a/a, impactado pelo conflito no Oriente Médio); margem de refino europeia mais que dobrou para US$ 13,88/bbl [PR]\n**Produção**: 288 kboe/d, queda de 7% a/a [PR]\n**Guidance 2026 (revisado)**: Brent US$ 85-95/bbl (de US$ 65); margem de refino US$ 10-15/bbl (de ~US$ 8) [PR]","conference_call_summary":"Nenhuma transcrição primária localizada no site institucional.","commodity_commentary":"A OMV reportou lucro operacional limpo (clean CCS) de €1,03 bilhão no primeiro trimestre de 2026, ligeiramente acima do consenso de analistas de cerca de €1 bilhão, embora represente queda de 12% frente ao mesmo período do ano anterior [Reuters]. A agência destacou que a companhia elevou suas projeções de preços de energia para 2026, passando a prever Brent entre US$ 85 e US$ 95 por barril (ante US$ 65 anteriormente) e preços de gás entre €35 e €40/MWh, citando o cenário de preços mais altos como compensação para a queda de produção causada pela guerra no Irã e pelo fechamento do Estreito de Ormuz [Reuters]. A produção de hidrocarbonetos recuou 7%, para 288 mil boe/dia, afetada por paralisações no Oriente Médio, Nova Zelândia e Romênia [Reuters]. O trimestre também foi marcado pela conclusão da joint venture Borouge International, unindo os ativos petroquímicos da OMV aos da parceira emiradense XRG — operação que teve contribuição reduzida no trimestre por disrupções logísticas ligadas ao conflito Irã-Israel [Reuters]. Outras coberturas notaram que o lucro por ação de US$ 0,99 ficou bem abaixo plined execution across all business units.\"\n^Tradução livre: \"A Galp entregou um início de ano forte em 2026, sustentado pela resiliência da nossa base de ativos e pela execução disciplinada em todas as unidades de negócio.\"","commodity_commentary":"A Galp Energia registrou prejuízo líquido de €111 milhões no primeiro trimestre de 2026, revertendo o lucro de €362 milhões apurado um ano antes — reversão atribuída majoritariamente a itens não recorrentes ligados a instrumentos financeiros derivativos [Reuters]. Excluindo esses efeitos pontuais, a companhia teria apurado lucro líquido de €272 milhões, alta de 41% na comparação anual [Reuters]. O EBITDA do trimestre somou €943 milhões, superando o consenso de mercado de aproximadamente €890 milhões, e a produção no Brasil cresceu 23% na comparação anual, beneficiada pela ramp-up do FPSO de Bacalhau [Reuters]. Apesar do prejuízo contábil, a leitura predominante entre analistas foi de que o desempenho operacional subjacente permaneceu sólido, com o upstream no Brasil entregando produção na ponta superior do guidance da companhia. Nota de transparência: apesar de pesquisa extensiva, não foi possível localizar cobertura detalhada e claramente atribuída à Bloomberg, Reuters, Financial Times ou Wall Street Journal especificamente sobre a reação do preço das ações da Galp no pregão de divulgação, nem citações diretas de analistas de bancos de investimento sobre este release em particular. Os números acima são amplamente corroborados por agregadores financeiros e casas de research locais (como a Norbolsa), mas a atribuição a veículos de imprensa de primeira linha é, para este caso específico, mais limitada do que para as demais empresas pesquisadas."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"1T26, publicado 27/04/2026. Cifras em EUR.","commentary_sources":[]},"neste":{"company_id":"neste","accession_number":null,"company_name":"Neste Oyj","commodities":["oil","renewable fuels"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"EF37E1B3D69C6826-wkr0006.pdf","label":"\"Neste Corporation Interim report January–March 2026\"","source_url":"https://www.neste.com/files/pdf/EF37E1B3D69C6826-wkr0006.pdf","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 1T26 (em EUR)**\n\n- Receita: EUR 5.163 milhões (ante EUR 5.017 milhões) [PR]\n- EBITDA comparável: EUR 861 milhões (ante EUR 210 milhões) [PR]\n- Lucro líquido: EUR 533 milhões (ante prejuízo de EUR 40 milhões) [PR]\n\n**Segmentos**: Renewable Products EUR 433 mi (ante EUR 72 mi); Oil Products EUR 373 mi (ante EUR 120 mi) [PR]\n**Volumes**: Renewable Products margem de US$ 856/tonelada (ante US$ 310) [PR]. Oil Products margem de refino de US$ 23,0/bbl (ante US$ 9,9) [PR]\n**Retorno**: dividendo de EUR 0,20/ação pago em 07/04/2026 [PR]","conference_call_summary":"Citação do CEO Heikki Malinen: \"The final weeks of the first quarter of 2026 were marked by the Middle East conflict and the closure of the Strait of Hormuz.\"\n^Tradução livre: \"As semanas finais do primeiro trimestre de 2026 foram marcadas pelo conflito no Oriente Médio e pelo fechamento do Estreito de Hormuz.\"","commodity_commentary":"A Neste superou as expectativas dos analistas no primeiro trimestre de 2026, com EBITDA comparável de €861 milhões, 14% acima do consenso de €756 milhões, impulsionado por margens mais fortes que o previsto na divisão de Produtos Renováveis [Reuters]. As ações da companhia subiram 2,7% na sessão seguinte à divulgação dos resultados [Reuters]. A margem de vendas de produtos renováveis atingiu US$ 856 por tonelada, 18% acima das estimativas e o maior nível desde o terceiro trimestre de 2023, embora os volumes de vendas do segmento (874 mil toneladas) tenham ficado 3% abaixo do esperado e as vendas de combustível de aviação sustentável (SAF) tenham recuado 73% na comparação trimestral [Reuters]. O segment *Retorno**: dividendo recorde de PLN 9,3 bilhões (PLN 8/ação) recomendado — \"o maior dividendo da história da ORLEN\" [PR]\n**Rating**: Moody's A3, Fitch BBB+ [PR]","conference_call_summary":"Citação do CEO Ireneusz Fąfara: \"Once again we have demonstrated the resilience and effectiveness of our business model.\"\n^Tradução livre: \"Mais uma vez demonstramos a resiliência e a eficácia do nosso modelo de negócio.\"","commodity_commentary":"A Orlen reportou lucro ajustado (EBITDA LIFO) de 14,07 bilhões de zlótis no primeiro trimestre de 2026, acima do consenso de analistas de 13,2 bilhões de zlótis e alta de 22,8% na comparação anual [Reuters]. As ações da companhia subiram 1,6% no dia da divulgação, superando o índice de referência polonês WIG20, que recuou 0,1% no mesmo pregão, e também superando pares regionais como a húngara MOL (+0,2%) [Reuters]. O analista Cezary Bernatek, da corretora austríaca Erste, foi citado afirmando que \"os números parecem confirmar a resiliência e os benefícios da diversificação do modelo de negócios integrado da Orlen em meio à elevada volatilidade nos mercados globais de energia\" [Reuters]. A agência atribuiu o forte desempenho ao salto das margens de refino, de US$ 8,9 para US$ 17,0 por barril na comparação anual, impulsionadas pelas disrupções de oferta ligadas à guerra no Irã, além do clima frio em janeiro e fevereiro [Reuters]. O lucro líquido não ajustado, porém, foi impactado por encargos de impairment não caixa de 1,11 bilhão de zlótis, reduzindo o resultado contábil final em relação ao indicador ajustado destacado pela companhia [Reuters]. A cobertura descreveu o trimestre como um dos mais fortes já registrados pela petrolífera polonesa, reforçando a leitura de que o modelo integrado de refino, energia e varejo da Orlen oferece proteção relevante em ambientes de alta volatilidade de commodities [Reuters]."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"1T26, mas press release publicado só em 28/05/2026 (mais tarde que os pares). Cifras em PLN.","commentary_sources":[{"outlet":"Reuters","title":"Orlen's first-quarter adjusted core profit beats market estimates","url":"https://www.globalbankingandfinance.com/orlens-first-quarter-adjusted-core-profit-beats-market/","captured_at":"2026-07-07T00:00:00Z"}]},"tharisa":{"company_id":"tharisa","accession_number":null,"company_name":"Tharisa plc","commodities":["platinum group metals","chrome"],"document_type":"production_report","document_type_label":"Relatório de Produção Trimestral (Q3 FY2026, trimestre encerrado em 30/06/2026)","sources":[{"filename":"tharisa-plc-q3-fy2026-production-report.pdf","label":"Anúncio regulatório (RNS/LSE, redistribuído via wire) — título original: \"Tharisa PLC - Production Report Q3 2026 ended 30 June 2026\", divulgado em 14/07/2026","source_url":"https://www.tradingview.com/news/reuters.com,2026-07-14:newsml_RSN1435Ma:0-reg-tharisa-plc-production-report-q3-2026-ended-30-june-2026/","captured_at":"2026-07-20T00:00:00Z"}],"tabs":{"earnings_summary":"**Produção do trimestre (Q3 FY2026, encerrado em 30/06/2026)**: produção de PGMs (6E) somou 39,6 koz, alta de 15,5% frente aos 34,3 koz do Q2 FY2026, sustentada por recuperação metalúrgica de 83,8% — melhora relevante frente ao trimestre anterior [RNS]. Produção de cromita ficou em 393,8 kt, levemente abaixo dos 404,0 kt do Q2 — queda marginal explicada por menor tonelagem moída e recuperações levemente inferiores, parcialmente compensadas por melhor teor ROM e yield [RNS].\n\n**Preços realizados**: cesta de PGMs realizada recuou para US$ 2.681/oz no Q3 ante US$ 3.038/oz no Q2 (-11,7% t/t), refletindo o recuo dos preços de PGM após o rali do trimestre anterior [RNS]. Preço médio do concentrado de cromita metalúrgico subiu para US$ 306/t ante US$ 290/t no Q2 [RNS].\n\n**Caixa e dívida**: caixa do grupo em US$ 198,8 milhões (ante US$ 184,3 milhões em 31/03/2026) e dívida de US$ 188,1 milhões (ante US$  após a empresa superar distúrbios operacionais ligados ao clima nos meses anteriores — o que manteve a companhia no caminho para cumprir as metas do ano fiscal, apesar do recuo de quase 12% na cesta de preços de PGM t/t [Business Day]. A reportagem cita o CEO Phoevos Pouroulis afirmando que a empresa segue posicionada para entregar o guidance de produção do FY2026, com a recuperação operacional reforçando a confiança nas metas anuais [Business Day].\n\nA Mining Weekly enfatizou o avanço dos projetos de crescimento — mina subterrânea da Tharisa Minerals e Karo Platinum — como o principal destaque do trimestre, ao lado de uma produção descrita como \"estável\" [Mining Weekly].\n\nJá a Miningmx, em nota focada em preços, registrou que a Tharisa vê suporte de preço para PGMs mesmo com enfraquecimento do cromo, atribuído a demanda mais fraca do setor de aço inoxidável (parcialmente ligada ao conflito no Oriente Médio); Pouroulis é citado reafirmando que os fundamentos de médio prazo do mercado seguem favoráveis [Miningmx].\n\nEm conjunto, a leitura da imprensa é de resultado operacional sólido e sem sobressaltos, com o mercado local mais focado nos projetos de crescimento (underground e Karo) e na trajetória de preços de PGM/cromo do que em qualquer surpresa negativa na produção do trimestre."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Fonte primária (tharisa.com) bloqueou acesso automatizado (HTTP 403) durante a pesquisa; dados de produção/preço/caixa foram extraídos da reprodução literal do RNS via TradingView (que redistribui o texto originado no wire da Reuters/LSE RNS) e corroborados por Mining Weekly, IOL e Business Day, todos com os mesmos números — alta confiança de fidelidade ao documento oficial, mas idealmente confirmar contra o PDF original em tharisa.com/sens-rns-announcements.php quando o acesso automatizado permitir. Não foi encontrado AISC/custo unitário específico do Q3 FY2026 (rela Reports Sales Results for the Financial Year Ended 30 June 2026\"","source_url":"https://www.marketscreener.com/news/northam-platinum-holdings-limited-reports-sales-results-for-the-financial-year-ended-30-june-2026-ce7f5edcdb8bf226","captured_at":"2026-07-20T00:00:00Z"}],"tabs":{"earnings_summary":"**Natureza do documento**: este é um relatório de PRODUÇÃO E VENDAS para o ano fiscal encerrado em 30/06/2026 (dois comunicados/SENS separados — produção e vendas —, ambos publicados em 14/07/2026) [SENS/Northam]. NÃO são os resultados financeiros anuais auditados completos, que devem ser divulgados em data posterior; não há aqui DRE, HEPS real do ano ou balanço.\n\n**Produção 4E (Pt+Pd+Rh+Au)**: produção equivalente refinada das operações próprias somou recorde de 938.754 oz, alta de 4,4% a/a [SENS/Northam]. Northam também comprou volume recorde de 158.138 oz-equivalente de terceiros, alta de 24,4% a/a [SENS/Northam]. O resultado de produção própria superou o topo do guidance prévio de 910.000–930.000 oz 4E [SENS/Northam].\n\n**Vendas**: total de metal 4E vendido atingiu recorde de 1,09 milhão de oz, alta de 8% a/a [SENS/Northam].\n\n**Cromita**: produção e vendas de concentrado de cromita atingiram recorde de 1,69 Mt, alta de 17,4% a/a, impulsionada por maior throughput de UG2, melhores teores de alimentação e yields de concentrador — com destaque para Eland, cuja produção de cromo saltou 49,5% para 308.831 t no ano, com yields mais que dobrando no período [SENS/Northam].\n\n**Custos/guidance**: guidance de custo unitário previamente divulgado pela empresa para o FY2026 era de R$ 27.005–28.500 por oz 4E; este release de produção/vendas não traz o número real de custo unitário do ano fechado — não fabricado aqui (ver note_for_reviewer).\n\n**Contexto de lucro (documento separado, mais antigo — não confundir)**: em fevereiro de 2026 a Northam já havia publicado um trading statement para o 1S FY2026 (semestre encerrado em 31/12/2025) projetando HEPS entre 1.518,5 e 1.529,5 cents, ante apenas 61,1 cents no 1S FY2025 — salto expressivo, mas refere-se a um período e documento diferentes do release de produção/vendas do ano fiscal completo aqui resumido [SENS/Northam, trading statement fev/2026].","conference_call_summary":"Não foi localizado transcript de teleconferência associado a este release específico de produção/vendas (relatórios de produção da Northam tipicamente não têm call formal — o call ocorre na divulgação dos resultados financeiros anuais auditados, ainda não publicados). Em declarações à imprensa, o CEO Paul Dunne comentou que a companhia realizou uma meta de longo prazo ao romper a marca de 1 milhão de oz de produção (atingida já em 2025), e reiterou a visão de que a oferta primária global de PGMs deve seguir em declínio \"sem trégua\" ao longo da próxima década, dado o longo prazo de maturação de novos projetos de mina, agravado por oscilações periódicas nos preços da cesta de PGM [Miningmx].","commodity_commentary":"Cobertura da imprensa sul-africana sobre o release de produção/vendas do FY2026 da Northam foi ampla, mas não foram localizadas notas específicas da Bloomberg, Reuters, FT ou WSJ sobre este comunicado até 20/07/2026 — usa-se aqui imprensa regional (Mining Weekly, Business Day, Miningmx) como fallback.\n\nA Mining Weekly classificou o desempenho como \"sólido\", destacando que cada uma das operações da Northam entregou resultado positivo no ano fiscal encerrado em 30/06, com métricas-chave de produção superando o guidance e projetos de desenvolvimento avançando no ritmo esperado [Mining Weekly].\n\nO Business Day deu foco ao recorde em vendas de cromita, enquadrando a diversificação para cromo como estratégia relevante do setor de PGM sul-africano em meio à volatilidade de preços dos metais do grupo da platina — destacando a mina Eland, na província do Noroeste, como motor do crescimento [Business Day].\n\nA Miningmx foi mais específica nos números, confirmando que a produção 4E própria subiu para 938.754 oz (+4,4%) e que a produção de cromita do grupo somou 1,69 Mt, com Eland sozinha saltando 49,5% para 308.831 t. A reportagem também citou o CEO Paul Dunne, que atribuiu o marco de superar 1 milhão de oz de produção a uma meta de longo prazo da gestão, e reforçou visão estrutural de queda na oferta primária de PGM global na próxima década [Miningmx].\n\nEm conjunto, o tom da imprensa é de resultado operacional recorde e sem controvérsia, com a narrativa migrando para a diversificação via cromita como hedge à fraqueza histórica dos preços de PGM — sem, até o momento, comentário específico sobre reação do preço da ação ao release."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Fontes primárias (northam.co.za, JSE SENS) bloquearam acesso automatizado (HTTP 403); dados foram extraídos de reproduções em MarketScreener (que republica o texto do comunicado/SENS) e corroborados por Mining Weekly, Business Day e Miningmx, todos convergindo nos mesmos números — alta confiança, mas recomenda-se validar contra o PDF SENS original quando possível. IMPORTANTE: este é um relatório de PRODUÇÃO E VENDAS, não os resultados financeiros anuais auditados — HEPS/lucro real do FY2026 completo ainda não foi divulgado; o número de HEPS citado (1.518,5–1.529,5 cents) é de um TRADING STATEMENT SEPARADO e mais antigo (fevereiro/2026), referente apenas ao 1S FY2026 (semestre findo em 31/12/2025) — não confundir com o ano fiscal completo. Guidance de custo unitário (R$ 27.005–28.500/oz 4E) é guidance prévio, não o custo real do ano fechado — não localizado no release de produção/vendas. Não foi localizada cobertura de Bloomberg/Reuters/FT especificamente sobre este release — usada imprensa regional como fallback.","commentary_sources":[{"outlet":"Mining Weekly","title":"Northam reports solid full-year production, sales performance","url":"https://www.miningweekly.com/article/northam-reports-solid-full-year-production-sales-perfor apresentação para extrair citações diretas de executivos da teleconferência de resultados do 1S FY2026 (fonte primária bloqueou acesso automatizado — HTTP 403 — no momento da checagem). Reportagens da época (março/2026) não trazem citações textuais de executivos da ARM sobre o resultado, apenas dados numéricos. Não há, portanto, quote direto de management a reportar aqui — lacuna sinalizada em note_for_reviewer.","commodity_commentary":"A cobertura de imprensa abaixo é CONTEMPORÂNEA à divulgação original (março de 2026) — está sendo citada agora, em 20/07/2026, apenas para preencher a lacuna de cobertura deste painel sobre um resultado que já é antigo; não deve ser lida como notícia fresca de hoje.\n\nA Reuters noticiou, em 06/03/2026, que o lucro semestral da ARM subiu 10%, para R$ 1,67 bilhão (US$ 100,59 milhões), no semestre encerrado em 31 de dezembro, com preços mais fortes de PGM compensando a fraqueza nas divisões de minério de ferro, manganês e carvão. A agência destacou que o lucro (headline earnings) das minas de platina Two Rivers e Modikwa mais que dobrou em ambos os casos, no rastro de altas de 44% e 47%, respectivamente, nos preços dos metais realizados — desempenho que ajudou a companhia a superar uma queda de 34% nos lucros combinados de minério de ferro e manganês, além do prejuízo em carvão [Reuters]. A mesma nota, redistribuída pela CNBC Africa, confirma o dividendo intercalar de R$ 5,00/ação (ante R$ 4,50 no ano anterior) [Reuters][CNBC Africa].\n\nNão foram localizadas notas específicas da Bloomberg, FT ou WSJ sobre este resultado da ARM até o momento da checagem — a cobertura relevante disponível é da Reuters (redistribuída via CNBC Africa/TradingView), que atende ao padrão de qualidade exigido pela política de sourcing. Não há, nessas notas, citação textual de executivos da ARM nem reação específica do preço da ação no pregão pós-resultado — esse detalhe não foi encontrado e não deve ser inferido."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Resultado é de 06/03/2026 (1S FY2026, semestre encerrado em 31/12/2025) — ainda não localizada evidência de resultados anuais FY2026 (ano fiscal encerra em 30/06/2026) publicados até 20/07/2026; assim que saírem, devem substituir este filing. Fonte primária oficial identificada (https://arm.co.za/wp-content/uploads/2026/03/SENS_20260306_S518065.pdf) mas bloqueada para acesso automatizado (HTTP 403) durante a pesquisa — dados foram corroborados via Reuters (wire, alta confiabilidade) e reprodução em Listcorp, convergindo nos mesmos números; recomenda-se confirmar contra o PDF original quando possível. Desempenho dos segmentos de ouro e níquel NÃO foi encontrado nas fontes secundárias consultadas — lacuna sinalizada explicitamente, não preenchida com estimativa. Nenhuma citação textual de executivos da ARM foi localizada nas fontes de imprensa contemporâneas — conference_call_summary reflete essa lacuna. Cobertura de imprensa citada é de março/2026 (contemporânea ao release original) — não deve ser tratada como notícia fresca de hoje, conforme regra de atualidade do painel; está sendo adicionada apenas para preencher lacuna histórica de cobertura.","commentary_sources":[{"outlet":"Reuters","title":"African Rainbow Minerals half-year profit up 10% on firmer platinum prices","url":"https://www.tradingview.com/news/reuters.com,2026:newsml_TUCBH4HGG:0-african-rainbow-minerals-half-year-profit-up-10-on-firmer-platinum-prices/","captured_at":"2026-03-06T00:00:00Z"},{"outlet":"CNBC Africa","title":"African Rainbow Minerals half-year profit up 10% on firmer platinum prices","url":"https://www.cnbcafrica.com/2026/african-rainbow-minerals-half-year-profit-up-10-on-firmer-platinum-prices","captured_at":"2026-03-06T00:00:00Z"}]},"aurubis":{"company_id":"aurubis","accession_number":null,"company_name":"Aurubis AG","commodities":["copper"],"document_type":"earnings","document_type_label":"Earnings Completo (Relatório do 1º Semestre FY25/26)","sources":[{"filename":"Aurubis_Interim_report_Q2_2025_26.pdf","label":"Relatório de Interim do 1º Semestre FY25/26 (out/2025-mar/2026) — Aurubis IR","source_url":"https://www.aurubis.com/dam/jcr:7c0020b1-468a-4ddd-a632-bf54b2f6764b/Aurubis_Interim%20report_Q2_2025_26.pdf","captured_at":"2026-07-20T00:00:00Z"},{"filename":"aurubis-achieves-improved-quarterly-result-and-increases-202526-forecast.html","label":"Comunicado ad-hoc de resultados preliminares e revisão de guidance — título original: \"Aurubis achieves improved quarterly result and increases 2025/26 forecast\"","source_url":"https://www.aurubis.com/en/media/press-releases/press-releases-2026/aurubis-achieves-improved-quarterly-result-and-increases-202526-forecast","captured_at":"2026-07-20T00:00:00Z"},{"filename":"aurubis-delivers-improved-performance-increased-quarterly-result-and-higher-forecast.html","label":"Press release do relatório completo — título original: \"Aurubis delivers improved performance: Increased quarterly result and higher forecast\"","source_url":"https://www.aurubis.com/en/media/press-releases/press-releases-2026/aurubis-delivers-improved-performance-increased-quarterly-result-and-higher-forecast","captured_at":"2026-07-20T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultado do 1S FY2025/26 (outubro/2025–março/2026)**: EBT operacional (ajustado) somou €226 milhões no semestre, praticamente estável frente aos €229 milhões do 1S FY2024/25 [PR]. EBITDA operacional cresceu 3% para €351 milhões (vs. €341 milhões) [PR]. Isoladamente no 2T FY25/26 (jan-mar/2026), EBT operacional foi de €121 milhões (+15% t/t sobre €105 milhões no 1T) e EBITDA operacional trimestral de €187 milhões (vs. €164 milhões no 1T) [PR]. Lucro líquido consolidado do 2T FY25/26 isolado (não do semestre completo — dado semestral de net income não localizado nas fontes disponíveis) somou €479 milhões, mais que o dobro do mesmo trimestre do ano anterior (€163 milhões) [PR].\n\n**Drivers do resultado**: preços de metais em patamar elevado — com destaque para metais preciosos —, margens melhores no processamento de material reciclado, e receita de ácido sulfúrico acima do já elevado nível do ano anterior por maior volume vendido; leve alta também nas vendas de produtos de cobre [PR].\n\n**Guidance revisado (2ª elevação no ano)**: EBT operacional do FY25/26 elevado de €375–475 milhões para €425–525 milhões; guidance de EBITDA operacional elevado para €700–800 milhões; ROCE operacional revisado de 9-11% para 10-12% [PR].\n\n**Segmentos**: as fontes primárias disponíveis (comunicados à imprensa) não trazem quebra numérica completa de receita/EBT por segmento (Multimetal Recycling, Custom Smelting & Products, Products) para o semestre fechado — apenas indicação qualitativa de que reciclagem e ácido sulfúrico foram os principais vetores positivos. Recomenda-se consultar o PDF do relatório completo (fonte listada) para o detalhamento segment-by-segment antes de qualquer decisão de alocação que dependa dessa granularidade.","conference_call_summary":"Teleconferência de resultados realizada em 11/05/2026, com CEO Dr. Toralf Haag e CFO Steffen Hoffmann. Segundo cobertura especializada do call (agregadores financeiros que acompanharam a ligação ao vivo — ver nota de sourcing abaixo), Haag declarou: \"The higher Q2 result shows: Aurubis delivers reliability, even with challenging market and geopolitical parameters. A considerably improved operating result and higher quarter-over-quarter EBITDA underscore our continued success.\" A administração reiterou expectativa de preços de metais permanecendo em patamar elevado no 2S FY25/26, margens de reciclagem melhores que o inicialmente previsto, e recuperação nas receitas de ácido sulfúrico no 2S.\n\n**Nota de sourcing**: o acesso automatizado direto às páginas de aurubis.com e às plataformas de transcrição (Investing.com, Seeking Alpha, Yahoo Finance) foi bloqueado nesta sessão de pesquisa (erro 403 consistente). A citação acima foi reconstruída a partir de agregadores financeiros que cobriram o call, não da transcrição primária. Antes de citar esta fala em material formal para o investidor, recomenda-se confirmar o texto exato contra a transcrição oficial da Aurubis.","commodity_commentary":"Cobertura de imprensa financeira internacional de peso (Bloomberg, Reuters, FT, WSJ) especificamente sobre este resultado não foi localizada nesta pesquisa — busca extensiva não retornou matéria dedicada dessas fontes ao 1S FY25/26 da Aurubis, apenas menções tangenciais em contexto geral de preços de cobre. Como fallback, permitido pela regra de sourcing, usa-se aqui trade press internacional e imprensa financeira alemã.\n\n**Mining.com** noticiou a elevação de guidance da Aurubis, destacando que a companhia elevou pela segunda vez no ano a projeção de EBT operacional para €425-525 milhões, citando preços de metais e margens de reciclagem como vetores [Mining.com].\n\n**Aktiencheck.de** (imprensa financeira alemã) chamou atenção para uma reação de mercado contraintuitiva: apesar da revisão para cima do guidance, a ação da Aurubis caiu no pregão de divulgação (08/05/2026) — a própria manchete resume o contraste: \"Gewinnprognose steigt kräftig – Börse reagiert eiskalt\" (\"guidance sobe forte — mercado reage com indiferença gelada\") [Aktiencheck.de].\n\n**Resource Recycling** (trade press do setor de reciclagem de metais) classificou o resultado como \"sinal positivo para os mercados de recuperação de metais\", com foco na margem de processamento de sucata [Resource Recycling].\n\nLeitura: o mercado parece já ter precificado boa parte da melhora operacional antes do anúncio; a reação negativa de curto prazo na ação não deve ser confundida com deterioração fundamental — os números em si (EBT, EBITDA, guidance) foram todos positivos e confirmados por múltiplas fontes independentes."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"O relatório do 1S FY25/26 (out/2025-mar/2026) foi de fato publicado em 11/05/2026 (com ad-hoc preliminar em 08/05/2026) e nunca havia sido capturado neste painel — gap agora preenchido. Confirmei via múltiplas buscas que resultados de Q3 FY25/26 (abr-jun/2026) AINDA NÃO tinham sido divulgados até a data desta pesquisa (20/07/2026); divulgação esperada para início de agosto/2026 — checar novamente então e substituir este registro pelo Q3/9M quando disponível. Cobertura de imprensa citada é contemporânea ao release original (maio/2026), não notícia fresca de hoje — sendo adicionada apenas para preencher lacuna de cobertura.\n\nLimitação importante desta pesquisa: o acesso direto (WebFetch) a aurubis.com e a várias fontes de imprensa foi bloqueado por política de rede desta sessão (erro 403 consistente em múltiplos domínios). Os dados acima foram reconstruídos via resultados de busca que citam e sintetizam essas páginas, com checagem cruzada entre no mínimo 2 fontes independentes para cada número reportado. Um número isolado (receita do semestre de ~€11,3 bilhões, +23% a/a) apareceu em apenas uma síntese de busca e NÃO foi incluído por falta de segunda confirmação. Quebra de receita/EBT por segmento para o semestre fechado não foi confirmada com números específicos nesta pesquisa — apenas indicação qualitativa.","commentary_sources":[{"outlet":"Mining.com","title":"Aurubis raises 2026 profit guidance","url":"https://www.mining.com/web/aurubis-raises-2026-profit-guidance/","captured_at":"2026-05-11T00:00:00Z"},{"outlet":"Aktiencheck.de","title":"Aurubis Aktie: Gewinnprognose steigt kräftig - Börse reagiert eiskalt","url":"https://www.aktiencheck.de/analysen/Artikel-Aurubis_Aktie_Gewinnprognose_steigt_kraeftig_Boerse_reagiert_eiskalt-19745799","captured_at":"2026-05-08T00:00:00Z"},{"outlet":"Resource Recycling","title":"Aurubis sends positive signal for metals recovery markets","url":"https://resource-recycling.com/e-scrap/2026/05/18/aurubis-sends-positive-signal-for-metals-recovery-markets/","captured_at":"2026-05-18T00:00:00Z"}]},"ivanhoe-mines":{"company_id":"ivanhoe-mines","accession_number":null,"company_name":"Ivanhoe Mines Ltd.","commodities":["copper","zinc"],"document_type":"production_report","document_type_label":"Relatório de Produção Trimestral (Q2 2026)","sources":[{"filename":"ivanhoe-mines-q2-2026-production-release.html","label":"Press release da empresa — título original: \"Ivanhoe Mines Reports 64,328 Tonnes of Copper Produced by Kamoa-Kakula in Q2 2026\"","source_url":"https://www.ivanhoemines.com/news-stories/news-release/ivanhoe-mines-reports-64328-tonnes-of-copper-produced-by-kamoa-kakula-in-q2-2026/","captured_at":"2026-07-08T00:00:00Z"}],"tabs":{"earnings_summary":"**Kamoa-Kakula (cobre)** — Produção total do Q2 2026 de 64.328 t de cobre em anodo/blister/concentrado saleável [PR], composta por 62.072 t de anodo do smelter on-site + 2.256 t de blister da Lualaba Copper Smelter (LCS) + remanescente em concentrado de escória saleável [PR]. Os concentradores Fase 1, 2 e 3 processaram 2,97 Mt de minério, produzindo 61.134 t de cobre em concentrado [PR]. A LCS operou com parada de 56 dias no trimestre, retomando operação normal em 1º de julho de 2026 [PR]. O smelter de Kamoa-Kakula — o maior da África — produziu 112.307 t de ácido sulfúrico de alta resistência, com contratos de julho precificados a ~US$ 840/t [PR]. **Guidance mantido**: 290.000–330.000 t de cobre (anodo/blister) para 2026 e 380.000–420.000 t para 2027; o plano de mina atualizado sustenta produção de ~500.000 t/ano a partir de 2028, com Fases 1, 2 e 3 operando em regime estável de 17 Mtpa [PR]. Para o H2 2026, a empresa projeta taxa de mineração 30% maior (8,5 Mtpa) e conclusão do \"Project 95\", que deve elevar a recuperação dos concentradores Fase 1 e 2 a partir do Q3 2026, além de destocking do inventário de cobre acumulado [PR].\n\n**Kipushi (zinco)** — Produção recorde de 70.177 t de zinco em concentrado no Q2 2026, alta de 8% QoQ e sétimo trimestre consecutivo de crescimento; equivalente anualizado de ~280.000 t [PR]. Recordes no trimestre: 200.774 t de minério moído, teor de alimentação de 38,7% Zn e recuperação do concentrador de 92% [PR]. Guidance 2026 mantido em 240.000–290.000 t de zinco em concentrado, com produção tracionando para o topo da faixa [PR].\n\n**Projetos** — Comissionamento da usina solar híbrida de 60 MW com armazenamento em baterias em andamento em Kamoa-Kakula, com rampa para capacidade plena até o fim do Q3 2026; é a maior instalação híbrida solar+bateria de uma mineradora no continente africano, com plano de dobrar a capacidade on-site para 120 MW até o fim de 2027 [PR]. No Western Foreland, a empresa segue explorando licenças com participação de 54–100%, em área mais de cinco vezes maior que o complexo Kamoa-Kakula adjacente, mirando novas descobertas de cobre sedimentar e a expansão dos alvos de alto teor Makoko, Kiala e Kitoko como próximos projetos de desenvolvimento; atualização de recursos minerais do Western Foreland era esperada para meados de julho [PR].\n\n**Importante**: este release cobre SOMENTE dados de produção. Os resultados financeiros completos do Q2 2026 (incluindo custos C1/AISC e caixa) serão divulgados após o fechamento de mercado em 29/07/2026, com conference call em 30/07/2026 [PR].","conference_call_summary":"Não houve conference call associado a este release — trata-se de um comunicado operacional (production update), não do earnings release trimestral. A Ivanhoe Mines confirmou que os resultados financeiros completos do Q2 2026 serão publicados após o fechamento de mercado em 29 de julho de 2026, com conference call para investidores marcado para 30 de julho de 2026 [PR]. Nenhuma citação executiva (ex.: Robert Friedland) constava no texto do release consultado.","commodity_commentary":"Cobertura de imprensa especializada em mineração africana replicou os números do release no mesmo dia. O **Mining Weekly** (África do Sul, veículo de referência para o setor no continente) publicou em 08/07/2026 a matéria \"Kamoa-Kakula's second-quarter output reached 64 328 t of copper – Ivanhoe\", confirmando a produção trimestral de cobre e contextualizando-a dentro do cinturão de cobre da RDC [Mining Weekly]. O **African Mining Market** também noticiou o resultado, destacando o recorde de zinco em Kipushi e o avanço da usina solar híbrida de 60 MW como sinais de execução operacional consistente em meio à recuperação pós-problemas de 2025 em Kamoa-Kakula [African Mining Market]. Não foi localizada cobertura dedicada da Bloomberg, Reuters ou FT especificamente sobre este production update — padrão comum para releases operacionais intermediários (vs. o earnings completo, que sai em 29/07), quando a atenção da imprensa financeira tende a ser mais escassa do que em divulgações de resultados."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Release cobre apenas dados de produção; AISC/custo caixa C1 e posição de caixa NÃO estão disponíveis até a divulgação financeira completa de 29/07/2026 (call em 30/07) — recomenda-se nova atualização após essa data. Não encontrei cobertura da Bloomberg/Reuters/FT especificamente sobre este release; usei Mining Weekly e African Mining Market como fallback regional. Fetch direto ao domínio ivanhoemines.com retornou 403/bloqueio de rede neste ambiente, mas o conteúdo foi cross-checado em múltiplas fontes secundárias que replicam o texto verbatim do PR.","commentary_sources":[{"outlet":"Mining Weekly","title":"Kamoa-Kakula's second-quarter output reached 64 328 t of copper – Ivanhoe","url":"https://www.miningweekly.com/article/kamoa-kakulas-second-quarter-output-reached-64-328-t-of-copper-ivanhoe-2026-07-08","captured_at":"2026-07-08T00:00:00Z"},{"outlet":"African Mining Market","title":"Ivanhoe Mines powers ahead with strong Q2 2026 production and innovations","url":"https://africanminingmarket.com/ivanhoe-mines-powers-ahead-with-strong-q2-2026-production-and-innovations/26252/","captured_at":"2026-07-20T00:00:00Z"}]},"novatek":{"company_id":"novatek","accession_number":null,"company_name":"PJSC NOVATEK","commodities":["natural gas","LNG","gas condensate"],"document_type":"production_report","document_type_label":"Dados Operacionais Preliminares (Q2 / H1 2026)","sources":[{"filename":"novatek-preliminary-operating-data-q2-h1-2026.html","label":"Press release da empresa — título original: \"NOVATEK Reports Preliminary Operating Data for the Second Quarter and First Half 2026\"","source_url":"https://www.novatek.ru/en/press/releases/index.php?id_4=7805","captured_at":"2026-07-13T00:00:00Z"}],"tabs":{"earnings_summary":"**H1 2026** — Produção total de hidrocarbonetos de 346,2 mmboe, composta por 43,68 bcm de gás natural + 7,14 mmt de líquidos (condensado de gás e petróleo), alta de 9,5 mmboe (+2,8%) frente ao H1 2025 [PR].\n\n**Q2 2026** — Produção total de hidrocarbonetos de 171,5 mmboe, composta por 21,65 bcm de gás natural + 3,52 mmt de líquidos, alta de 3,9 mmboe (+2,3%) frente ao Q2 2025 [PR].\n\n**Vendas** — Vendas totais de gás natural (incluindo volumes de GNL vendidos) somaram 18,1 bcm no Q2 e 39,4 bcm no H1 2026; vendas totais de líquidos somaram 4,7 mmt no Q2 e 8,9 mmt no H1 2026 [PR].\n\n**Importante — escopo e limitações**: este release contém EXCLUSIVAMENTE dados operacionais preliminares (produção e vendas de volumes), explicitamente classificados pela própria empresa como \"preliminary and subject to adjustment\" [PR]. Não há demonstrações financeiras (IFRS), não há detalhamento de receita/custo/EBITDA, e não há quebra específica de volumes por ativo neste comunicado [PR]. Este padrão de divulgação mínima é consistente com o status da Novatek como emissor russo sob sanções ocidentais.","conference_call_summary":"A Novatek não realiza conference call associado a este tipo de release de dados operacionais preliminares — não há webcast, transcript ou citação executiva neste comunicado. Não há demonstrações financeiras IFRS completas divulgadas para o H1 2026 até o momento desta pesquisa (20/07/2026).","commodity_commentary":"Cobertura de imprensa financeira ocidental sobre este release específico é escassa, como esperado para um emissor russo sancionado. O veículo especializado em GNL **LNG Prime** publicou a matéria \"Novatek's gas sales slightly up in Q2\", reportando as vendas de gás natural de 18,1 bcm no trimestre (alta de 0,4% frente ao Q2 2025) e destacando que a Novatek NÃO discriminou, neste release, qual parcela das vendas correspondeu especificamente a GNL — um gap de transparência que o próprio veículo aponta [LNG Prime]. Não foi localizada cobertura da Bloomberg, Reuters, FT ou WSJ especificamente sobre este release de dados operacionais do Q2/H1 2026."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"ATENÇÃO — emissor sob sanções ocidentais (EUA/UE) com disclosure limitado por design: este release traz SOMENTE volumes preliminares de produção/vendas, sem qualquer dado financeiro (IFRS não divulgado para H1 2026 até 20/07/2026). Cobertura de imprensa financeira ocidental é praticamente inexistente para este release específico — usei LNG Prime (trade press de GNL, editorialmente independente) como única fonte. A TASS (agência estatal russa) também noticiou os mesmos números, mas foi deliberadamente excluída por não ser imprensa financeira independente. Fetch direto a novatek.ru retornou bloqueio de rede neste ambiente; dados cross-checados via múltiplas fontes que citam o texto do PR.","commentary_sources":[{"outlet":"LNG Prime","title":"Novatek's gas sales slightly up in Q2","url":"https://lngprime.com/corporate/novateks-gas-sales-slightly-up-in-q2/191965/","captured_at":"2026-07-20T00:00:00Z"}]},"aker-bp":{"company_id":"aker-bp","accession_number":null,"company_name":"Aker BP ASA","commodities":["oil","gas"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"second-quarter-2026-results.html","label":"Press release da empresa — título original: \"Second quarter 2026 results\" (børsmelding / comunicado ao mercado, Oslo Børs)","source_url":"https://akerbp.com/en/borsmelding/second-quarter-2026-results-2/","captured_at":"2026-07-20T00:00:00Z"},{"filename":"aker-bp-second-quarter-2026-results-302825976.html","label":"Distribuição via PR Newswire/Cision do mesmo comunicado","source_url":"https://www.prnewswire.com/news-releases/aker-bp-second-quarter-2026-results-302825976.html","captured_at":"2026-07-20T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 2T26 (trimestre encerrado em 30/06/2026), divulgados em 15/07/2026** [PR].\n\n**Resultado consolidado:**\n- Receita total (total income): US$ 3,7 bilhões, alta de 22% a/a, impulsionada por preços de óleo realizados mais altos [PR].\n- EBITDA: US$ 3,4 bilhões, alta de 51% a/a [PR].\n- Lucro líquido: US$ 521 milhões (US$ 0,82/ação), revertendo prejuízo de US$ 324 milhões (US$ -0,51/ação) no 2T25 — prejuízo do ano anterior associado a impairment, segundo fontes secundárias (não confirmado no documento primário) [PR].\n- Lucro por ação ajustado (excluindo impairment): US$ 1,15 — acima da expectativa de consenso de ~US$ 0,96 [PR].\n- Fluxo de caixa operacional: US$ 3,1 bilhões — recorde histórico trimestral da companhia [PR].\n- Liquidez disponível: US$ 6,0 bilhões [PR].\n\n**Produção:**\n- Produção líquida média: 383,6 mil boe/d, ante 415,0 mil boe/d no 2T25, refletindo parada programada de manutenção [PR].\n- Preço realizado de óleo: US$ 110/bbl; preço realizado de líquidos: US$ 108/bbl [PR].\n\n**Guidance e capex 2026:**\n- Guidance de produção: estreitada para 380–400 mil boe/d, elevando o piso da faixa anterior (370–400 mil boe/d) [PR].\n- Guidance de capex: elevada para US$ 6,8–7,2 bilhões (de US$ 6,2–6,7 bilhões) [PR].\n\n**Dividendo:**\n- Dividendo trimestral mantido em US$ 0,6615/ação [PR].\n\n**Projetos principais:**\n- Yggdrasil: topside do Hugin B instalado offshore no início de julho; sistema de power-from-shore comissionado em junho [PR].\n- Valhall PWP-Fenris e Skarv Satellite seguem no cronograma, com início de operação visado para 2027 [PR].","conference_call_summary":"Citações do CEO Karl Johnny Hersvik no press release:\n\n\"Aker BP delivered strong operational performance in the second quarter, demonstrating the quality, resilience and efficiency of our portfolio. Combined with higher realised oil prices, this resulted in operating cash flow of USD 3.1 billion – the highest quarterly operating cash flow in Aker BP's history. We remain focused on what we can control: safe operations, high efficiency, low costs and continuous improvement across the value chain.\"\n^Tradução livre: \"A Aker BP entregou forte desempenho operacional no segundo trimestre, demonstrando a qualidade, resiliência e eficiência do nosso portfólio. Combinado a preços de óleo realizados mais altos, isso resultou em fluxo de caixa operacional de US$ 3,1 bilhões — o maior fluxo de caixa operacional trimestral da história da Aker BP. Seguimos focados no que podemos controlar: operações seguras, alta eficiência, baixos custos e melhoria contínua ao longo da cadeia de valor.\"\n\n\"Our major development projects are moving steadily towards start-up in 2027, and the execution teams have reached important milestones. At Yggdrasil, the commissioning of the power-from-shore system and the offshore installation of the Hugin B topside mark significant progress. The Hugin B sailaway also concludes our project period at Verdal, where teams and suppliers have delivered high-quality work over several years.\"\n^Tradução livre: \"Nossos principais projetos de desenvolvimento avançam de forma constante rumo ao início de operação em 2027, e as equipes de execução atingiram marcos importantes. No Yggdrasil, o comissionamento do sistema de power-from-shore e a instalação offshore do topside do Hugin B marcam um progresso significativo. A saída do Hugin B de Verdal também encerra nosso período de projeto ali, onde equipes e fornecedores entregaram trabalho de alta qualidade ao longo de vários anos.\"\n\nNão foi localizada transcrição completa e verbatim da teleconferência de resultados (apenas trechos via agregadores); as citações acima vêm do texto do press release oficial.","commodity_commentary":"O resultado do 2T26 da Aker BP foi recebido como forte do ponto de vista operacional e de geração de caixa, mas com ressalvas sobre o ritmo de investimento. O lucro líquido de US$ 521 milhões reverteu o prejuízo de US$ 324 milhões no 2T25, e o EPS ajustado de US$ 1,15 superou a expectativa de consenso de ~US$ 0,96 [Investing.com]. O fluxo de caixa operacional recorde de US$ 3,1 bilhões foi destacado como o principal ponto positivo do trimestre, refletindo preços de óleo realizados mais altos (US$ 110/bbl) em meio a tensões geopolíticas no Oriente Médio que sustentaram os preços do petróleo ao longo do trimestre [Investing.com].\n\nA imprensa especializada em óleo & gás destacou o aumento simultâneo da guidance de capex 2026 (para US$ 6,8–7,2 bilhões, de US$ 6,2–6,7 bilhões) para acomodar o avanço dos grandes projetos (Yggdrasil, Valhall PWP-Fenris, Skarv Satellite) rumo a start-up em 2027, o que gerou alguma cautela entre investidores quanto à trajetória de retorno de caixa via dividendos nos próximos trimestres [World Oil]. A companhia manteve o dividendo trimestral em US$ 0,6615/ação, sinalizando compromisso com a política de distribuição apesar do maior capex [Investing.com][Offshore Engineer].\n\nNão foi localizada cobertura dedicada da Bloomberg, Reuters, FT ou WSJ especificamente sobre a reação de mercado a este resultado — a análise disponível veio de Investing.com (agregador financeiro com reportagem própria) e de imprensa especializada em óleo & gás (World Oil, Offshore Engineer), usadas aqui como fallback conforme regra de sourcing."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Tentativas de acessar diretamente o press release primário (akerbp.com e a distribuição via PR Newswire) retornaram HTTP 403 em todas as tentativas — bloqueio do próprio site (anti-bot), não da política de proxy da sessão. Dados extraídos via múltiplas fontes secundárias (StockTitan, GuruFocus, Investing.com, World Oil, Offshore Engineer) que citam o release e batem entre si nos números centrais (lucro líquido US$ 521mi, fluxo de caixa operacional US$ 3,1bi, dividendo US$ 0,6615/ação). O comparativo do prejuízo de US$ 324 milhões no 2T25 e sua atribuição a impairment não pôde ser confirmado no documento primário. Recomenda-se reconfirmar diretamente no akerbp.com quando o site estiver acessível, e localizar a data de pagamento/registro do dividendo trimestral, que não foi encontrada nas fontes consultadas. Nenhuma cobertura da Bloomberg/Reuters/FT/WSJ especificamente sobre a reação a este resultado foi localizada; usei Investing.com e imprensa especializada em O&G como fallback.","commentary_sources":[{"outlet":"Investing.com","title":"Aker BP Q2 profit jumps on higher oil prices, ramps up project spending for growth","url":"https://www.investing.com/news/earnings/aker-bp-q2-profit-jumps-on-higher-oil-prices-ramps-up-project-spending-for-growth-4792142","captured_at":"2026-07-20T00:00:00Z"},{"outlet":"World Oil","title":"Aker BP narrows 2026 production guidance as major Norway projects advance","url":"https://worldoil.com/news/2026/7/15/aker-bp-narrows-2026-production-guidance-as-major-norway-projects-advance/","captured_at":"2026-07-20T00:00:00Z"},{"outlet":"Offshore Engineer","title":"Aker BP Profit Surges on Higher Oil Prices","url":"https://www.oedigital.com/news/541237-aker-bp-profit-surges-on-higher-oil-prices","captured_at":"2026-07-20T00:00:00Z"}]},"platinum-group-metals-ltd":{"company_id":"platinum-group-metals-ltd","accession_number":"0001062993-26-003677","company_name":"Platinum Group Metals Ltd.","commodities":["platinum","palladium"],"document_type":"quarterly_results","document_type_label":"Resultados do Terceiro Trimestre Fiscal 2026","sources":[{"filename":"exhibit99-6.htm","label":"Press release da empresa — título original: \"Platinum Group Metals Ltd. Reports Third Quarter 2026 Results\" (Anexo 99.6 ao Formulário 6-K)","source_url":"https://www.sec.gov/Archives/edgar/data/0001095052/000106299326003677/exhibit99-6.htm","captured_at":"2026-07-20T00:00:00Z"},{"filename":"Platinum-Group-Metals-Ltd.-Reports-Third-Quarter-2026-Results.html","label":"Distribuição via Newsfile Corp do mesmo comunicado","source_url":"https://www.newsfilecorp.com/release/305020/Platinum-Group-Metals-Ltd.-Reports-Third-Quarter-2026-Results","captured_at":"2026-07-20T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 3T fiscal 2026 (trimestre encerrado em 31/05/2026), divulgados em 15/07/2026** — a Platinum Group Metals é uma developer pré-receita, sem produção comercial; o ativo principal é o projeto Waterberg (Bushveld Complex, África do Sul), planejado como mina subterrânea mecanizada de platina/paládio/ródio/ouro (4E) com subprodutos de cobre e níquel [PR].\n\n**Resultado consolidado (acumulado dos nove meses fiscais, 01/09/2025–31/05/2026):**\n- Prejuízo líquido: US$ 2,88 milhões (US$ 0,02/ação, básico e diluído), ante prejuízo de US$ 3,40 milhões no mesmo período do ano anterior [PR].\n- Receita financeira (finance income): US$ 0,97 milhão [PR].\n- Sem receita operacional — companhia pré-produção [PR].\n- Prejuízo líquido isolado do 3T (3 meses) não confirmado nas fontes consultadas; apenas o acumulado de 9 meses foi localizado com confiança (ver nota do revisor).\n\n**Posição de caixa:**\n- Caixa e equivalentes de caixa: US$ 44,682 milhões em 31/05/2026, ante apenas US$ 0,417 milhão em 31/08/2025 — forte reforço de liquidez via emissões de ações no programa ATM [PR].\n\n**Projeto Waterberg:**\n- Gastos do trimestre no projeto: ~US$ 1,8 milhão [PR].\n- Custos líquidos capitalizados acumulados: US$ 55,2 milhões; gasto total no projeto desde o início: ~US$ 92,9 milhões [PR].\n- Estudo T-Zone: em 08/05/2026, na assembleia geral (AGM) da Waterberg JV Co., foi aprovado orçamento suplementar de R$ 27,4 milhões de rand (~US$ 1,69 milhão) para financiar a parcela do fiscal 2026 de um estudo de mineração (T-Zone Mining Study), que avalia a viabilidade de desenvolver o Waterberg em fases, começando por uma mina T-Zone menor e de menor custo [PR].\n\n**Financiamento (programa ATM):**\n- Programa ATM 2025 (encerrado): captou US$ 50,0 milhões brutos com a venda de 22.726.804 ações ordinárias a preço médio de US$ 2,20 [PR].\n- Novo programa ATM 2026: permite captar até US$ 60,0 milhões em ações até 13/12/2026; já captou US$ 2,01 milhões brutos no 3T fiscal 2026 [PR].","conference_call_summary":"Não foi localizada transcrição de teleconferência de resultados para o 3T fiscal 2026, nem citação direta do CEO Frank R. Hallam (President, CEO e Diretor da companhia) no material disponível para consulta. Companhias júnior deste porte frequentemente não realizam call trimestral formal, divulgando apenas o press release com o MD&A. Recomenda-se checar diretamente o site da Platinum Group Metals (plgmtd.com) ou o Formulário 6-K completo no SEDAR+/SEC (que inclui o MD&A na íntegra) caso uma citação executiva seja necessária para uso posterior.","commodity_commentary":"Não foi possível confirmar cobertura de imprensa de primeira linha (Bloomberg, Reuters, FT, WSJ) nem de veículos especializados em mineração/PGM (Mining.com, Mining Weekly, Kitco) especificamente sobre o resultado do 3T fiscal 2026 da Platinum Group Metals. As buscas retornaram apenas republicações do próprio press release via serviços de distribuição de wire (Newsfile Corp, StockTitan, TradingView, Investing News Network, Barchart, Yahoo Finance) — nenhuma delas constitui reportagem jornalística independente com análise de mercado sobre o resultado.\n\nA cobertura da Kitco no período (
