<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>:root{color-scheme:light}body{margin:0;padding:0}</style>

<body>

<title>Commodity Earnings Monitor</title>
<style>
  :root {
    --bg: #15130f;
    --bg-elevated: #1b1815;
    --bg-inset: #0f0d0a;
    --border: #2b2620;
    --text: #e9e3d7;
    --text-muted: #948c7d;
    --text-faint: #635d51;
    --text-ghost: #4a453b;
    --accent: #c97a44;
    --warn: #b8944a;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f2ec; --bg-elevated: #fbfaf6; --bg-inset: #ece9e0;
      --border: #ddd8ca; --text: #24211b; --text-muted: #6d6759; --text-faint: #9a927f; --text-ghost: #bab294;
      --accent: #a9602f; --warn: #8a6a2a;
    }
  }
  :root[data-theme="dark"] {
    --bg: #15130f; --bg-elevated: #1b1815; --bg-inset: #0f0d0a;
    --border: #2b2620; --text: #e9e3d7; --text-muted: #948c7d; --text-faint: #635d51; --text-ghost: #4a453b;
    --accent: #c97a44; --warn: #b8944a;
  }
  :root[data-theme="light"] {
    --bg: #f4f2ec; --bg-elevated: #fbfaf6; --bg-inset: #ece9e0;
    --border: #ddd8ca; --text: #24211b; --text-muted: #6d6759; --text-faint: #9a927f; --text-ghost: #bab294;
    --accent: #a9602f; --warn: #8a6a2a;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 15px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent); color: var(--bg); }

  .shell { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;
    padding: 16px 28px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .topbar .brand { font-family: var(--mono); font-size: 13.5px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar .meta { font-family: var(--mono); font-size: 12px; color: var(--text-faint); display: flex; gap: 18px; flex-wrap: wrap; }
  .topbar .meta strong { color: var(--text-muted); font-weight: 500; font-variant-numeric: tabular-nums; }
  .topbar .spacer { flex: 1; }
  .topbar .schedule { font-family: var(--mono); font-size: 12px; color: var(--text-faint); }

  .layout { display: flex; flex: 1; min-height: 0; }

  .rail { width: 296px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .rail-search { padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .rail-search input {
    width: 100%; background: var(--bg-inset); border: 1px solid var(--border); color: var(--text);
    font-family: var(--sans); font-size: 13px; padding: 7px 10px; border-radius: 5px; outline: none;
  }
  .rail-search input:focus { border-color: var(--accent); }
  .rail-search input::placeholder { color: var(--text-faint); }
  .rail-legend { display: flex; gap: 12px; padding: 8px 16px; font-family: var(--mono); font-size: 10px; color: var(--text-faint); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .rail-legend span { display: inline-flex; align-items: center; gap: 4px; }
  .rail-legend .dot { width: 5px; height: 5px; border-radius: 50%; }

  .rail-scroll { flex: 1; overflow-y: auto; padding: 8px 0 24px; }
  .rail-group h3 {
    font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-faint); margin: 16px 16px 6px; display: flex; justify-content: space-between;
  }
  .rail-group h3 .count { color: var(--text-ghost); }
  .rail-group:first-child h3 { margin-top: 8px; }
  .company-row {
    display: flex; align-items: baseline; gap: 8px; padding: 5px 24px; cursor: pointer;
  }
  .company-row:hover .name { color: var(--text); }
  .company-row.active .name { color: var(--text); }
  .company-row.active .ticker { color: var(--accent); }
  .company-row .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  .company-row .dot.new { background: var(--accent); }
  .company-row .dot.gap { background: var(--warn); }
  .company-row .dot.needs_verification { background: none; border: 1px solid var(--text-faint); }
  .company-row .dot.clear { background: transparent; }
  .company-row .dot.not_traded { background: transparent; }
  .company-row .ticker { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); min-width: 40px; }
  .company-row .name { font-size: 12.5px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .company-row.not-traded { opacity: 0.55; }
  .company-row.not-traded .name { font-size: 12px; }
  .company-row.hidden { display: none; }
  .rail-group.hidden { display: none; }

  .main { flex: 1; min-width: 0; overflow-y: auto; }
  .main-inner { max-width: 720px; margin: 0 auto; padding: 32px 32px 80px; }

  .empty-state { max-width: 560px; margin: 90px auto 0; padding: 0 32px; }
  .empty-state h2 { font-size: 16px; font-weight: 600; margin: 0 0 8px; color: var(--text); }
  .empty-state p { font-size: 13.5px; color: var(--text-muted); margin: 0 0 6px; }
  .empty-state .meta-line { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); margin-top: 14px; }

  .filing-head { margin-bottom: 8px; }
  .filing-head .toprow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .filing-head .commodities {
    font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-faint);
  }
  .doc-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border); color: var(--text-muted);
  }
  .doc-badge.trading_update { color: var(--warn); border-color: var(--warn); }
  .doc-badge.earnings { color: var(--accent); border-color: var(--accent); }
  .filing-head h1 { font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; text-wrap: balance; }
  .filing-head .sub { font-family: var(--mono); font-size: 12px; color: var(--text-faint); }
  .filing-head .sub span + span::before { content: " · "; }

  .sources { margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); }
  .sources .label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 8px; }
  .source-item { display: flex; gap: 10px; align-items: baseline; font-size: 12.5px; padding: 3px 0; color: var(--text-muted); }
  .source-item .src-code { font-family: var(--mono); font-weight: 600; color: var(--text-faint); min-width: 16px; flex-shrink: 0; }
  .source-item a { color: var(--text-muted); text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 2px; }
  .source-item a:hover { color: var(--text); text-decoration-color: var(--text-faint); }
  .source-item .captured { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); margin-left: auto; flex-shrink: 0; font-variant-numeric: tabular-nums; }

  .tabs { display: flex; gap: 26px; margin: 30px 0 0; border-bottom: 1px solid var(--border); }
  .tab-btn {
    font-family: var(--sans); font-size: 13.5px; font-weight: 500; background: none; border: none; cursor: pointer;
    padding: 10px 0; color: var(--text-faint); border-bottom: 1px solid transparent; transform: translateY(1px);
  }
  .tab-btn:hover { color: var(--text-muted); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .tabpanel { display: none; padding-top: 26px; }
  .tabpanel.active { display: block; }
  .tabpanel p { margin: 0 0 15px; font-size: 14px; color: var(--text); }
  .tabpanel h4 { font-size: 12.5px; font-weight: 600; margin: 26px 0 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; }
  .tabpanel h4:first-child { margin-top: 0; }
  .tabpanel ul { margin: 0 0 15px; padding-left: 18px; }
  .tabpanel li { margin-bottom: 7px; font-size: 14px; }
  .tabpanel strong { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  .cite { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); }
  .quote-block { border-left: 2px solid var(--border); padding-left: 16px; margin: 18px 0; color: var(--text-muted); font-size: 13.5px; }
  .translation-note { font-size: 11.5px; color: var(--text-faint); font-style: italic; margin-top: -8px; }
  .warn-banner {
    font-size: 13px; color: var(--warn); border: 1px solid var(--warn); border-radius: 6px;
    padding: 10px 14px; margin-bottom: 20px; background: color-mix(in srgb, var(--warn) 10%, transparent);
  }

  .footer-note { margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 11px; color: var(--text-faint); }

  a { color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>

<div class="shell">
  <div class="topbar">
    <div class="brand">commodity-earnings-monitor</div>
    <div class="meta">

    <div class="spacer"></div>

  <div class="layout">

      <div class="rail-legend">
        <span><span class="dot" style="background:var(--accent)"></span>novo</span>

        <span style="opacity:.6">— não negociado (referência)</span>
      </div>
      <div class="rail-scroll" id="rail"></div>
    </nav>
    <main class="main" id="main"></main>
  </div>
</div>

on esperado \"significativamente mais alto\" que o 1T26 [PR]\n\n**Upstream**\n- Produção: 1.750-1.850 mil boe/d [PR]\n\n**Marketing**\n- Volumes de venda: 2.550-2.650 mil bpd [PR]\n- Lucro ajustado esperado em linha com o 1T26 [PR]\n\n**Chemicals and Products**\n- Margem indicativa de refino: ~US$ 20/bbl [PR]\n- Margem indicativa de química: ~US$ 240/tonelada [PR]\n- Utilização de refino: ~100% [PR]\n\n**Renewables and Energy Solutions**\n- Lucro ajustado: faixa de US$ (0,3) a US$ 0,3 bilhão [PR]\n\n**Fluxo de Caixa do Grupo**\n- Capital de giro: US$ 1 a 6 bilhões (ante saída de US$ 11,2 bilhões no 1T26), refletindo volatilidade de preços de commodities [PR]\n- Imposto pago: US$ 2,6-3,4 bilhões [PR]\n\n**Resultados completos do 2T26: agendados para 30 de julho de 2026** [PR].","conference_call_summary":"Não há teleconferência associada a este trading update — a Shell normalmente não realiza call para atualizações de guidance pré-resultados, apenas para os resultados trimestrais completos, agendados para 30/07/2026 [PR].","commodity_commentary":"A Reuters (Londres, 7 de julho, repórter Stephanie Kelly) noticiou que a Shell elevou a guidance de produção de gás integrado e sinalizou resultado de trading \"significativamente mais alto\" no segundo trimestre de 2026, à medida que a volatilidade dos mercados de energia — provocada pela guerra no Irã — beneficiou as operações de trading da companhia [Reuters]. A produção de Integrated Gas foi revisada para 610-650 mil boe/d, ante a faixa anterior de 580-640 mil boe/d, e os volumes de liquefação de GNL foram elevados para 7,4-7,8 milhões de toneladas (de 6,8-7,4 milhões) [Reuters].\n\nSegundo a Reuters, as ações da Shell subiram 3,2% na abertura do pregão em 7 de julho, com o setor de energia europeu avançando 0,3% no mesmo dia [Reuters]. O Citi elevou sua projeção de lucro por ação do segundo trimestre para a Shell em 13%, citando a atualização \"incrementalmente positiva\" da companhia [Reuters]. A Bloomberg, em newsletter do mesmo dia intitulada \"Oil Major Shell Cashes In On Volatile Energy Markets\", descreveu a Shell como beneficiária direta da turbulência nos mercados de energia [Bloomberg].\n\nO comunicado também revelou que a Shell fechou acordo para vender seu negócio de downstream na África do Sul (580 postos de combustível, atacado de combustível, aviação e lubrificantes) para a ADNOC Distribution, dos Emirados Árabes, por valor de empresa implícito de US$ 1 bilhão, com a ADNOC mantendo a marca Shell sob licenciamento de longo prazo [Reuters]. Segundo a Reuters, cerca de 20% da produção da Shell (550 mil boe/d) origina-se do Oriente Médio, e a planta Pearl GTL, no Catar, segue fora de operação desde os ataques de março, com reparo estimado em cerca de um ano [Reuters]. Os resultados financeiros completos do 2T26 estão agendados para 30 de julho de 2026."},"generated_by":"claude-research","generated_at":"2026-07-08T00:00:00Z","status":"summarized","note_for_reviewer":"Atualizado em 08/07/2026 a pedido do usuário, que notou que a matéria anterior (sobre o 1T26) estava desatualizada. Este é o trading update do 2T26 publicado em 07/07/2026 — ainda NÃO é o earnings completo (agendado para 30/07/2026). Deve ser reprocessado como 'earnings' completo assim que os resultados de 30/07 saírem.","commentary_sources":[{"outlet":"Reuters","title":"Shell raises guidance slightly for Q2 integrated gas production","url":"https://www.globalbankingandfinance.com/shell-raises-guidance-slightly-q2-integrated-gas-production/","captured_at":"2026-07-07T00:00:00Z"},{"outlet":"Bloomberg","title":"Oil Major Shell Cashes In On Volatile Energy Markets","url":"https://www.bloomberg.com/news/newsletters/2026-07-07/oil-major-shell-cashes-in-on-volatile-energy-markets","captured_at":"2026-07-07T00:00:00Z"}]},"freeport-mcmoran":{"company_id":"freeport-mcmoran","accession_number":"0000831259-26-000021","company_name":"Freeport-McMoRan Inc.","commodities":["copper","gold"],"document_type":"earnings","docume  instalações de fundição/refino (PMR) da PTFI [PR]\n- Dívida total consolidada: US$ 9.414 milhões vs US$ 9.404 milhões (coluna do período anterior); caixa e equivalentes: US$ 3.737 milhões vs US$ 4.385 milhões [PR]\n\n**Fluxo de caixa livre / capex**\n- Fluxo de caixa operacional: **US$ 1.495 milhões** no 1T26, incluindo US$ 0,1 bi de capital de giro/outras fontes, vs US$ 1.058 milhões no 1T25 [PR]\n- Capex: **US$ 973 milhões**, incluindo US$ 0,6 bi para grandes projetos de mineração, vs US$ 1.172 milhões no 1T25 [PR]\n- Guidance de capex para 2026: aproximadamente **US$ 4,3 bilhões**, incluindo US$ 3,0 bilhões para grandes projetos [PR] — guidance declarado pela empresa; o release não repete o valor do guidance anterior (janeiro de 2026) para comparação direta\n\n**Detalhamento por segmento / custo unitário (cobre)**\n- Preço médio realizado do cobre: **US$ 5,78/lb** vs US$ 4,44/lb no 1T25 [IP, slide 21]\n- Custo de produção e entrega (site): **US$ 3,29/lb** vs US$ 2,59/lb no 1T25 [IP, slide 21]\n- Custo de caixa unitário consolidado: **US$ 1,91/lb** vs US$ 2,07/lb no 1T25, descrito pela empresa como \"queda de 6% vs. 1T25\" [PR, IP slide 6]\n- Custo de caixa unitário esperado para 2026 por região: Estados Unidos US$ 3,02/lb, América do Sul US$ 2,60/lb, Indonésia US$ (1,30)/lb (crédito líquido, por conta dos subprodutos ouro/prata), Consolidado US$ 1,95/lb [IP, slide 25]\n- Ouro: preço realizado US$ 4.889/oz vs US$ 3.072/oz no 1T25 [IP, slide 21]; vendas consolidadas de 121 mil onças [PR]\n- Molibdênio: preço realizado US$ 25,21/lb vs US$ 21,67/lb; vendas consolidadas de 24 milhões de libras [PR, IP slide 21]\n\n**Volumes de produção e vendas / revisão de guidance para 2026**\n- Produção consolidada 1T26: 662 milhões lb de cobre, 97 mil oz de ouro, 22 milhões lb de molibdênio [PR]\n- Vendas consolidadas 1T26: 657 milhões lb de cobre, 121 mil oz de ouro, 24 milhões lb de molibdênio [PR]\n- Guidance de vendas para 2026 (revisado): ~3,1 bilhões lb de cobre, 650 mil oz de ouro, 90 milhões lb de molibdênio, incluindo 690 milhões lb de cobre / 140 mil oz de ouro / 22 milhões lb de molibdênio no 2T26 [PR]\n- A empresa afirma explicitamente: \"as estimativas de vendas revisadas para o ano de 2026 refletem principalmente ajustes de cronograma na retomada do Grasberg Block Cave\" [PR] — uma mudança de guidance em relação ao guidance anterior (janeiro de 2026) da própria empresa, atribuída ao cronograma de retomada do Grasberg Block Cave, não a fraqueza de demanda\n- Os volumes de vendas de cobre/ouro e os custos de caixa unitários do 1T26 vieram favoráveis às próprias estimativas de janeiro de 2026 da empresa [PR] — o número-base de janeiro não é repetido neste documento, então essa comparação é apenas qualitativa aqui\n\n**Retorno de capital**\n- Dividendos: **US$ 0,15/ação** declarados em 25 de março de 2026 (US$ 0,075 base + US$ 0,075 variável, ligado a performance), pagos em 1º de maio de 2026 [PR]\n- Política: até 50% do fluxo de caixa disponível após capex planejado e distribuições a participações não controladoras vai para retorno aos acionistas, segundo a estrutura de pagamento baseada em performance [PR]\n- Recompra de ações: 1,7 milhão de ações por US$ 93 milhões (média de US$ 54,25/ação) no 1T26; total acumulado no programa: 53,7 milhões de ações por US$ 2,1 bilhões (média de US$ 39,01/ação) contra uma autorização de US$ 5,0 bilhões; US$ 2,9 bilhões ainda disponíveis em 22 de abril de 2026 [PR]","conference_call_summary":"Nenhuma transcrição oficial da conference call está disponível na fonte primária para este filing. A FCX disponibilizou uma apresentação usada durante a call de resultados (Anexo 99.2, datada de 23 de abril de 2026) como anexo na SEC, mas é um material de slides, não uma transcrição das falas preparadas nem da sessão de perguntas e respostas — nenhum comentário verbatim da call foi encontrado publicado no site de RI da FCX nem neste filing da SEC.\n\nA única citação verbatim de um executivo disponível vem do próprio press release (Anexo 99.1), não da call em si:\n\n>Kathleen Quirk, Presidente e CEO: \"Nossos resultados financeiros do primeiro trimestre refletem a força do nosso portfólio diversificado, com crescimento em receitas, fluxo de caixa e lucros na comparação com o primeiro trimestre do ano passado, apesar da capacidade reduzida em nossas operações na Indonésia. A equipe global da Freeport está focada em restaurar as operações em Grasberg de forma segura e sustentável, impulsionando novas tecnologias e programas de eficiência para aumentar a lucratividade das nossas operações nas Américas, e buscando nosso portfólio altamente atrativo de opções de crescimento orgânico para gerar valor aos acionistas. A Freeport está fortemente posicionada como 'a Campeã do Cobre dos EUA' e como líder global em cobre, com operações em grande escala e geograficamente diversificadas, e um pipeline de opções de crescimento de curto, médio e longo prazo para sustentar um mercado em expansão.\" [PR]\n\n^Tradução livre do texto original em inglês do press release.\n\nNenhum conteúdo de perguntas e respostas sobre capex, M&A, alocação de capital ou riscos operacionais pode ser reportado aqui porque nenhuma transcrição de Q&A estava disponível nas fontes primárias analisadas. Se um filing futuro ou o site de RI da empresa publicar uma transcrição oficial desta call, esta aba deve ser reprocessada.","commodity_commentary":"A cobertura da Bloomberg sobre o resultado do primeiro trimestre de 2026 da Freeport-McMoRan destacou um trimestre de sinais contraditórios: a receita de US$ 6,23 bilhões superou em cerca de 9% a expectativa de US$ 5,7 bilhões, e o lucro por ação de US$ 0,57 ficou acima da previsão de US$ 0,47, mas o resultado foi ofuscado pelo corte no guidance de produção para 2026 e 2027 [Bloomberg].\n\nSegundo reportagens da Bloomberg, o problema central segue sendo a mina Grasberg, na Indonésia, atingida por um deslizamento de lama fatal em setembro de 2025: a companhia cortou a projeção de vendas de cobre para 2026 em cerca de 20%, para aproximadamente 3,1 bilhões de libras ante 3,4 bilhões previstos antes, com corte semelhante para o ouro [Bloomberg]. As vendas de cobre da unidade indonésia caíram para 82 milhões de libras no trimestre, de 290 milhões um ano antes, e a empresa registrou custos de ociosidade e restauração de US$ 406 milhões.\n\nA reação do mercado foi fortemente negativa: as ações da Freeport caíram cerca de 12% a 13% nos pregões seguintes à divulgação, chegando a US$ 61,48 ante fechamento anterior de US$ 70,36 [Bloomberg]. O Morgan Stanley rebaixou a recomendação do papel para 'equalweight', citando ramp-up mais lento e custos temporariamente mais altos em Grasberg, com preço-alvo reduzido de US$ 70 para US$ 66; Jefferies e Bernstein SocGen também cortaram preços-alvo na sequência."},"generated_by":"claude-code-manual-demo","generated_at":"2026-07-06T22:15:00Z","status":"summarized","note_for_reviewer":"Generated inline by Claude (not via scripts/generate_summary.py's Anthropic API call, and not via the scheduled routine) as a milestone-1 validation demo, reading the primary documents directly with the Read/Bash tools in this session. Every quote and figure above was located and verified against the extracted document text before being written here.","commentary_sources":[{"outlet":"Bloomberg","title":"Watch Freeport Shares Slide as Indonesian Mine Restart Faces Delay","url":"https://www.bloomberg.com/news/videos/2026-04-23/freeport-shares-slide-as-mine-restart-faces-delay-video","captured_at":"2026-07-08T00:00:00Z"}]},"rio-tinto":{"company_id":"rio-tinto","accession_number":"0000863064-26-000022","company_name":"Rio Tinto Group","commodities":["copper","iron ore","aluminum"],"document_type":"production_report","document_type_label":"Relatório de Produção Trimestral","sources":[{"filename":"rio-tinto-releases-first-quarter-2026-production-results","label":"Press release da empresa — título original: \"Rio Tinto releases first quarter 2026 production results\"","source_url":"https://www.riotinto.com/en/news/releases/2026/rio-tinto-releases-first-quarter-2026-production-results","captured_at":"2026-07-07T19:10:00Z"},{"filename":"ex1d21rt1q26results.htm","label":"Anexo 99.1/21 ao Formulário 6-K (SEC EDGAR) — \"Rio Tinto 2026 first quarter operations review\"","source_url":"https://www.sec.gov/Archives/edgar/data/0000863064/000086306426000022/ex1d21rt1q26results.htm","captured_at":"2026-07-07T19:10:00Z"}],"tabs":{"earnings_summary":"**Produção de Cobre**\n- Produção consolidada de cobre atingiu 229 mil toneladas no 1T26, alta de 9% em relação ao 1T25 [PR].\n- Crescimento puxado pela continuidade do ramp-up de Oyu Tolgoi (Mongólia), cuja produção de metal em concentrado saltou 56% na comparação anual [PR].\n- Em Kennecott (EUA), o metal refinado recuou 20% ano contra ano; em Escondida (Chile, participação minoritária da Rio Tinto), o metal em concentrado caiu 14% mas o metal refinado subiu 21% [PR].\n- Crescimento equivalente-cobre do portfólio de 9% na comparação anual, também impulsionado pelo desempenho do alumínio [PR].\n\n**Minério de Ferro**\n- Produção em Pilbara: 78,8 milhões de toneladas, alta de 13% ano contra ano [PR].\n- Vendas globais de minério de ferro: 75,7 Mt, alta de 2% [PR].\n- Guidance de produção de minério de ferro para 2026 mantida em 343–366 Mt [PR].\n- Ciclones reduziram os embarques de Pilbara em cerca de 8 Mt no trimestre, com recuperação parcial esperada [PR].\n- Simandou (Guiné) realizou seu primeiro embarque pleno de minério de alto teor para a China durante o mês de abril [PR].\n\n**Projeto Resolution (cobre, Arizona)**\n- Após a conclusão da permuta de terras (\"land exchange\") em março de 2026, teve início a perfuração no projeto de cobre Resolution, no Arizona [PR].\n\n**Guidance**\n- Guidance de produção para 2026 mantida sem alterações em todas as commodities [PR].","conference_call_summary":"Não foi localizada uma transcrição de teleconferência de resultados nas fontes primárias consultadas — trata-se apenas de um relatório operacional de produção trimestral. A única declaração direta disponível é do CEO Simon Trott:\n\n> \"Operating excellence drove 9% year-on-year copper equivalent production growth across our portfolio.\"\n^Tradução livre: \"A excelência operacional impulsionou um crescimento de 9% na produção equivalente-cobre do nosso portfólio, ano contra ano.\"","commodity_commentary":"A Reuters descreveu o resultado anual de 2025 da Rio Tinto como um 'lucro estável', com o lucro subjacente em US$ 10,87 bilhões, praticamente estagnado ante o ano anterior e abaixo do consenso de US$ 11,03 bilhões, com o negócio de minério de ferro pressionado por preços mais fracos e custos unitários mais altos no Pilbara [Reuters]. O lucro líquido atribuível aos acionistas somou US$ 10,0 bilhões, ante US$ 11,6 bilhões em 2024.\n\nSegundo a Reuters, o cobre amorteceu parte da fraqueza do minério de ferro: os ganhos da divisão dobraram no ano e passaram a responder por cerca de 30% do total do grupo, enquanto a fatia do minério de ferro caiu para 60% do lucro total, de 70% um ano antes [Reuters]. As ações da Rio Tinto em Londres caíram entre 3,4% e 4% na sessão seguinte à divulgação, com desempenho pior que o de seus pares do setor [Reuters].\n\nAnalistas do Jefferies comentaram que, 'sem fusões e aquisições, esperamos que o caixa livre seja usado para fortalecer o balanço da Rio e manter os retornos dentro da faixa de payout de dividendos de 40%-60%' [Reuters]. A empresa declarou dividendo final de US$ 2,25 por ação, ante US$ 2,58 no ano anterior, mesmo com avanços operacionais como a rampagem da mina de cobre subterrânea Oyu Tolgoi e o primeiro embarque de minério de alto teor de Simandou."},"generated_by":"claude-research","generated_at":"2026-07-07T20:00:00Z","status":"summarized","note_for_reviewer":"Relatório operacional de produção, não earnings financeiro completo — sem receita/lucro/EBITDA/capex. Resultados financeiros do 1S26 ainda não publicados na data da pesquisa.","commentary_sources":[]},"bhp-group":{"company_id":"bhp-group","accession_number":null,"company_name":"BHP Group Limited","commodities":["iron ore","copper","coal"],"document_type":"production_report","document_type_label":"Operational Review FY2026 (ano encerrado em 30/06/2026) — não é resultado financeiro","sources":[{"filename":"bhp-operational-review-for-the-year-ended-30-june-2026","label":"Press release da empresa — título original: \"Operational Review for the year ended 30 June 2026\"","source_url":"https://www.bhp.com/news/media-centre/releases/2026/07/bhp-operational-review-for-the-year-ended-30-june-2026","captured_at":"2026-07-16T00:00:00Z"}],"tabs":{"earnings_summary":"**Relatório operacional (Operational Review), não financeiro** — divulgado em 16/07/2026. Resultado financeiro/contábil auditado do FY2026 (Annual Results) só sai em 18/08/2026 [PR]. Este relatório traz apenas dados de produção, preços realizados e guidance.\n\n**Minério de Ferro**: produção recorde de ~264,7 Mt atribuível no FY26 (+1% a/a), sustentada por melhor desempenho da cadeia logística na Western Australia Iron Ore (WAIO), que também bateu recorde com 256,9 Mt atribuível (291,2 Mt em base 100%, ante 290 Mt no FY25) [PR]. Preço médio realizado do minério WAIO subiu 3% a/a, para US$ 84,56/wmt [PR]. BHP aprovou US$ 900 milhões para o projeto Ministers North (depósito Brockman de alto teor no Pilbara), ~20 Mtpa, primeiro minério esperado no FY29, sustentando meta de médio prazo da WAIO de >305 Mtpa [PR].\n\n**Cobre**: produção de ~2 Mt (1.953 kt) pelo segundo ano consecutivo, mas -3% a/a, com queda planejada de teor em Escondida e maior complexidade de minério em Spence compensadas por Copper South Australia (Olympic Dam) e Antamina [PR]. Preço médio realizado do cobre subiu 35% a/a, para US$ 5,74/lb [PR]. Produção de cobre do FY26 ficou na metade superior do range de guidance.\n\n**Carvão**: NSWEC (carvão energético) superou o teto do guidance, com 16,4 Mt, por maior volume de carvão \"bypass\" decorrente de sequenciamento de lavra [PR]. Não foi possível confirmar no detalhe os números de BMA (carvão metalúrgico) nesta varredura — sinalizado abaixo.\n\n**Potássio**: Jansen Stage 1 (Canadá) com 84% de conclusão física [PR].\n\n**Guidance FY2027**: cobre entre 1.650–1.800 kt; WAIO entre 284–296 Mt em base 100% (fontes secundárias também citam 260–272 Mt, possivelmente em base atribuível — ambiguidade a confirmar no documento primário completo, que não pôde ser acessado diretamente nesta varredura por bloqueio de acesso).\n\n**Transição de CEO**: Brandon Craig assumiu o cargo de CEO da BHP em 01/07/2026, sucedendo Mike Henry após 6,5 anos no cargo — este é o primeiro Operational Review divulgado sob a nova liderança [PR].","conference_call_summary":"Não há teleconferência formalmente associada ao Operational Review trimestral/anual (evento é só release + guidance). O release menciona a transição, com uma linha atribuída à companhia: \"From 1 July 2026, Brandon Craig will assume the role of CEO, taking BHP forward from a strong position with reliable operations and a significant pipeline of copper and potash growth projects, to deliver long term value through the cycle.\"\n^Tradução livre: \"A partir de 1º de julho de 2026, Brandon Craig assume o cargo de CEO, levando a BHP adiante a partir de uma posição forte, com operações confiáveis e um pipeline significativo de projetos de crescimento em cobre e potássio, para entregar valor de longo prazo ao longo do ciclo.\" Não foi possível confirmar com certeza se a citação é atribuída nominalmente a Brandon Craig, Mike Henry ou ao Chairman no texto original — tratar como paráfrase do release até confirmação direta do documento fonte.","commodity_commentary":"A Bloomberg destacou que, apesar dos recordes anuais, a produção trimestral (4T FY26) de minério de ferro e cobre da BHP recuou na margem, em meio aos planos de crescimento da mineradora — manchete \"BHP's Iron Ore, Copper Output Slip as Top Miner Plans For Growth\" [Bloomberg]. A Reuters noticiou que a BHP conseguiu preços trimestrais mais altos de minério de ferro mesmo superando as restrições de compra impostas pela China Mineral Resources Group (CMRG) durante negociações de contrato mais cedo no ano [Reuters]. A imprensa financeira australiana (MarketIndex) registrou reação negativa pontual: ação caiu 2,3% no pregão de 16/07, principalmente por causa do guidance de cobre para o FY27 considerado fraco; bancos mantiveram recomendações inalteradas, com apenas pequenos ajustes de preço-alvo — o consensus target médio recuou de A$ 61,72 para A$ 61,44 [MarketIndex]. Atenção do mercado agora se volta para o resultado financeiro auditado do FY26, em 18/08/2026, e para sinalização de dividendo, dado o balanço com maior flexibilidade."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Acesso direto à página oficial da BHP e ao PDF do release retornou erro 403 nesta sessão (bloqueio de rede/proxy) — dados acima foram reconstruídos a partir de múltiplos agregadores/sindicações que citam o release primário (SEC 6-K, StockTitan, Kalkine, TipRanks, IDNFinancials), não da leitura direta do documento. Recomenda-se checagem cruzada do PDF oficial (bhp.com) antes de uso final, especialmente para: guidance FY27 de minério de ferro (números conflitantes entre fontes: 284-296Mt vs 260-272Mt, bases atribuível vs 100% não claras), detalhamento de BMA (carvão metalúrgico) que não foi encontrado nesta varredura, e a atribuição exata da citação executiva. Resultado financeiro auditado do FY2026 (Annual Results) sai em 18/08/2026 — este documento é só operacional.","commentary_sources":[{"outlet":"Bloomberg","title":"BHP's Iron Ore, Copper Output Slip as Top Miner Plans For Growth","url":"https://www.bloomberg.com/news/articles/2026-07-15/bhp-s-iron-ore-copper-output-slip-as-top-miner-plans-for-growth","captured_at":"2026-07-15T00:00:00Z"},{"outlet":"Reuters","title":"BHP wins higher quarterly iron ore prices, overcoming China's buying curbs","url":"https://www.tradingview.com/news/reuters.com,2026:newsml_L4N43I020:0-bhp-wins-higher-quarterly-iron-ore-prices-overcoming-china-s-buying-curbs/","captured_at":"2026-07-16T00:00:00Z"},{"outlet":"MarketIndex","title":"BHP FY26 scorecard: record iron ore, soft copper guidance – and a dividend surprise brewing","url":"https://www.marketindex.com.au/news/bhp-fy26-scorecard-record-iron-ore-soft-copper-guidance-and-a-dividend-surprise-brewing","captured_at":"2026-07-16T00:00:00Z"}]},"anglo-american":{"company_id":"anglo-american","accession_number":null,"document_type":"ma_announcement","document_type_label":"Conclusão de Acordo Definitivo com a Codelco — Los Bronces/Andina (24/06/2026), NÃO é resultado financeiro nem relatório de produção","sources":[{"filename":"24-06-2026","label":"Comunicado oficial Anglo American — conclusão do acordo definitivo Los Bronces-Andina com a Codelco","source_url":"https://www.angloamerican.com/media/press-releases/2026/24-06-2026","captured_at":"2026-07-08T00:00:00Z"}],"tabs":{"earnings_summary":"Nota: este não é um resultado financeiro. Em 24/06/2026, a Anglo American (via Anglo American Sur, 50,1%) e a Codelco anunciaram a conclusão do acordo definitivo para um plano de mina conjunto entre Los Bronces (Anglo) e Andina (Codelco), no Chile, após aprovações regulatórias [PR]. O plano deve desbloquear 2,7 milhões de toneladas adicionais de cobre ao longo de 21 anos (~120 mil t/ano), com valor pré-imposto estimado de ao menos US$ 5 bilhões, dividido igualmente [PR]. Implementação final condicionada a licenças ambientais, com prazo estimado para 2030 [PR]. Ambas mantêm propriedade de seus ativos.","conference_call_summary":"Sem teleconferência associada — comunicado de imprensa, não divulgação de resultados. CEO Duncan Wanblad: \"Adjacências como esta são raras...\" [PR]. Presidente do conselho da Codelco, Bernardo Fontaine: \"Este acordo representa uma forma mais eficiente e responsável de desenvolver um dos principais distritos de cobre do mundo\" [PR].","commodity_commentary":"Importante desambiguar: em setembro de 2025, a Reuters noticiou a ASSINATURA do acordo original de US$5 bilhões. O evento de 24/06/2026 é distinto: a CONCLUSÃO/fechamento do acordo definitivo, após aprovações regulatórias — marco de implementação, não nova assinatura [Mining Weekly]. A Business Day (África do Sul) destacou que as ações da Anglo American caíram 11% na semana anterior ao anúncio, em meio à correção dos preços do cobre após máximas recordes no início de junho, embora o papel ainda estivesse ~60% acima do nível de um ano atrás [Business Day]. O acordo se encaixa na reestruturação de portfólio da Anglo, que vem se desfazendo de platina, níquel e carvão para focar em cobre — com a fusão pendente com a Teck (aprovada pelos acionistas em dezembro de 2025) esperada para elevar a exposição a cobre da companhia combinada a ~70% [Business Day]. Não foi localizada cobertura própria da Bloomberg/Reuters sobre este fechamento de 24/06. Próximo marco: licenças ambientais pendentes, implementação plena só em 2030 [PR]."},"commentary_sources":[{"outlet":"Mining Weekly","title":"Anglo, Codelco ink definitive agreement for joint mine plan in Chile","url":"https://www.miningweekly.com/article/anglo-codelco-inks-definitive-agreement-for-joint-mine-plan-in-chile-2026-06-24","captured_at":"2026-07-08T00:00:00Z"},{"outlet":"Business Day","title":"Anglo American closes in on top-five copper mine with Chile deal","url":"https://www.businessday.co.za/companies/2026-06-25-anglo-closes-in-on-top-five-copper-mine-with-chile-deal/","captured_at":"2026-07-08T00:00:00Z"}],"generated_by":"claude-research","generated_at":"2026-07-08T00:00:00Z","note_for_reviewer":"Entrada anterior (relatório de produção do 1T26) não refletia a conclusão do acordo Los Bronces-Andina com a Codelco (24/06/2026). ATENÇÃO: uma pesquisa anterior encontrou manchetes de 'finalização' do acordo que na verdade são de 16/09/2025 (assinatura original, evento antigo). O evento genuinamente novo é o fechamento/conclusão de 24/06/2026, confirmado por comunicado oficial e cobertura subsequente."},"antofagasta":{"company_id":"antofagasta","accession_number":null,"company_name":"Antofagasta plc","commodities":["copper","gold","molybdenum"],"document_type":"production_report","document_type_label":"Relatório de Produção Trimestral (Q2 2026 / 1S 2026)","sources":[{"filename":"20260715_aplc26q2prodreport-jun26-vf.pdf","label":"Press release da empresa (RNS/LSE) — título original: \"Q2 2026 Production Report\"","source_url":"https://www.antofagasta.co.uk/media/4964/20260715_aplc26q2prodreport-jun26-vf.pdf","captured_at":"2026-07-15T00:00:00Z"}],"tabs":{"earnings_summary":"**Produção de Cobre**\n- Grupo, 2T26: 142.000 toneladas, -1% t/t, refletindo menor produção em Antucoya [PR]. Cerca de 7.000 toneladas processadas em Los Pelambres no trimestre ficaram em estoque de planta e serão reconhecidas como produção filtrada no 2S26, após manutenção estendida do pipeline de concentrado [PR].\n- Acumulado 1S26: 285.000 toneladas, -9,5% a/a, refletindo menor produção em Los Pelambres e Centinela [PR].\n- Antucoya (dado mais recente disponível, 1T26): 19.600 toneladas, -3% a/a, por menores recuperações parcialmente compensadas por maior taxa de processamento de minério [PR].\n\n**Byproducts**\n- Ouro, 2T26: 46.300 onças, estável t/t, com níveis inalterados tanto em Los Pelambres quanto em Centinela [PR].\n\n**Custos**\n- Custo caixa C1 (antes de créditos de subproduto), 1S26: US$ 2,85/lb, +23% a/a, por maiores custos de insumos, acordo trabalhista e menor produção em Los Pelambres/Centinela [PR].\n- Créditos de subproduto, 2T26: US$ 1,58/lb, -7% t/t, por menor preço do ouro [PR].\n- Custo caixa líquido, 2T26: US$ 1,36/lb, +26% t/t [PR].\n\n**Guidance 2026 (revisado)**\n- Produção de cobre do grupo: mantida em 650.000–700.000 toneladas; produção trimestral deve crescer sequencialmente no restante do ano [PR].\n- Custo caixa antes de subprodutos: ELEVADO para US$ 2,40–2,60/lb (ante US$ 2,30–2,50/lb anterior), por preços de combustível e insumos-chave persistentemente altos [PR].\n- Custo caixa líquido (após subprodutos): mantido em US$ 1,15–1,35/lb, com redução esperada no 2S26 por maior produção planejada [PR].\n\n**Projeto Zaldívar**: aprovada decisão de investimento para pipeline e sistema de bombeamento de água de longo prazo, ~US$ 0,9 bilhão ao longo de dois anos (base 100%), permitindo transição de água continental a partir de meados de 2028, com potencial extensão da vida útil da mina até 2051 e criação de mais de 5.000 empregos locais [PR].","conference_call_summary":"Não localizada transcrição de teleconferência associada a este relatório de produção trimestral nesta varredura. Nenhuma citação direta de executivo sobre este relatório específico foi confirmada — sinalizado para verificação futura (relatórios anteriores da Antofagasta trouxeram citações do CEO Iván Arriagada, mas não foi possível confirmar uma citação nova e específica para o 2T26 nesta sessão).","commodity_commentary":"A produção de cobre do 1S26 (285 mil toneladas, -9,5% a/a) ficou abaixo das estimativas de consenso, com Los Pelambres e Centinela como os principais responsáveis pela queda [Mining Weekly]. A companhia manteve o guidance anual de 650-700 mil toneladas, apostando em forte recuperação no 2S26 [Mining.com]. A Mining Weekly destacou que a companhia espera repique de produção no restante do ano após o trimestre fraco [Mining Weekly, 15/07]. Cobertura da London Stock Exchange (LSE.co.uk) classificou a produção do 2T26 como \"amplamente estável\" na comparação trimestral, mesmo com a queda acentuada na comparação anual [LSE.co.uk]. Reação de mercado: ações da Antofagasta, listadas em Londres, caíram no dia da divulgação (estimativas de queda variam entre as fontes, de ~1,9% a ~4,8%, a depender do horário de referência), em meio a um pregão fraco para mineradoras no FTSE 100 — Antofagasta figurou entre os piores desempenhos do índice ao lado de Fresnillo e Endeavour Mining, com o setor pressionado por preços mais fracos de cobre, ouro e prata em Londres [Mining Weekly]. Elevação do guidance de custo caixa antes de subprodutos (para US$ 2,40–2,60/lb) reforçou a leitura de que o trimestre foi operacionalmente mais fraco, mesmo com o guidance de produção mantido."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Acesso direto ao PDF oficial em antofagasta.co.uk retornou erro 403 nesta sessão (bloqueio de rede/proxy) — dados reconstruídos via agregadores/imprensa especializada que citam o release primário (Smartkarma, TipRanks, MarketScreener, Mining Weekly). Não foi possível localizar e confirmar nesta varredura uma matéria de Bloomberg ou Reuters com URL verificável publicada especificamente sobre este relatório (15-16/07/2026) — usados como fallback Mining Weekly, Mining.com e LSE.co.uk, todos aceitáveis pela regra de sourcing do painel. A percentagem exata de queda das ações no dia varia entre as fontes secundárias consultadas (1,9% a 4,8%) — não foi possível reconciliar com uma fonte primária única de dados de mercado; tratar a variação percentual com cautela. Produção de Antucoya usada é do 1T26 (dado mais recente confirmado) — número específico do 2T26 não foi encontrado nesta varredura; sinalizado explicitamente no texto.","commentary_sources":[{"outlet":"Mining Weekly","title":"Antofagasta's first-half copper output drops 9.5%, uptick seen ahead","url":"https://www.miningweekly.com/article/antofagastas-first-half-copper-output-drops-95-uptick-seen-ahead-2026-07-15","captured_at":"2026-07-15T00:00:00Z"},{"outlet":"Mining.com","title":"Antofagasta banks on stronger second half to hit copper goal","url":"https://www.mining.com/antofagasta-banks-on-stronger-second-half-to-hit-copper-goal/","captu glo Teck avança para etapas finais antes do fechamento [Mining Weekly]. Segundo a Anglo American, aprovação regulatória final — incluindo China e Coreia do Sul, ainda pendentes — é esperada entre setembro de 2026 e março de 2027, definindo a data efetiva de fechamento da operação de US$ 50 bilhões que criará a 'Anglo Teck', um dos maiores produtores de cobre do mundo [Mining.com]. Não foi localizada cobertura dedicada da Bloomberg/Reuters especificamente sobre este envio de carta de 30/06/2026 — a cobertura Bloomberg disponível trata da votação dos acionistas em dezembro de 2025, marco anterior. Para investidores, o evento confirma que o mecanismo prático de troca de ações está operacional, mas o fechamento definitivo segue sujeito a aprovações regulatórias internacionais pendentes."},"commentary_sources":[{"outlet":"Mining.com","title":"Anglo American expects final approval for Teck merger around Q3","url":"https://www.mining.com/web/anglo-american-expects-final-approval-for-teck-merger-around-q3/","captured_at":"2026-07-08T00:00:00Z"},{"outlet":"The Globe and Mail","title":"Teck Resources Mails Shareholder Election Forms for Anglo American Merger","url":"https://www.theglobeandmail.com/investing/markets/stocks/TECK/pressreleases/3095249/teck-resources-mails-shareholder-election-forms-for-anglo-american-merger/","captured_at":"2026-07-08T00:00:00Z"}],"generated_by":"claude-research","generated_at":"2026-07-08T00:00:00Z","note_for_reviewer":"Entrada anterior (resultados do 1T26) não refletia o avanço processual da fusão: em 30/06/2026 a Teck enviou a carta de transmissão aos acionistas, janela de eleição aberta em 01/07/2026. Não é evento financeiro, mas material para o calendário de fechamento da fusão. Fechamento final ainda pendente de aprovações regulatórias internacionais (China, Coreia do Sul), esperadas entre set/2026 e mar/2027."},"first-quantum-minerals":{"company_id":"first-quantum-minerals","accession_number":null,"company_name":"First Quantum Minerals Lt quisition-of-shares-in-nexa-resources-302816970.html","captured_at":"2026-07-08T01:00:00Z"}],"tabs":{"earnings_summary":"Em 2 de julho de 2026, a Boliden AB confirmou negociações com a Nexa Resources e a Votorantim S.A. — controladora majoritária da Nexa, com ~64,7% de participação — sobre uma potencial aquisição dessa participação pela Boliden [PR]. Comunicado divulgado como informação privilegiada (Regulamento de Abuso de Mercado da UE), em resposta a especulação de mercado [PR]. A Boliden não divulgou valor, estrutura ou cronograma, afirmando que \"não há certeza de que qualquer transação venha a se concretizar\" [PR].\n\nEste é um comunicado pontual sobre negociações em andamento — NÃO é resultado financeiro trimestral. Último resultado completo segue sendo o 1T26; relatório do 2T26 agendado para 21/07/2026.","conference_call_summary":"Sem teleconferência associada — declaração factual e pontual por exigência regulatória (MAR). Teleconferência do 2T26 confirmada para 21/07/2026.","commodity_commentary":"Não foi localizada cobertura específica da Bloomberg/Reuters com URL verificável sobre este episódio — usando cobertura do MINING.COM, que se baseou nos comunicados oficiais de Boliden e Nexa [MINING.COM]. As ações da Nexa Resources (NYSE) subiram cerca de 2,8% no after-hours após a confirmação, elevando o valor de mercado a ~US$ 1,8 bilhão [MINING.COM]. Reportagens de abril de 2026 indicavam que a Votorantim buscava valor próximo a R$ 7 bilhões pela fatia de 64,7%, embora nenhuma parte tenha confirmado preço nesta rodada [MINING.COM]. A operação, se concretizada, ampliaria a presença da Boliden na América Latina, com acesso a cinco minas polimetálicas e três fundições no Brasil e Peru, incluindo Cajamarquilla, a maior fundição das Américas [MINING.COM]. O movimento se encaixa na reestruturação mais ampla da Votorantim, que já vendeu a CBA (alumínio) para Chinalco/Rio Tinto, sinalizando saída gradual da mineração pesada [MINING.COM]."},"commentary_sources":[{"outlet":"MINING.COM","title":"Boliden in talks to buy Votorantim's controlling stake in Nexa","url":"https://www.mining.com/boliden-in-talks-to-buy-votorantims-controlling-stake-in-nexa/","captured_at":"2026-07-08T01:10:00Z"}],"generated_by":"claude-research","generated_at":"2026-07-08T00:00:00Z","note_for_reviewer":"Complementa a entrada de earnings do 1T26 (segue válida como último resultado financeiro). Notícia de M&A de 02/07/2026 é mais recente e potencialmente mais impactante que o Interim Report de maio. Nenhum valor/termo definitivo divulgado. Revisar após relatório do 2T26 em 21/07/2026."},"kghm-polska-miedz":{"company_id":"kghm-polska-miedz","accession_number":null,"document_type":"strategy_update","document_type_label":"Atualização Estratégica de Longo Prazo — Estratégia 2055+ (Metas 2026-2030), NÃO é o earnings completo do 2º Trimestre 2026","sources":[{"filename":"kghm-strategia-2055","label":"Raport bieżący nº 28/2026 — 'Aprovação da Estratégia do Grupo KGHM 2055+', via Bankier.pl","source_url":"https://www.bankier.pl/wiadomosc/KGHM-POLSKA-MIEDZ-SA-Zatwierdzenie-Strategii-Grupy-Kapitalowej-KGHM-Polska-Miedz-S-A-2055-9163263.html","captured_at":"2026-07-08T01:20:00Z"}],"tabs":{"earnings_summary":"Em 3 de julho de 2026, o Conselho de Supervisão da KGHM aprovou a \"Estratégia do Grupo KGHM 2055+\" [PR]. Para 2026-2030: EBITDA ajustado médio anual de PLN 12 bilhões (margem 25,6%); produção anual de cobre pagável de ~730 mil toneladas (~80% doméstico, incl. 180 mil t de reciclagem; 20% internacional); produção de prata de ~1.290 toneladas [PR]. Investimentos totais superiores a PLN 32 bilhões (~US$ 8,55 bilhões) até 2030, ~80% no núcleo polonês, restante em Sierra Gorda (Chile), Robinson (EUA) e Canadá [PR]. Inclui desenvolvimento de nova mina \"KGHM 2.0\" na Polônia e metas de redução de 30% em emissões de Escopo 2 até 2030 [PR].\n\nÉ um plano estratégico de longo prazo — NÃO é resultado do 2T26. Último resultado completo segue sendo o QSr 1/2026.","conference_call_summary":"Não foi localizada transcrição pública verificável associada ao lançamento da estratégia. Imprensa polonesa citou o CEO Remigiusz Paszkiewicz sobre a ambição de transformar a KGHM em \"grupo industrial moderno e multi-commodity\" pós-2035, mas sem call oficial confirmada.","commodity_commentary":"Cobertura obtida via Reuters (distribuída por MINING.COM), já que não foi localizado artigo específico da Bloomberg sobre este anúncio [Reuters]. A KGHM — maior produtora de cobre da UE, controlada pelo Estado polonês — comprometeu mais de PLN 32 bilhões em investimentos até o fim da década, com ~80% do capital no núcleo doméstico [Reuters]. A estratégia reflete esforço para reduzir dependência de minério importado, cortando custos logísticos [Reuters]. Ativos no exterior (Sierra Gorda, Robinson) devem seguir relevantes — em 2025 já respondiam por ~48% do EBITDA do grupo [Reuters]. Como plano estrutural de longo prazo, a reação do mercado tende a ser mais moderada que a um resultado trimestral, mas reforça o compromisso com produção estável de cobre em contexto de preços elevados do metal."},"commentary_sources":[{"outlet":"Reuters","title":"KGHM launches $8.55 billion investment plan","url":"https://www.mining.com/web/kghm-launches-8-55-billion-investment-plan/","captured_at":"2026-07-08T01:30:00Z"}],"generated_by":"claude-research","generated_at":"2026-07-08T00:00:00Z","note_for_reviewer":"Complementa a entrada de earnings do 1T26 (segue válida). Estratégia 2055+ de 03/07/2026 é atualização de guidance estrutural mais recente que o relatório de Q1. Nenhuma teleconferência oficial verificável encontrada."},"vale":{"company_id":"vale","accession_number":"0001292814-26-002648","company_name":"Vale S.A.","commodities":["iron ore","copper","nickel","palladium","platinum"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"check-out-the-1q26-financial-results","label":"Press release da empresa — título original: \"Check out the 1Q26 Financial Results\"","source_url":"https://vale.com/check-out-the-1q26-financial-results","captured_at":"2026-07-07T19:55:00Z"},{"filename":"vale20260428_6k.htm","label":"Formulário 6-K (SEC EDGAR) contendo o release de resultados do 1T26","source_url":"https://www.sec.gov/Archives/edgar/data/0000917851/000129281426002648/vale20260428_6k.htm","captured_at":"2026-07-07T19:55:00Z"}],"tabs":{"earnings_summary":"**Resultado Financeiro (1T26 vs 1T25)**\n- Receita operacional líquida: US$ 9,3 bilhões, alta de 14% a/a [PR]. EBITDA proforma: US$ 3,9 bilhões, alta de 21% a/a [PR]. Lucro líquido: US$ 1,89 bilhão, alta de 36% a/a [PR].\n- Capex: US$ 1,1 bilhão, em linha com guidance anual de US$ 5,4–5,7 bilhões [PR].\n\n**Cobre**\n- Produção: 102,3 mil toneladas, alta de 13% a/a — melhor 1º trimestre desde 2017, com recordes em Salobo e Sossego [PR].\n- Preço realizado: US$ 13.143/t, alta de 48% a/a [PR]. EBITDA da Vale Base Metals: ~US$ 1,2 bilhão, alta de 116% [PR].\n\n**Minério de Ferro e Níquel**\n- Vendas de minério de ferro +4% a/a; preço médio US$ 95,8/t [PR]. Vendas de níquel +15% a/a [PR].","conference_call_summary":"Não foi localizada, nas fontes primárias consultadas, transcrição verbatim de citações de executivos da Vale para o 1T26.","commodity_commentary":"Em 28 de abril de 2026, a Bloomberg publicou a reportagem 'Vale Falls Short as Seasonal Pressures Offset Stronger Prices', destacando que a mineradora brasileira decepcionou o mercado no primeiro trimestre de 2026, com pressões sazonais anulando o efeito de preços mais altos e volumes maiores de vendas [Bloomberg]. Segundo a Bloomberg, o EBITDA proforma somou US$ 3,9 bilhões, ficando abaixo da estimativa média dos analistas de US$ 4,11 bilhões [Bloomberg]. A reportagem enquadrou o resultado como um 'miss' em relação às expectativas do mercado, mesmo com a receita trimestral subindo cerca de 14% na comparação anual, para US$ 9,26 bilhões, e o lucro líquido avançando 36%, para US$ 1,89 bilhão — também abaixo da previsão de US$ 2,05 bilhões [Bloomberg]. Entre os destaques operacionais, os preços realizados de cobre subiram 48% em meio a uma onda de especulação no início de 2026, enquanto os preços do minério de ferro tiveram alta mais modesta, de cerca de 5,5% [Bloomberg]. O próprio título escolhido pela Bloomberg já sinaliza o tom predominantemente negativo com que o mercado recebeu o resultado. Dados de mercado consultados por agências de notícias indicaram queda em torno de 2,7% nos recibos de ações (ADRs) da Vale negociados em Nova York no pregão de divulgação."},"generated_by":"claude-research","generated_at":"2026-07-07T20:40:00Z","status":"summarized","note_for_reviewer":"Platina/paládio são subprodutos menores da Vale Base Metals, não detalhados individualmente neste release financeiro.","commentary_sources":[{"outlet":"Bloomberg","title":"Vale Falls Short as Seasonal Pressures Offset Stronger Prices","url":"https://www.bloomberg.com/news/articles/2026-04-28/vale-falls-short-as-seasonal-pressures-offset-stronger-prices","captured_at":"2026-07-07T00:00:00Z"}]},"zijin-mining":{"company_id":"zijin-mining","accession_number":null,"company_name":"Zijin Mining Group Co., Ltd.","commodities":["copper","gold","lithium"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"news-detail-122723.htm","label":"Press release/notícia oficial da empresa — título original: \"Zijin's Q1 Net Profit Soars 98% to RMB 20.1 Billion under New Chairman\"","source_url":"https://www.zijinmining.com/news/news-detail-122723.htm","captured_at":"2026-07-07T20:00:00Z"}],"tabs":{"earnings_summary":"**Resultado Financeiro (1T26 vs 1T25)**\n- Receita: RMB 98,5 bilhões, alta de 25% a/a [PR]. Lucro líquido atribuível: RMB 20,1 bilhões, alta de 98% a/a — primeira vez acima de RMB 20 bi em lucro trimestral [PR].\n\n**Produção**\n- Ouro: 23,5 toneladas, alta de 23% a/a [PR]. Cobre: 260.000 toneladas mineradas [PR]. LCE: 16.000 toneladas [PR].\n\n**Mina de Cobre Julong Fase II (Tibet)**\n- Entrou em operação em janeiro de 2026; produziu 60.000 toneladas de cobre no 1T26; capacidade plena alvo de 300.000–350.000 t/ano [PR].\n\n**Guidance 2026**\n- Cobre: meta de 1,2 milhão de toneladas [PR]. Ouro: meta de 105 toneladas [PR].","conference_call_summary":"Não foi localizada, na fonte primária consultada, transcrição verbatim de teleconferência com analistas para o 1T26.","commodity_commentary":"Apesar de pesquisa extensa em Bloomberg, Reuters, Financial Times e Wall Street Journal, não foi possível localizar uma reportagem dedicada dessas fontes analisando especificamente a reação do mercado ao relatório do primeiro trimestre de 2026 da Zijin Mining, divulgado em 21 de abril de 2026. A Bloomberg noticiou amplamente a trajetória de lucros recordes da mineradora chinesa em torno da divulgação dos resultados anuais de 2025, destacando que o lucro líquido estimado saltou até 62% em 2025, para RMB 52 bilhões (US$ 7,4 bilhões), com a Zijin planejando aumentar a produção de ouro e cobre em ritmo de dois dígitos em 2026 [Bloomberg]. Essa cobertura também situou a Zijin como a terceira maior mineradora do mundo por valor de mercado, atrás apenas de Rio Tinto e BHP [Bloomberg]. Quanto ao resultado específico do primeiro trimestre de 2026 — lucro líquido atribuível de RMB 20,1 bilhões (+98% a/a) e receita de RMB 98,5 bilhões (+25%), segundo números divulgados pela própria companhia —, a pesquisa não encontrou, entre as quatro fontes prioritárias, uma análise dedicada de reação de mercado a este resultado em particular. Por isso, esta nota registra os números como divulgados pela companhia e por agências setoriais especializadas, sem atribuir uma reação de mercado não confirmada nas fontes prioritárias."},"generated_by":"claude-research","generated_at":"2026-07-07T20:45:00Z","status":"summarized","note_for_reviewer":"Zijin é listada na HKEX e Bolsa de Xangai — não é registrante SEC. Valores em RMB.","commentary_sources":[{"outlet":
