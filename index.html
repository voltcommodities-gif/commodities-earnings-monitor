<title>Commodity Earnings Monitor</title>
<style>
  :root {
    --bg: #15130f;
    --bg-elevated: #1b1815;
    --bg-inset: #0f0d0a;
    --border: #2b2620;
    --text: #e9e3d7;
    --text-muted: #948c7d;
    --text-faint: #635d51;
    --text-ghost: #4a453b;
    --accent: #c97a44;
    --warn: #b8944a;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f2ec; --bg-elevated: #fbfaf6; --bg-inset: #ece9e0;
      --border: #ddd8ca; --text: #24211b; --text-muted: #6d6759; --text-faint: #9a927f; --text-ghost: #bab294;
      --accent: #a9602f; --warn: #8a6a2a;
    }
  }
  :root[data-theme="dark"] {
    --bg: #15130f; --bg-elevated: #1b1815; --bg-inset: #0f0d0a;
    --border: #2b2620; --text: #e9e3d7; --text-muted: #948c7d; --text-faint: #635d51; --text-ghost: #4a453b;
    --accent: #c97a44; --warn: #b8944a;
  }
  :root[data-theme="light"] {
    --bg: #f4f2ec; --bg-elevated: #fbfaf6; --bg-inset: #ece9e0;
    --border: #ddd8ca; --text: #24211b; --text-muted: #6d6759; --text-faint: #9a927f; --text-ghost: #bab294;
    --accent: #a9602f; --warn: #8a6a2a;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 15px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent); color: var(--bg); }

  .shell { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;
    padding: 16px 28px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .topbar .brand { font-family: var(--mono); font-size: 13.5px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar .meta { font-family: var(--mono); font-size: 12px; color: var(--text-faint); display: flex; gap: 18px; flex-wrap: wrap; }
  .topbar .meta strong { color: var(--text-muted); font-weight: 500; font-variant-numeric: tabular-nums; }
  .topbar .spacer { flex: 1; }
  .topbar .schedule { font-family: var(--mono); font-size: 12px; color: var(--text-faint); }

  .layout { display: flex; flex: 1; min-height: 0; }

  .rail { width: 296px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .rail-search { padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .rail-search input {
    width: 100%; background: var(--bg-inset); border: 1px solid var(--border); color: var(--text);
    font-family: var(--sans); font-size: 13px; padding: 7px 10px; border-radius: 5px; outline: none;
  }
  .rail-search input:focus { border-color: var(--accent); }
  .rail-search input::placeholder { color: var(--text-faint); }
  .rail-legend { display: flex; gap: 12px; padding: 8px 16px; font-family: var(--mono); font-size: 10px; color: var(--text-faint); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .rail-legend span { display: inline-flex; align-items: center; gap: 4px; }
  .rail-legend .dot { width: 5px; height: 5px; border-radius: 50%; }

  .rail-scroll { flex: 1; overflow-y: auto; padding: 8px 0 24px; }
  .rail-group h3 {
    font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-faint); margin: 16px 16px 6px; display: flex; justify-content: space-between;
  }
  .rail-group h3 .count { color: var(--text-ghost); }
  .rail-group:first-child h3 { margin-top: 8px; }
  .company-row {
    display: flex; align-items: baseline; gap: 8px; padding: 5px 24px; cursor: pointer;
  }
  .company-row:hover .name { color: var(--text); }
  .company-row.active .name { color: var(--text); }
  .company-row.active .ticker { color: var(--accent); }
  .company-row .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  .company-row .dot.new { background: var(--accent); }
  .company-row .dot.gap { background: var(--warn); }
  .company-row .dot.needs_verification { background: none; border: 1px solid var(--text-faint); }
  .company-row .dot.clear { background: transparent; }
  .company-row .dot.not_traded { background: transparent; }
  .company-row .ticker { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); min-width: 40px; }
  .company-row .name { font-size: 12.5px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .company-row.not-traded { opacity: 0.55; }
  .company-row.not-traded .name { font-size: 12px; }
  .company-row.hidden { display: none; }
  .rail-group.hidden { display: none; }

  .main { flex: 1; min-width: 0; overflow-y: auto; }
  .main-inner { max-width: 720px; margin: 0 auto; padding: 32px 32px 80px; }

  .empty-state { max-width: 560px; margin: 90px auto 0; padding: 0 32px; }
  .empty-state h2 { font-size: 16px; font-weight: 600; margin: 0 0 8px; color: var(--text); }
  .empty-state p { font-size: 13.5px; color: var(--text-muted); margin: 0 0 6px; }
  .empty-state .meta-line { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); margin-top: 14px; }

  .filing-head { margin-bottom: 8px; }
  .filing-head .toprow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .filing-head .commodities {
    font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-faint);
  }
  .doc-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border); color: var(--text-muted);
  }
  .doc-badge.trading_update { color: var(--warn); border-color: var(--warn); }
  .doc-badge.earnings { color: var(--accent); border-color: var(--accent); }
  .filing-head h1 { font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; text-wrap: balance; }
  .filing-head .sub { font-family: var(--mono); font-size: 12px; color: var(--text-faint); }
  .filing-head .sub span + span::before { content: " · "; }

  .sources { margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); }
  .sources .label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 8px; }
  .source-item { display: flex; gap: 10px; align-items: baseline; font-size: 12.5px; padding: 3px 0; color: var(--text-muted); }
  .source-item .src-code { font-family: var(--mono); font-weight: 600; color: var(--text-faint); min-width: 16px; flex-shrink: 0; }
  .source-item a { color: var(--text-muted); text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 2px; }
  .source-item a:hover { color: var(--text); text-decoration-color: var(--text-faint); }
  .source-item .captured { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); margin-left: auto; flex-shrink: 0; font-variant-numeric: tabular-nums; }

  .tabs { display: flex; gap: 26px; margin: 30px 0 0; border-bottom: 1px solid var(--border); }
  .tab-btn {
    font-family: var(--sans); font-size: 13.5px; font-weight: 500; background: none; border: none; cursor: pointer;
    padding: 10px 0; color: var(--text-faint); border-bottom: 1px solid transparent; transform: translateY(1px);
  }
  .tab-btn:hover { color: var(--text-muted); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .tabpanel { display: none; padding-top: 26px; }
  .tabpanel.active { display: block; }
  .tabpanel p { margin: 0 0 15px; font-size: 14px; color: var(--text); }
  .tabpanel h4 { font-size: 12.5px; font-weight: 600; margin: 26px 0 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; }
  .tabpanel h4:first-child { margin-top: 0; }
  .tabpanel ul { margin: 0 0 15px; padding-left: 18px; }
  .tabpanel li { margin-bottom: 7px; font-size: 14px; }
  .tabpanel strong { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  .cite { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); }
  .quote-block { border-left: 2px solid var(--border); padding-left: 16px; margin: 18px 0; color: var(--text-muted); font-size: 13.5px; }
  .translation-note { font-size: 11.5px; color: var(--text-faint); font-style: italic; margin-top: -8px; }
  .warn-banner {
    font-size: 13px; color: var(--warn); border: 1px solid var(--warn); border-radius: 6px;
    padding: 10px 14px; margin-bottom: 20px; background: color-mix(in srgb, var(--warn) 10%, transparent);
  }

  .footer-note { margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 11px; color: var(--text-faint); }

  a { color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>

    <main class="main" id="main"></main>
  </div>
</div>

o em linha com o 1T26 [PR]\n\n**Chemicals and Products**\n- Margem indicativa de refino: ~US$ 20/bbl [PR]\n- Margem indicativa de química: ~US$ 240/tonelada [PR]\n- Utilização de refino: ~100% [PR]\n\n**Renewables and Energy Solutions**\n- Lucro ajustado: faixa de US$ (0,3) a US$ 0,3 bilhão [PR]\n\n**Fluxo de Caixa do Grupo**\n- Capital de giro: US$ 1 a 6 bilhões (ante saída de US$ 11,2 bilhões no 1T26), refletindo volatilidade de preços de commodities [PR]\n- Imposto pago: US$ 2,6-3,4 bilhões [PR]\n\n**Resultados completos do 2T26: agendados para 30 de julho de 2026** [PR].", "conference_call_summary": "Não há teleconferência associada a este trading update — a Shell normalmente não realiza call para atualizações de guidance pré-resultados, apenas para os resultados trimestrais completos, agendados para 30/07/2026 [PR].", "commodity_commentary": "A Reuters (Londres, 7 de julho, repórter Stephanie Kelly) noticiou que a Shell elevou a guidance de produção de gás integrado e sinalizou resultado de trading \"significativamente mais alto\" no segundo trimestre de 2026, à medida que a volatilidade dos mercados de energia — provocada pela guerra no Irã — beneficiou as operações de trading da companhia [Reuters]. A produção de Integrated Gas foi revisada para 610-650 mil boe/d, ante a faixa anterior de 580-640 mil boe/d, e os volumes de liquefação de GNL foram elevados para 7,4-7,8 milhões de toneladas (de 6,8-7,4 milhões) [Reuters].\n\nSegundo a Reuters, as ações da Shell subiram 3,2% na abertura do pregão em 7 de julho, com o setor de energia europeu avançando 0,3% no mesmo dia [Reuters]. O Citi elevou sua projeção de lucro por ação do segundo trimestre para a Shell em 13%, citando a atualização \"incrementalmente positiva\" da companhia [Reuters]. A Bloomberg, em newsletter do mesmo dia intitulada \"Oil Major Shell Cashes In On Volatile Energy Markets\", descreveu a Shell como beneficiária direta da turbulência nos mercados de energia [Bloomberg].\n\nO comunicado também imeiro trimestre refletem a força do nosso portfólio diversificado, com crescimento em receitas, fluxo de caixa e lucros na comparação com o primeiro trimestre do ano passado, apesar da capacidade reduzida em nossas operações na Indonésia. A equipe global da Freeport está focada em restaurar as operações em Grasberg de forma segura e sustentável, impulsionando novas tecnologias e programas de eficiência para aumentar a lucratividade das nossas operações nas Américas, e buscando nosso portfólio altamente atrativo de opções de crescimento orgânico para gerar valor aos acionistas. A Freeport está fortemente posicionada como 'a Campeã do Cobre dos EUA' e como líder global em cobre, com operações em grande escala e geograficamente diversificadas, e um pipeline de opções de crescimento de curto, médio e longo prazo para sustentar um mercado em expansão.\" [PR]\n\n^Tradução livre do texto original em inglês do press release.\n\nNenhum conteúdo de perguntas e respostas sobre capex, M&A, alocação de capital ou riscos operacionais pode ser reportado aqui porque nenhuma transcrição de Q&A estava disponível nas fontes primárias analisadas. Se um filing futuro ou o site de RI da empresa publicar uma transcrição oficial desta call, esta aba deve ser reprocessada.", "commodity_commentary": "A cobertura da Bloomberg sobre o resultado do primeiro trimestre de 2026 da Freeport-McMoRan destacou um trimestre de sinais contraditórios: a receita de US$ 6,23 bilhões superou em cerca de 9% a expectativa de US$ 5,7 bilhões, e o lucro por ação de US$ 0,57 ficou acima da previsão de US$ 0,47, mas o resultado foi ofuscado pelo corte no guidance de produção para 2026 e 2027 [Bloomberg].\n\nSegundo reportagens da Bloomberg, o problema central segue sendo a mina Grasberg, na Indonésia, atingida por um deslizamento de lama fatal em setembro de 2025: a companhia cortou a projeção de vendas de cobre para 2026 em cerca de 20%, para aproximadamente 3,1 bilhões de libras ante 3,4 bilhões previstos antes, com corte semelhante para o ouro [Bloomberg]. As vendas de cobre da unidade indonésia caíram para 82 milhões de libras no trimestre, de 290 milhões um ano antes, e a empresa registrou custos de ociosidade e restauração de US$ 406 milhões.\n\nA reação do mercado foi fortemente negativa: as ações da Freeport caíram cerca de 12% a 13% nos pregões seguintes à divulgação, chegando a US$ 61,48 ante fechamento anterior de US$ 70,36 [Bloomberg]. O Morgan Stanley rebaixou a recomendação do papel para 'equalweight', citando ramp-up mais lento e custos temporariamente mais altos em Grasberg, com preço-alvo reduzido de US$ 70 para US$ 66; Jefferies e Bernstein SocGen também cortaram preços-alvo na sequência."}, "generated_by": "claude-code-manual-demo", "generated_at": "2026-07-06T22:15:00Z", "status": "summarized", "note_for_reviewer": "Generated inline by Claude (not via scripts/generate_summary.py's Anthropic API call, and not via the scheduled routine) as a milestone-1 validation demo, reading the primary documents directly with the Read/Bash tools in this session. Every quote and figure above was located and verified against the extracted document text before being written here.", "commentary_sources": [{"outlet": "Bloomberg", "title": "Watch Freeport Shares Slide as Indonesian Mine Restart Faces Delay", "url": "https://www.bloomberg.com/news/videos/2026-04-23/freeport-shares-slide-as-mine-restart-faces-delay-video", "captured_at": "2026-07-08T00:00:00Z"}]}, "rio-tinto": {"company_id": "rio-tinto", "accession_number": "0000863064-26-000022", "company_name": "Rio Tinto Group", "commodities": ["copper", "iron ore", "aluminum"], "document_type": "production_report", "document_type_label": "Relatório de Produção Trimestral", "sources": [{"filename": "rio-tinto-releases-first-quarter-2026-production-results", "label": "Press release da empresa — título original: \"Rio Tinto releases first quarter 2026 production results\"", "source_url": "https://www.riotinto.com/en/news/releases/2026/rio-tinto-releases-first-quarter-2026-production-results", "captured_at": "2026-07-07T19:10:00Z"}, {"filename": "ex1d21rt1q26results.htm", "label": "Anexo 99.1/21 ao Formulário 6-K (SEC EDGAR) — \"Rio Tinto 2026 first quarter operations review\"", "source_url": "https://www.sec.gov/Archives/edgar/data/0000863064/000086306426000022/ex1d21rt1q26results.htm", "captured_at": "2026-07-07T19:10:00Z"}], "tabs": {"earnings_summary": "**Produção de Cobre**\n- Produção consolidada de cobre atingiu 229 mil toneladas no 1T26, alta de 9% em relação ao 1T25 [PR].\n- Crescimento puxado pela continuidade do ramp-up de Oyu Tolgoi (Mongólia), cuja produção de metal em concentrado saltou 56% na comparação anual [PR].\n- Em Kennecott (EUA), o metal refinado recuou 20% ano contra ano; em Escondida (Chile, participação minoritária da Rio Tinto), o metal em concentrado caiu 14% mas o metal refinado subiu 21% [PR].\n- Crescimento equivalente-cobre do portfólio de 9% na comparação anual, também impulsionado pelo desempenho do alumínio [PR].\n\n**Minério de Ferro**\n- Produção em Pilbara: 78,8 milhões de toneladas, alta de 13% ano contra ano [PR].\n- Vendas globais de minério de ferro: 75,7 Mt, alta de 2% [PR].\n- Guidance de produção de minério de ferro para 2026 mantida em 343–366 Mt [PR].\n- Ciclones reduziram os embarques de Pilbara em cerca de 8 Mt no trimestre, com recuperação parcial esperada [PR].\n- Simandou (Guiné) realizou seu primeiro embarque pleno de minério de alto teor para a China durante o mês de abril [PR].\n\n**Projeto Resolution (cobre, Arizona)**\n- Após a conclusão da permuta de terras (\"land exchange\") em março de 2026, teve início a perfuração no projeto de cobre Resolution, no Arizona [PR].\n\n**Guidance**\n- Guidance de produção para 2026 mantida sem alterações em todas as commodities [PR].", "conference_call_summary": "Não foi localizada uma transcrição de teleconferência de resultados nas fontes primárias consultadas — trata-se apenas de um relatório operacional de produção trimestral. A única declaração direta disponível é do CEO Simon Trott:\n\n> \"Operating excellence drove 9% year-on-year copper equivalent production growth across our portfolio.\"\n^Tradução livre: \"A excelência operacional impulsionou um crescimento de 9% na produção equivalente-cobre do nosso portfólio, ano contra ano.\"", "commodity_commentary": "A Reuters descreveu o resultado anual de 2025 da Rio Tinto como um 'lucro estável', com o lucro subjacente em US$ 10,87 bilhões, praticamente estagnado ante o ano anterior e abaixo do consenso de US$ 11,03 bilhões, com o negócio de minério de ferro pressionado por preços mais fracos e custos unitários mais altos no Pilbara [Reuters]. O lucro líquido atribuível aos acionistas somou US$ 10,0 bilhões, ante US$ 11,6 bilhões em 2024.\n\nSegundo a Reuters, o cobre amorteceu parte da fraqueza do minério de ferro: os ganhos da divisão dobraram no ano e passaram a responder por cerca de 30% do total do grupo, enquanto a fatia do minério de ferro caiu para 60% do lucro total, de 70% um ano antes [Reuters]. As ações da Rio Tinto em Londres caíram entre 3,4% e 4% na sessão seguinte à divulgação, com desempenho pior que o de seus pares do setor [Reuters].\n\nAnalistas do Jefferies comentaram que, 'sem fusões e aquisições, esperamos que o caixa livre seja usado para fortalecer o balanço da Rio e manter os retornos dentro da faixa de payout de dividendos de 40%-60%' [Reuters]. A empresa declarou dividendo final de US$ 2,25 por ação, ante US$ 2,58 no ano anterior, mesmo com avanços operacionais como a rampagem da mina de cobre subterrânea Oyu Tolgoi e o primeiro embarque de minério de alto teor de Simandou."}, "generated_by": "claude-research", "generated_at": "2026-07-07T20:00:00Z", "status": "summarized", "note_for_reviewer": "Relatório operacional de produção, não earnings financeiro completo — sem receita/lucro/EBITDA/capex. Resultados financeiros do 1S26 ainda não publicados na data da pesquisa.", "commen scondida reduzida para US$ 1,00–1,20/lb [PR].", "conference_call_summary": "Não confirmada transcrição completa associada a este relatório operacional (BHP normalmente não faz call para relatórios operacionais intermediários). Citação direta do então CEO Mike Henry:\n\n> \"In copper, strong performance at Escondida and Antamina supports our expectation of delivering production in the upper half of full-year copper guidance.\"\n^Tradução livre: \"No cobre, o forte desempenho em Escondida e Antamina sustenta nossa expectativa de entregar produção na metade superior da guidance anual de cobre.\"", "commodity_commentary": "A Reuters destacou que o lucro subjacente do primeiro semestre fiscal de 2026 da BHP (encerrado em 31 de dezembro de 2025) saltou 22%, para US$ 6,20 bilhões, superando o consenso de US$ 6,03 bilhões, com o cobre superando o minério de ferro como maior fonte de lucro da mineradora pela primeira vez na história — US$ 7,95 bilhões contra US$ 7,50 bilhões, ou 51% do total [Reuters].\n\nA reação do mercado foi eufórica: as ações da BHP saltaram 7%, atingindo máxima histórica, em resposta ao dividendo interino de 73 centavos de dólar por ação, bem acima da estimativa de mercado de 63 centavos [Reuters]. Segundo a Reuters, Andy Forster, gestor de portfólio da Argo Investments, resumiu a reação dizendo que a companhia 'superou as expectativas de todo mundo do ponto de vista de dividendos' [Reuters].\n\nA alta de 32% nos preços do cobre, impulsionada pela demanda ligada a data centers de inteligência artificial e à transição energética, foi apontada como o principal motor por trás da guinada de resultados. O CEO Mike Henry declarou não haver 'necessidade urgente' de perseguir grandes aquisições dado o forte potencial de crescimento orgânico da companhia, comentário lido pelo mercado como sinal de que a BHP prioriza projetos internos de cobre em vez de negócios transformacionais."}, "generated_by": "claude-research", "generated_at": "2026-07-07T20:05:00Z", "status": "summarized", "note_for_reviewer": "ATENÇÃO METODOLÓGICA: bhp.com apresentou timeout em múltiplas tentativas de fetch direto. Números corroborados via 6-K na SEC EDGAR e citações verbatim cruzadas. Relatório operacional apenas — BHP reporta financeiro só semestralmente.", "commentary_sources": []}, "anglo-american": {"company_id": "anglo-american", "accession_number": null, "company_name": "Anglo American plc", "commodities": ["copper", "iron ore", "diamonds", "manganese"], "document_type": "production_report", "document_type_label": "Relatório de Produção Trimestral (Q1 2026)", "sources": [{"filename": "28-04-2026", "label": "Press release da empresa (RNS/LSE) — título original: \"Q1 2026 Production Report\"", "source_url": "https://www.angloamerican.com/media/press-releases/2026/28-04-2026", "captured_at": "2026-07-07T19:25:00Z"}], "tabs": {"earnings_summary": "**Produção de Cobre**\n- Produção total de cobre (portfólio simplificado) somou 170.400 toneladas no 1T26, alta de 1% frente ao 1T25 [PR].\n- Los Bronces e Collahuasi (Chile) contribuíram para o aumento; Quellaveco (Peru) registrou queda por menores teores, dentro do esperado [PR].\n\n**Outras Commodities**\n- Minério de ferro premium: 15,2 Mt, queda de 2% [PR]. Minério de manganês: 759.100 t, alta de 118% [PR]. Diamantes: 7,1 milhões de quilates, alta de 17% [PR]. Carvão metalúrgico: 1,5 Mt, queda de 31% [PR].\n\n**Guidance 2026**\n- Cobre: 700.000–760.000 t, custo unitário ~172 c/lb [PR]. Guidance mantida sem alterações [PR].\n\n**Desenvolvimentos Estratégicos**\n- Fusão com a Teck Resources: fechamento esperado entre setembro de 2026 e março de 2027 [PR]. Venda do negócio de carvão metalúrgico avançando, conclusão esperada no 2T26 [PR].", "conference_call_summary": "Não localizada transcrição de teleconferência. Citação direta do CEO Duncan Wanblad: a empresa \"delivered a strong start to the year across both Copper and Premium Iron Ore\".\n^Tradução livre: \"entregou um início de ano forte tanto em Cobre quanto em Minério de Ferro Premium.\"", "commodity_commentary": "A Bloomberg noticiou que a Anglo American registrou prejuízo líquido de US$ 3,7 bilhões em seu resultado anual de 2025, após nova baixa contábil no valor da De Beers, sua unidade de diamantes — a terceira redução em três anos —, que teve o valor contábil cortado para US$ 2,3 bilhões, ante US$ 4,1 bilhões anteriormente [Bloomberg]. O impairment líquido foi de US$ 2,3 bilhões antes de impostos, refletindo previsões mais fracas para os preços de diamantes brutos, em meio a uma das piores crises do setor diamantífero em décadas [Bloomberg].\n\nApesar de a receita da De Beers ter avançado 6%, para US$ 3,49 bilhões, o prejuízo subjacente da unidade se ampliou para US$ 739 milhões, ante US$ 288 milhões no ano anterior [Bloomberg].\n\nA cobertura também enquadrou o resultado no contexto da fusão em curso com a Teck Resources, batizada de Anglo Teck, movimento construído desde que a companhia rechaçou uma oferta hostil da BHP em 2024 e anunciou um plano de reestruturação radical, saindo dos negócios de diamantes, carvão e platina. O CEO Duncan Wanblad afirmou, em teleconferência pós-resultados, que a companhia está 'em estágio avançado de conversas com um grupo seleto de partes interessadas' para a venda da De Beers [Bloomberg]."}, "generated_by": "claude-research", "generated_at": "2026-07-07T20:08:00Z", "status": "summarized", "note_for_reviewer": "Relatório de produção trimestral apenas — sem demonstrativo financeiro. Anglo American não é registrante SEC, sem accession_number aplicável.", "commentary_sources": [{"outlet": "Bloomberg", "title": "Anglo American Takes $2.3 Billion De Beers Writedown as Profit Holds Steady", "url": "https://www.bloomberg.com/news/articles/2026-02-20/anglo-american-takes-another-de-beers-writedown-as-profit-steady", "captured_at": "2026-07-08T00:00:00Z"}]}, "antofagasta": {"company_id": "antofagasta", "accession_number": null, "company_name": "Antofagasta plc", "commodities": ["copper", "gold", "molybdenum"], "document_type": "production_report", "document_type_label": "Relatório de Produção Trimestral (Q1 2026)", "sources": [{"filename": "q1-2026-quarterly-production-report", "label": "Press release da empresa (RNS/LSE) — título original: \"Q1 2026 Quarterly Production Report\"", "source_url": "https://www.antofagasta.co.uk/investors/news/2026/q1-2026-quarterly-production-report/", "captured_at": "2026-07-07T19:15:00Z"}], "tabs": {"earnings_summary": "**Produção de Cobre**\n- Produção do grupo: 143.000 toneladas no 1T26, queda de 8% ano contra ano [PR].\n- Los Pelambres: 66.300 toneladas, queda de 5% a/a e de 16% t/t, por parada de planta e menores teores [PR].\n\n**Byproducts e Custos**\n- Ouro: 46.500 onças, alta de 8% a/a [PR]. Molibdênio: 3.000 toneladas, estável [PR].\n- Custo caixa líquido do grupo: US$ 1,08/lb, queda de 30% a/a, por maiores créditos de subproduto [PR].\n\n**Guidance 2026**\n- Produção de cobre: 650.000–700.000 toneladas (mantida) [PR]. Capex: US$ 3,4 bilhões [PR].", "conference_call_summary": "Não localizada transcrição de teleconferência. Citação direta do CEO Iván Arriagada: a empresa busca \"increase our copper production by 30%\", com \"the medium-term fundamentals for copper are compelling.\"\n^Tradução livre: \"aumentar nossa produção de cobre em 30%\" ... \"os fundamentos de médio prazo para o cobre são convincentes.\"", "commodity_commentary": "A Reuters relatou que a Antofagasta encerrou 2025 com EBITDA recorde de US$ 5,2 bilhões, alta de 52% em relação aos US$ 3,43 bilhões do ano anterior, impulsionada pela disparada de mais de 40% nos preços do cobre ao longo do ano, mesmo com produção ligeiramente menor [Reuters]. A receita cresceu 30%, para US$ 8,62 bilhões.\n\nApesar do resultado recorde, a reação do mercado foi negativa: as ações da Antofagasta, listadas em Londres, caíram cerca de 3,1% na manhã seguinte à divulgação, tornando o papel o pior desempenho do FTSE 100 no dia, já que o EBITDA ficou apenas 1% acima do consenso [Reuters]. A corretora Peel Hunt manifestou decepção com o dividendo final proposto de 48 centavos de dólar por ação, abaixo do consenso de 56,5 centavos [Reuters].\n\nA produção de cobre recuou 2%, para 653.700 toneladas, enquanto o preço médio realizado do metal subiu 18%, para US$ 4,93 por libra. A dívida líquida saltou para cerca de US$ 2,75 bilhões, ante US$ 1,63 bilhão um ano antes, refletindo o pico de investimentos em curso. O CEO Ivan Arriagada destacou que a expansão do concentrador de Centinela está 70% concluída, com conclusão prevista para 2027."}, "generated_by": "claude-research", "generated_at": "2026-07-07T20:10:00Z", "status": "summarized", "note_for_reviewer": "Relatório de produção trimestral apenas — sem demonstrativo financeiro. Antofagasta não é registrante SEC.", "commentary_sources": []}, "teck-resources": {"company_id": "teck-resources", "accession_number": "0000950142-26-001171", "company_name": "Teck Resources Limited", "commodities": ["copper", "zinc"], "document_type": "earnings", "document_type_label": "Earnings Completo", "sources": [{"filename": "teck-reports-unaudited-first-quarter-results-for-2026", "label": "Press release da empresa — título original: \"Teck Reports Unaudited First Quarter Results for 2026\"", "source_url": "https://www.teck.com/news/news-releases/2026/teck-reports-unaudited-first-quarter-results-for-2026", "captured_at": "2026-07-07T19:30:00Z"}, {"filename": "eh260770499_ex9901.htm", "label": "Anexo 99.1 ao Formulário 6-K (SEC EDGAR)", "source_url": "https://www.sec.gov/Archives/edgar/data/0000886986/000095014226001171/eh260770499_ex9901.htm", "captured_at": "2026-07-07T19:30:00Z"}], "tabs": {"earnings_summary": "**Resultado Financeiro (1T26 vs 1T25)**\n- Receita: CAD$ 3.943 milhões, ante CAD$ 2.290 milhões [PR]. Lucro atribuível: CAD$ 819 milhões, ante CAD$ 370 milhões [PR].\n- EBITDA ajustado: CAD$ 2.088 milhões, ante CAD$ 927 milhões — alta de 125% [PR].\n\n**Segmento Cobre**\n- Preço médio realizado do cobre: US$ 5,83/lb [PR].\n- Quebrada Blanca: produção de 55.500 t (estável t/t); vendas recorde de 70.300 t; custo caixa líquido de US$ 2,27/lb (ante US$ 2,66/lb) [PR].\n- Highland Valley Copper: lucro bruto antes de D&A de CAD$ 523 milhões, ante CAD$ 190 milhões [PR].\n\n**Guidance 2026**\n- Produção de cobre: 455.000–530.000 toneladas [PR]. Custo caixa líquido de cobre: US$ 1,85–US$ 2,20/lb [PR].\n\n**Fusão com a Anglo American**\n- Aprovação regulatória canadense e dos acionistas já obtidas; sinergias esperadas de US$ 800 milhões anuais [PR].", "conference_call_summary": "Citação direta do CEO Jonathan Price: \"We delivered a very strong start to 2026, underpinned by record quarterly copper sales, strong commodity prices, and disciplined execution\", com \"all-time high quarterly copper sales\" em QB.\n^Tradução livre: \"Entregamos um início de 2026 muito forte, sustentado por vendas trimestrais recordes de cobre, preços de commodities fortes e execução disciplinada.\"", "commodity_commentary": "A BNN Bloomberg destacou que o lucro trimestral da Teck Resources 'mais que dobrou' no primeiro trimestre de 2026 em relação a um ano antes, impulsionado pela disparada dos preços do cobre, embora tenha alertado que custos de combustível representam um risco à frente [Bloomberg]. A receita saltou para C$ 3,94 bilhões, de C$ 2,29 bilhões um ano antes, o EBITDA ajustado mais que dobrou, para C$ 2,09 bilhões, e o lucro ajustado atribuível aos acionistas quase triplicou, para C$ 858 milhões (C$ 1,75 por ação) — superando em cerca de 50% a previsão de analistas de C$ 1,17, com receita cerca de 25% acima do esperado.\n\nO trimestre trouxe volume recorde de vendas de cobre, de 155.100 toneladas, alta de 48.900 toneladas na comparação anual, com o preço médio do metal 38% mais alto, em US$ 5,83 a libra.\n\nA cobertura também situou o resultado no contexto do avanço da fusão de iguais com a Anglo American, que formará a Anglo Teck — negócio já aprovado por a a; governo do Panamá autorizou processamento do estoque em 07/04/2026 [PR].\n\n**Guidance 2026 (atualizada)**\n- Cobre: elevada para 405.000–475.000 t (incluindo 30.000–40.000 t de Cobre Panamá) [PR]. Custo C1: US$ 2,15–US$ 2,40/lb [PR].", "conference_call_summary": "Citação direta do CEO Tristan Pascall: \"2026 has begun against a backdrop of heightened global uncertainty\", citando o conflito no Oriente Médio e reforçando \"constructive engagement with the Government of Panama.\"\n^Tradução livre: \"2026 começou em meio a um cenário de incerteza global acentuada.\" ... \"engajamento construtivo com o Governo do Panamá.\"", "commodity_commentary": "A BNN Bloomberg noticiou que a First Quantum Minerals registrou prejuízo líquido de US$ 196 milhões no primeiro trimestre de 2026, ante prejuízo de US$ 23 milhões no mesmo período do ano anterior, apesar de a receita ter avançado para US$ 1,4 bilhão, de US$ 1,19 bilhão [Bloomberg]. O lucro bruto recuou para US$ 278 milhões, de US$ 331 milhões, pressionado sobretudo por custos mais altos na mina Sentinel, na Zâmbia, onde a produção de cobre caiu para 45.252 toneladas, refletindo teores mais baixos de minério [Bloomberg].\n\nAinda assim, a companhia elevou a projeção de produção de cobre para 2026, de uma faixa de 375 mil–435 mil toneladas para 405 mil–475 mil toneladas, impulsionada principalmente pela expectativa de 30 mil a 40 mil toneladas adicionais provenientes do processamento de minério estocado na mina Cobre Panamá, atualmente parada [Bloomberg].\n\nO contexto de Cobre Panamá seguiu dominando a atenção dos investidores: em abril, a aprovação do governo panamenho para o processamento de cerca de 38 milhões de toneladas de minério estocado — com potencial de gerar até 70 mil toneladas de cobre recuperável — chegou a impulsionar as ações da companhia em cerca de 10% no dia do anúncio, embora o papel tenha voltado a recuar nas semanas seguintes em meio a dúvidas sobre o ritmo do retorno operacional da mina."}, "genera type": "earnings", "document_type_label": "Earnings Completo", "sources": [{"filename": "tm2612722d2_ex99-1.htm", "label": "Press release da empresa — título original: \"Agnico Eagle Reports First Quarter 2026 Results, Including Record Quarterly Operating Margins and Adjusted Net Income\" (Anexo 99.1 ao Formulário 6-K)", "source_url": "https://www.sec.gov/Archives/edgar/data/2809/000110465926053113/tm2612722d2_ex99-1.htm", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Resultados do 1T2026 — Agnico Eagle Mines Limited**\n\n**Resultado financeiro**\n- Lucro líquido de US$ 1.695 milhões (US$ 3,39/ação); lucro líquido ajustado de US$ 1.706 milhões (US$ 3,41/ação) [PR]\n- EBITDA ajustado de US$ 3.011 milhões — recorde trimestral [PR]\n- Fluxo de caixa livre de US$ 732 milhões (US$ 1,46/ação) [PR]\n- Caixa líquida de US$ 2.915 milhões; dívida total de apenas US$ 197 milhões [PR]\n\n**Produção e custos**\n- Produção total de ouro pagável de 825.109 onças [PR]\n- Preço realizado de ouro de US$ 4.861/oz, ante US$ 2.891/oz no 1T2025 [PR]\n- AISC de US$ 1.483/oz (1T2025: US$ 1.175) [PR]\n\n**Capex**\n- Capex total (ex. exploração): US$ 488,9 milhões [PR]\n\n**Retorno de capital**\n- Dividendo declarado de US$ 0,45/ação; recompras de US$ 150 milhões no trimestre [PR]\n\n**Guidance 2026 (reiterado)**\n- Produção de ouro: 3,3–3,5 Moz [PR]. AISC: US$ 1.400–1.550/oz [PR]\n\n**Projetos de crescimento**\n- Canadian Malartic/Odyssey, Detour Lake Underground, Upper Beaver e Hope Bay em desenvolvimento; consolidação na Finlândia via aquisição da Rupert Resources e Aurion Resources [PR]", "conference_call_summary": "Não foi localizada transcrição verbatim primária. Citação do CEO Ammar Al-Joundi: \"We delivered a solid start to 2026, achieving record operating margins while production and costs tracked well to plan.\"\n^Tradução livre: \"Tivemos um bom começo de 2026, alcançando margens operacionais recordes, com produção e custos dentro do plano.\"", "commodity_commentary": "Apesar de pesquisa extensa em Bloomberg, Reuters, Financial Times e Wall Street Journal, não foi localizada uma reportagem dedicada dessas quatro fontes analisando especificamente a reação do mercado aos resultados do primeiro trimestre de 2026 da Agnico Eagle Mines, divulgados em 30 de abril/1º de maio de 2026. Segundo dados amplamente replicados por agregadores financeiros e pela própria companhia, a Agnico Eagle registrou lucro líquido recorde de US$ 1,7 bilhão (US$ 3,39 por ação), mais que o dobro do resultado do mesmo período de 2025, impulsionado por preço realizado do ouro de US$ 4.861/oz (+68% a/a). O lucro ajustado por ação, de US$ 3,41, superou a expectativa média dos analistas de US$ 3,29. Apesar do forte resultado, dados de negociação amplamente reportados indicam que os papéis chegaram a recuar cerca de 3% no pregão seguinte, refletindo preocupações com custos operacionais crescentes. Casas como a Jefferies posteriormente elevaram a recomendação para 'compra', citando a fraqueza recente do preço das ações como oportunidade de entrada. Como essas informações não puderam ser confirmadas em reportagens específicas das quatro fontes prioritárias, esta nota as registra com a ressalva de que provêm de agregadores financeiros."}, "generated_by": "claude-research", "generated_at": "2026-07-07T00:00:00Z", "status": "summarized", "note_for_reviewer": "Fonte primária SEC EDGAR (6-K/Anexo 99.1).", "commentary_sources": []}, "anglogold-ashanti": {"company_id": "anglogold-ashanti", "accession_number": "0001973832-26-000091", "company_name": "AngloGold Ashanti plc", "commodities": ["gold"], "document_type": "earnings", "document_type_label": "Earnings Completo", "sources": [{"filename": "agaq1march2026operatingsta.htm", "label": "Demonstrativo operacional e financeiro trimestral — \"AngloGold Ashanti Q1 31 March 2026 Earnings Release and Dividend Declaration\" (Anexo ao Formulário 6-K)", "source_url": "https://www.sec.gov/Archives/edgar/data/1973832/000197383226000091/agaq1march2026operatingsta.htm", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Resultados do 1T2026 — AngloGold Ashanti plc**\n\n**Produção**\n- Produção total de ouro: 724 mil oz (+1% a/a) [PR]\n\n**Resultado financeiro**\n- Receita de ouro: US$ 3.154 milhões (1T2025: US$ 1.927 milhões) [PR]\n- EBITDA: US$ 2.291 milhões (+130% a/a) [PR]\n- Lucro atribuível: US$ 1.281 milhões (1T2025: US$ 443 milhões) [PR]\n\n**Custos**\n- Preço médio de ouro realizado: US$ 4.863/oz (+69% a/a) [PR]\n- AISC (grupo): US$ 1.955/oz (+19% a/a) [PR]\n\n**Caixa e balanço**\n- Fluxo de caixa livre: US$ 1.169 milhões — recorde trimestral (+190% a/a) [PR]\n- Posição de caixa líquido de US$ 868 milhões, revertendo dívida líquida de US$ 755 milhões no 1T2025 [PR]\n\n**Dividendos**\n- Dividendo trimestral recorde de US$ 585 milhões (116 centavos/ação) [PR]\n- Programa de recompra proposto de até US$ 2,0 bilhões [PR]\n\n**Projeto Arthur (Nevada)**\n- Reserva provável de 4,9 Moz; VPL após impostos de US$ 3,41–3,46 bilhões a US$ 3.500/oz; TIR de 22–26% [PR]", "conference_call_summary": "Não localizada transcrição primária. Citação do CEO Alberto Calderón: \"Our focus remains to control what we can control—managing underlying costs and ensuring safe, predictable operating results.\"\n^Tradução livre: \"Nosso foco continua sendo controlar o que está ao nosso alcance — administrar custos subjacentes e garantir resultados operacionais seguros e previsíveis.\"", "commodity_commentary": "A cobertura mais robusta da imprensa financeira internacional sobre a AngloGold Ashanti no ciclo recente veio da Bloomberg, em reportagem de 20 de fevereiro de 2026 intitulada 'AngloGold Profit Jumps 160% as Gold Rally Drives Record Dividend', referente aos resultados do ano fiscal de 2025 [Bloomberg]. Segundo a Bloomberg, o lucro saltou 160% em 2025, com o rali recorde do ouro impulsionando a produção e levando a companhia a distribuir o maior pagamento de sua história, totalizando US$ 1,8 bilhão no ano [Bloomberg]. Para o primeiro trimestre de 2026 — divulgado em 8 de maio de 2026 —, a pesquisa não localizou reportagem dedicada de nenhuma das quatro fontes prioritárias. Segundo dados divulgados pela própria companhia, a AngloGold registrou fluxo de caixa livre recorde de cerca de US$ 1,2 bilhão no trimestre — quase o triplo do mesmo período de 2025 —, dividendo trimestral recorde de 116 centavos de dólar por ação e aprovação de um programa de recompra de até US$ 2 bilhões. Esses números coincidiram com valorização das ações a máximas históricas em Joanesburgo e Nova York, segundo dados de mercado — embora sem confirmação de imprensa de primeira linha para esse trimestre específico."}, "generated_by": "claude-research", "generated_at": "2026-07-07T00:00:00Z", "status": "summarized", "note_for_reviewer": "Nova holding no Reino Unido (CIK SEC 0001973832).", "commentary_sources": [{"outlet": "Bloomberg", "title": "AngloGold Profit Jumps 160% as Gold Rally Drives Record Dividend", "url": "https://www.bloomberg.com/news/articles/2026-02-20/anglogold-posts-profit-surge-and-record-dividend-on-price-rally", "captured_at": "2026-07-07T00:00:00Z"}]}, "kinross-gold": {"company_id": "kinross-gold", "accession_number": "0001171843-26-002835", "company_name": "Kinross Gold Corporation", "commodities": ["gold"], "document_type": "earnings", "document_type_label": "Earnings Completo", "sources": [{"filename": "exh_991.htm", "label": "Press release da empresa — título original: \"Kinross reports strong 2026 first-quarter results\" (Anexo 99.1 ao Formulário 6-K)", "source_url": "https://www.sec.gov/Archives/edgar/data/701818/000117184326002835/exh_991.htm", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Resultados do 1T2026 — Kinross Gold Corporation**\n\n**Resultado financeiro**\n- Receita de vendas de metais: US$ 2.407,7 milhões (+61% a/a) [PR]\n- Lucro líquido: US$ 843,0 milhões (US$ 0,70/ação), ante US$ 368,0 milhões no 1T202 circuito de britagem da Goose Mine; produção do 2T2026 revisada para baixo [PR]", "conference_call_summary": "Não localizada transcrição verbatim primária. Release descreve \"very positive first quarter of 2026 operating and financial results.\"\n^Tradução livre: \"resultados operacionais e financeiros muito positivos no primeiro trimestre de 2026\"", "commodity_commentary": "Apesar de pesquisa extensa em Bloomberg, Reuters, Financial Times e Wall Street Journal, não foi localizada uma reportagem dedicada dessas fontes analisando especificamente a reação do mercado aos resultados do primeiro trimestre de 2026 da B2Gold, divulgados em 6 de maio de 2026. Segundo dados amplamente replicados por agregadores financeiros, a B2Gold reportou receita de ouro de US$ 1,16 bilhão, mais que o dobro do mesmo período de 2025, e lucro líquido de US$ 199,9 milhões (US$ 0,19/ação ajustado) — resultado que superou a expectativa média dos analistas de US$ 0,11 por ação em cerca de 73%. A produção de ouro somou 237.763 onças, com todas as operações superando as metas orçadas. Dados de negociação amplamente reportados indicam que as ações subiram cerca de 11% no pregão de 7 de maio de 2026, com ganho adicional de cerca de 8,5% em meados de junho. Ainda assim, em 3 de junho, o analista Josh Wolfson, do RBC Capital, reiterou recomendação neutra ('hold'), com preço-alvo de US$ 5,75. Como essas informações não puderam ser confirmadas em reportagens específicas das quatro fontes prioritárias, esta nota as registra com a ressalva de que provêm de agregadores financeiros."}, "generated_by": "claude-research", "generated_at": "2026-07-07T00:00:00Z", "status": "summarized", "note_for_reviewer": "Nenhuma.", "commentary_sources": []}, "gold-fields": {"company_id": "gold-fields", "accession_number": "0001628280-26-031621", "company_name": "Gold Fields Limited", "commodities": ["gold"], "document_type": "production_report", "document_type_label": "Relatório de Produção Trimestral", "sources": [{"filename": "goldfields-q12026_operat.htm", "label": "Atualização operacional trimestral (JSE SENS / Anexo ao Formulário 6-K) — Q1 2026 Operating Update", "source_url": "https://www.sec.gov/Archives/edgar/data/1172724/000162828026031621/goldfields-q12026_operat.htm", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Atualização operacional do 1T2026 — Gold Fields Limited**\n\n**Produção**\n- Produção total atribuível: 633 mil oz, +15% a/a e -7% t/t [PR]\n- Destaques: Salares Norte 173 mil oz (+245% a/a); Granny Smith 78 mil oz (+25% a/a) [PR]\n\n**Custos**\n- AISC: US$ 1.829/oz (+13% a/a, +9% t/t) [PR]\n- CEO sinalizou pressão de custos (diesel +30–70%, frete +40%) [PR]\n\n**Balanço**\n- Dívida líquida: US$ 1.304 milhões, -34% a/a [PR]. Dívida líquida/EBITDA ajustado: 0,19x [PR]\n\n**Guidance 2026 (mantido)**\n- Produção: 2,40–2,60 Moz [PR]. AISC: US$ 1.800–2.000/oz [PR]\n\n**Projetos**\n- Windfall (Canadá): acordo preliminar com comunidades Cree [PR]. Damang devolvida ao governo de Gana em 18/4/2026 [PR]", "conference_call_summary": "Nenhuma transcrição verbatim primária localizada. Citação do CEO: \"Gold Fields delivered a solid start to 2026, building on positive safety, operational and financial delivery of 2025.\"\n^Tradução livre: \"A Gold Fields teve um início sólido em 2026, consolidando os avanços positivos de segurança, operação e resultado financeiro obtidos em 2025.\"", "commodity_commentary": "A Bloomberg noticiou que o lucro da Gold Fields referente ao exercício de 2025 (divulgado em fevereiro de 2026) praticamente triplicou, impulsionado pela alta recorde do ouro: a mineradora sul-africana projetou lucro por ação entre US$ 3,87 e US$ 4,11, alta de 178% a 196% ante o ano anterior, refletindo preços do metal significativamente mais altos e maiores volumes vendidos [Bloomberg]. A produção anual atingiu 2,4 milhões de onças, 18% acima de 2024, com destaque para a rampa de produção da mina Salares Norte, no Chile [Bloomberg]. O ouro subiu quase 65% ao longo de 2025, em meio à turbulência geopolítica que impulsionou a demanda por ativos de proteção, contexto citado pela Bloomberg como pano de fundo do resultado [Bloomberg].\n\nA Reuters noticiou que a Gold Fields elevou o dividendo e chegou a cogitar recompra de ações à medida que a alta dos preços do ouro impulsionou o lucro, destacando o apetite da administração por devolver caixa aos acionistas após o salto de rentabilidade [Reuters]. Segundo a Reuters, o lucro triplicou na comparação anual, reforçando a leitura do mercado de que 2025 foi um ano recorde para a mineradora [Reuters].\n\nJá a atualização operacional do primeiro trimestre de 2026, divulgada em abril, mostrou produção trimestral de 633 mil onças (alta de 15% na comparação anual, mas queda de 7% ante o trimestre anterior), com custo total (AISC) subindo para US$ 1.829/oz em meio a pressões inflacionárias e câmbio mais forte nos países produtores; a dívida líquida recuou 34% na base anual, para US$ 1.304 milhões [Bloomberg]. A cobertura da imprensa financeira internacional concentrou-se, no entanto, nos resultados anuais de fevereiro, que foram o evento de maior repercussão para investidores no período mais recente."}, "generated_by": "claude-research", "generated_at": "2026-07-07T00:00:00Z", "status": "summarized", "note_for_reviewer": "Atualização operacional/de produção (padrão JSE), não demonstrativo financeiro completo com DRE.", "commentary_sources": [{"outlet": "Bloomberg", "title": "Gold Fields Says Profit Almost Tripled on Bullion Price Rally", "url": "https://www.bloomberg.com/news/articles/2026-02-06/gold-fields-says-profit-almost-tripled-on-bullion-price-rally", "captured_at": "2026-07-08T00:00:00Z"}, {"outlet": "Reuters", "title": "Gold Fields boosts shareholder returns after profit more than doubles", "url": "https://www.cnbcafrica.com/2026/gold-fields-boosts-shareholder-returns-after-profit-more-than-doubles", "captured_at": "2026-07-08T00:00:00Z"}]}, "lundin-gold": {"company_id": "lundin-gold", "accession_number": null, "company_name": "Lundin Gold Inc.", "commodities": ["gold"], "document_type": "production_report", "document_type_label": "Relatório de Produção Trimestral", "sources": [{"filename": "lundin-gold-reports-q1-2026-production", "label": "Press release da empresa — título original: \"Lundin Gold Reports Q1 2026 Production of 119,742 Ounces of Gold\" (TSX: LUG)", "source_url": "https://lundingold.com/news/lundin-gold-reports-q1-2026-production-of-119-742-122841/", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Produção do 1T2026 — Lundin Gold Inc. (mina Fruta del Norte, Equador)**\n\n- Produção total de ouro: 119.742 oz (+2,1% a/a) [PR]\n- Minério processado: 496.798 toneladas; taxa média de 5.520 t/dia, superando guidance anual de 5.500 t/dia [PR]\n- Teor médio: 8,4 g/t (1T2025: 10,4 g/t); recuperação: 89,2% [PR]\n- Preço médio realizado: US$ 4.951/oz (1T2025: US$ 3.081/oz) [PR]\n- Guidance 2026 mantido em 475.000–525.000 oz [PR]", "conference_call_summary": "Não localizada transcrição verbatim — comunicado de produção sem call dedicada. Citação do CEO Jamie Beck: \"a strong start to 2026, reflecting an increase in mill throughput and stable operating performance at Fruta del Norte.\"\n^Tradução livre: \"um início forte para 2026, refletindo aumento no processamento da planta e desempenho operacional estável em Fruta del Norte\"", "commodity_commentary": "A Reuters publicou, antes da divulgação dos resultados do primeiro trimestre de 2026, uma prévia em que analistas projetavam lucro por ação de US$ 1,13 para a Lundin Gold, referência usada para avaliar o desempenho da mineradora canadense operadora da mina Fruta del Norte, no Equador [Reuters]. Em fevereiro, a agência já havia noticiado que a receita do quarto trimestre de 2025 da empresa havia subido, sustentada por fortes vendas de ouro, sinal de que a companhia entrava em 2026 em trajetória de crescimento [Reuters].\n\nOs resultados do primeiro trimestre de 2026, divulgados em 6 de maio, mostraram lucro líquido recorde de US$ 273 milhões (ante US$ 153,5 milhões um ano antes) e geração de caixa livre recorde de US$ 349 milhões, mais que o dobro do trimestre equivalente de 2025, com preço médio realizado do ouro de US$ 4.951/oz, alta de 61% na comparação anual. O lucro por ação de US$ 1,13 ficou praticamente em linha com a estimativa de US$ 1,13 citada pela Reuters em sua prévia, configurando um resultado essencialmente alinhado ao consenso [Reuters].\n\nVale registrar, por honestidade metodológica, que buscas específicas não localizaram uma reportagem da Bloomberg, Reuters, FT ou WSJ detalhando a variação exata das ações no pregão seguinte à divulgação dos números do primeiro trimestre de 2026 — inclusive dados de queda na receita ante o consenso circularam majoritariamente em veículos especializados de menor porte, não nos quatro veículos de referência solicitados. Por isso, esta nota não atribui a esses veículos secundários uma reação de mercado que não pôde ser confirmada diretamente nas fontes exigidas."}, "generated_by": "claude-research", "generated_at": "2026-07-07T00:00:00Z", "status": "summarized", "note_for_reviewer": "Comunicado de produção — sem receita/lucro/EBITDA/capex. TSX apenas, não SEC filer.", "commentary_sources": []}, "harmony-gold-mining": {"company_id": "harmony-gold-mining", "accession_number": "0001628280-26-035830", "company_name": "Harmony Gold Mining Company Limited", "commodities": ["gold", "copper"], "document_type": "earnings", "document_type_label": "Atualização Operacional (9 meses)", "sources": [{"filename": "harmonyoperationalupdate.htm", "label": "Atualização operacional (JSE SENS / Anexo ao Formulário 6-K) — 9 meses encerrados em 31/03/2026", "source_url": "https://www.sec.gov/Archives/edgar/data/1023514/000162828026035830/harmonyoperationalupdate.htm", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Atualização operacional — 9 meses encerrados em 31/03/2026 — Harmony Gold Mining**\n\n- Receita de ouro e cobre: US$ 4.016 milhões, +34% a/a [PR]\n- Preço médio de ouro recebido: US$ 3.691/oz, +39% a/a [PR]\n- Fluxo de caixa livre operacional: +87% a/a [PR]\n- Balanço migrou de dívida líquida de US$ 335 milhões para caixa líquido de US$ 78 milhões [PR]\n- Produção total de ouro (9 meses): 1.073.610 oz, -3% a/a [PR]\n- AISC: US$ 2.133/oz, +14% a/a [PR]\n- Resultados do ano fiscal completo (FY2026) agendados para 27/8/2026 [PR]", "conference_call_summary": "Não localizada transcrição verbatim para este comunicado operacional de 9 meses.", "commodity_commentary": "A Bloomberg noticiou, em março de 2026, que a Harmony Gold produziu seu primeiro cobre em escala comercial, com a mina CSA, na Austrália, gerando 3.913 toneladas do metal nos seis meses até dezembro de 2025 — movimento que a reportagem descreveu como parte da estratégia da mineradora sul-africana de diversificar seu mix de metais rumo à transição energética [Bloomberg]. A mesma matéria trouxe os números financeiros do primeiro semestre do exercício fiscal de 2026 (encerrado em dezembro de 2025): receita do grupo saltou 20%, para US$ 2,56 bilhões (R$ 44 bilhões), com o preço médio do ouro recebido pela empresa 36% mais alto na comparação anual; o EBITDA avançou 39%, para R$ 18 bilhões, e o lucro operacional cresceu 61%, para R$ 16 bilhões [Bloomberg].\n\nA Bloomberg enquadrou o resultado como evidência de que a Harmony está conseguindo capturar o rali do ouro — que ultrapassou patamares históricos ao longo de 2025 e início de 2026 — enquanto expande sua base de ativos para além do metal precioso, com o cobre da CSA representando pouco mais de dois meses de operação após a conclusão da aquisição em outubro [Bloomberg].\n\nEm atualizações operacionais subsequentes (produção do terceiro trimestre fiscal, até março de 2026), a companhia informou aumento de 5% na produção trimestral de ouro, para 349.511 onças, mesmo com a produção acumulada em nove meses recuando 3% na base anual, dentro do planejado [Bloomberg]. Os resultados financeiros completos do exercício fiscal de 2026 só serão divulgados em 27 de agosto de 2026, o que faz do relatório semestral de março a referência mais recente com cobertura direta da imprensa financeira de referência."}, "generated_by": "claude-research", "generated_at": "2026-07-07T00:00:00Z", "status": "summarized", "note_for_reviewer": "Harmony reporta em ano fiscal encerrado em junho; este é o relatório do 3º trimestre fiscal, não do ano completo.", "commentary_sources": [{"outlet": "Bloomberg", "title": "Harmony Gold Produces First Copper as Firm Widens Metal Mix", "url": "https://www.bloomberg.com/news/articles/2026-03-11/harmony-gold-announces-maiden-copper-output-as-strategy-shifts", "captured_at": "2026-07-08T00:00:00Z"}]}, "greatland-resources": {"company_id": "greatland-resources", "accession_number": null, "company_name": "Greatland Resources Limited", "commodities": ["gold", "copper"], "document_type": "production_report", "document_type_label": "Relatório de Produção Trimestral", "sources": [{"filename": "june-2026-quarter-production-update", "label": "RNS via Investegate — \"June 2026 Quarter Production Update\" (AIM/LSE: GGP, ASX: GGP)", "source_url": "https://www.investegate.co.uk/announcement/rns/greatland-gold--ggp/june-2026-quarter-production-update-/9652942", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Atualização de produção — encerramento do ano fiscal FY26 (publicado em 06/07/2026) — Greatland Resources (Telfer/Havieron)**\n\n- Produção do trimestre (abr–jun/2026): 79.099 oz de ouro; 3.573 toneladas de cobre [PR]\n- Produção do ano fiscal FY26: 328.986 oz de ouro (6% acima do topo do guidance de 260.000–310.000 oz); 14.594 toneladas de cobre [PR]\n- Caixa em 30/6/2026: US$ 1.289 milhões, zero dívida [PR]\n- Empresa mantém plena exposição à alta do ouro, com proteção parcial via opções de venda [PR]\n- AISC ainda não divulgado — virá no stral completo ainda por vir em julho/2026. Reprocessar quando disponível. Antiga Greatland Gold, renomeada após aquisição de Telfer/Havieron da Newmont em 2025.", "commentary_sources": [{"outlet": "Reuters", "title": "Australia's Greatland Resources hits record high on strong quarterly gold output", "url": "https://www.tradingview.com/news/reuters.com,2026:newsml_L4N3Y8011:0-australia-s-greatland-resources-hits-record-high-on-strong-quarterly-gold-output/", "captured_at": "2026-07-08T00:00:00Z"}]}, "endeavour-mining": {"company_id": "endeavour-mining", "accession_number": null, "company_name": "Endeavour Mining plc", "commodities": ["gold"], "document_type": "earnings", "document_type_label": "Earnings Completo", "sources": [{"filename": "endeavour-reports-strong-q1-2026-results", "label": "Press release da empresa — título original: \"Endeavour Reports Strong Q1-2026 Results\" (LSE: EDV / TSX: EDV)", "source_url": "https://www.endeavourmining.com/news-and-media/news/endeavour-reports-strong-q1-2026-results/", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Resultados do 1T2026 — Endeavour Mining plc**\n\n- Receita: US$ 1.349 milhões [PR]. Lucro líquido: US$ 354 milhões (+421% t/t) [PR]\n- EBITDA ajustado: US$ 880 milhões — recorde trimestral (+29% t/t) [PR]\n- Fluxo de caixa livre: US$ 613 milhões — recorde [PR]\n- Posição de caixa líquido: US$ 405 milhões (vs. dívida líquida de US$ 158 milhões no 4T2025) [PR]\n- Produção total: 282 mil oz; preço médio realizado: US$ 4.810/oz (+24% t/t) [PR]. AISC: US$ 1.834/oz [PR]\n- Guidance 2026: produção 1.090–1.265 mil oz; AISC US$ 1.600–1.800/oz [PR]\n- Programa de retorno 2026–2028: dividendos mínimos de US$ 1,0 bilhão [PR]\n- Projeto Assafou (DFS): produção de 320 mil oz/ano nos primeiros 8 anos; VPL de US$ 5.113 milhões a US$ 4.000/oz de ouro [PR]", "conference_call_summary": "Não localizada transcrição verbatim primária. Release cita \"record adjusted EBITDA of $880 million\" e \"record free cash flow of $613 million.\"\n^Tradução livre: \"EBITDA ajustado recorde de US$ 880 milhões\" e \"fluxo de caixa livre recorde de US$ 613 milhões\"", "commodity_commentary": "A Reuters noticiou que o fluxo de caixa da Endeavour Mining referente ao exercício de 2025 (resultados anuais divulgados no início de 2026) cresceu de forma expressiva, impulsionado pelos preços elevados do ouro, consolidando a mineradora sediada na África Ocidental como uma das principais beneficiárias do rali do metal [Reuters].\n\nOs resultados do primeiro trimestre de 2026, divulgados em 30 de abril, mostraram EBITDA ajustado recorde de US$ 880 milhões (alta de 29% ante o trimestre anterior) e fluxo de caixa livre recorde de US$ 613 milhões, equivalente a US$ 2.176 por onça produzida. O lucro líquido atribuível aos acionistas saltou para cerca de US$ 354 milhões, e a companhia passou de uma posição de dívida líquida de US$ 158 milhões, no fim de 2025, para caixa líquido de US$ 405 milhões ao fim de março. O resultado veio mesmo com a produção de ouro recuando para 282 mil onças (ante 341 mil onças um ano antes), compensada por preço médio realizado de US$ 4.810/oz, alta de 73% na comparação anual.\n\nA companhia sinalizou que o programa de retorno a acionistas para 2026-2028, com piso de US$ 1 bilhão em dividendos, poderia mais que dobrar aos preços atuais do ouro. Embora buscas extensivas não tenham localizado uma reportagem específica da Bloomberg, Reuters, FT ou WSJ detalhando a variação exata das ações no pregão seguinte à divulgação do primeiro trimestre de 2026, a cobertura da Reuters sobre o exercício de 2025 já havia estabelecido a narrativa de que a alta do ouro estava elevando substancialmente a geração de caixa da empresa, tese que os números trimestrais subsequentes reforçaram [Reuters]."}, "generated_by": "claude-research", "generated_at": "2026-07-07T00:00:00Z", "status": "summarized", "note_for_reviewer": "LSE/TSX, não é registrante SEC.", "commentary_sources": [{"outlet": "Reuters", "title": "Endeavour Mining's 2025 cash flow rises on high gold prices", "url": "https://www.tradingview.com/news/reuters.com,2026:newsml_L1N3ZT0BF:0-endeavour-mining-s-2025-cash-flow-rises-on-high-gold-prices/", "captured_at": "2026-07-08T00:00:00Z"}]}, "polyus-pjsc": {"company_id": "polyus-pjsc", "accession_number": null, "company_name": "PJSC Polyus", "commodities": ["gold"], "document_type": "earnings", "document_type_label": "Resultados Operacionais e Financeiros (2S/Ano Completo)", "sources": [{"filename": "proizvodstvennye-i-finansovye-rezultaty-za-2-polugodie-2025-i-2025-god", "label": "Press release da empresa — \"Operating and financial results for the second half of 2025 and full year 2025\" (polyus.com, MOEX: PLZL)", "source_url": "https://polyus.com/en/media/press-releases/proizvodstvennye-i-finansovye-rezultaty-za-2-polugodie-2025-i-2025-god/", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Resultados do 2S e ano completo de 2025 — PJSC Polyus**\n\n- Produção total de ouro em 2025: 2.528,8 mil oz, -16% a/a, dentro do guidance de 2,5–2,6 Moz [PR]\n- Receita de 2025: US$ 8.723 milhões, +19% a/a, por maior preço médio de venda [PR]\n- EBITDA ajustado de 2025: US$ 6.347 milhões, +12% a/a [PR]\n- Custo caixa total (TCC): US$ 739/oz, +93% a/a [PR]\n- Capex de 2025: recorde de US$ 2.180 milhões, +73% a/a [PR]\n- Dívida Líquida/EBITDA Ajustado: 1,1x [PR]\n- Projeto Sukhoi Log: investimento estimado de US$ 6 bilhões, operação plena esperada para 2029 [PR]", "conference_call_summary": "Não localizada transcrição verbatim entre as fontes acessíveis.", "commodity_commentary": "A cobertura da imprensa financeira ocidental sobre a Polyus é significativamente mais limitada do que a de mineradoras de ouro comparáveis, reflexo direto das sanções impostas pelos Estados Unidos, Reino Unido e União Europeia à companhia e a outros grandes produtores russos desde 2022-2023, que incluíram banimento às importações de ouro russo e o deslistamento dos certificados de depósito da Polyus da Bolsa de Londres em 2023 [Reuters]. Ainda assim, a Reuters cobriu os resultados financeiros da Polyus referentes ao exercício de 2025 (divulgados em março de 2026): o EBITDA ajustado subiu 12% na comparação anual, para US$ 6,35 bilhões, enquanto o lucro líquido ajustado recuou 3%, para US$ 3,3 bilhões, mesmo com a produção de ouro caindo 16%, para 2,5 milhões de onças, em corte planejado [Reuters]. A receita cresceu 19%, para US$ 8,7 bilhões, impulsionada pelo preço médio realizado do ouro refinado, que mais que compensou o menor volume vendido [Reuters].\n\nA reportagem da Reuters também mencionou que as sanções praticamente dobraram o custo estimado de desenvolvimento do projeto Sukhoi Log, na Sibéria, de US$ 3,3 bilhões para cerca de US$ 6 bilhões, e que a companhia projeta produção estável entre 2,5 e 2,6 milhões de onças em 2026, com o projeto entrando em plena operação apenas em 2029 [Reuters].\n\nPor honestidade, não foram localizadas nas fontes solicitadas (Bloomberg, Reuters, FT, WSJ) análises de bancos de investimento ocidentais, variações de preço em bolsas internacionais ou comentários de analistas sell-side associados a este resultado — o que é esperado, já que a ação da Polyus negocia apenas na bolsa de Moscou e está fora do radar da maior parte da cobertura de analistas ocidentais desde as sanções."}, "generated_by": "claude-research", "generated_at": "2026-07-07T00:00:00Z", "status": "summarized", "note_for_reviewer": "ATENÇÃO: polyus.com bloqueou acesso direto (connection refused, possível roteamento geográfico/sanções); conteúdo obtido via proxy de leitura (r.jina.ai), mesmo documento primário mas não capturado por acesso HTTP direto — recomenda-se nova verificação direta. Polyus não é mais listada na LSE (delisting por sanções); apenas MOEX (PLZL).", "commentary_sources": [{"outlet": "Reuters", "title": "Polyus 2025 pre-tax profit rises 12% to $6.3B", "url": "https://www.mining.com/web/polyus-2025-pre-tax-profit-rises-12-to-6-3b", "captured_at": "2026-07-08T00:00:00Z"}]}, "chevron": {"company_id": "chevron", "accession_number": "0000093410-26-000110", "company_name": "Chevron Corporation", "commodities": ["oil", "natural gas"], "document_type": "earnings", "document_type_label": "Earnings Completo", "sources": [{"filename": "a03312026ex9918-k.htm", "label": "Press release da empresa — título original: \"Chevron Reports First Quarter 2026 Results\" (Anexo 99.1 ao Formulário 8-K, arquivado em 01/05/2026)", "source_url": "https://www.sec.gov/Archives/edgar/data/93410/000009341026000110/a03312026ex9918-k.htm", "captured_at": "2026-07-07T18:47:53Z"}, {"filename": "cvx-20260331.htm", "label": "Formulário 10-Q — trimestre encerrado em 31/03/2026", "source_url": "https://www.sec.gov/Archives/edgar/data/93410/000009341026000113/cvx-20260331.htm", "captured_at": "2026-07-07T18:47:53Z"}], "tabs": {"earnings_summary": "**Resultados Financeiros (1T2026 vs 1T2025)**\n- Lucro líquido atribuível: US$ 2,2 bilhões (US$ 1,11/ação diluída), ante US$ 3,5 bilhões (US$ 2,00/ação) no 1T2025 [PR]\n- Inclui perda líquida de US$ 360 milhões por provisão jurídica; efeitos cambiais reduziram o lucro em US$ 223 milhões [PR]\n- Lucro ajustado (non-GAAP): US$ 2,8 bilhões (US$ 1,41/ação) [PR]\n- Receita total: US$ 48.607 milhões, ante US$ 47.610 milhões no 1T25 [PR]\n- Preço médio Brent: US$ 81/barril (1T26) vs US$ 76/barril (1T25) [PR]\n\n**Segmentos**\n- Upstream EUA: lucro US$ 2.112 milhões, ante US$ 1.858 milhões no 1T25 — produção subiu 388 mil bpd a/a pela aquisição da Hess [PR]\n- Upstream Internacional: lucro US$ 1.797 milhões, ante US$ 1.900 milhões — câmbio desfavorável [PR]\n- Downstream EUA: lucro US$ 196 milhões, ante US$ 103 milhões — margens mais altas [PR]\n- Downstream Internacional: prejuízo de US$ 1.013 milhões, ante lucro de US$ 222 milhões — margens menores [PR]\n\n**Fluxo de Caixa e Capex**\n- CFFO: US$ 2,5 bilhões, ante US$ 5,2 bilhões no 1T25 — queda por maiores saídas de capital de giro [PR]\n- FCF: -US$ 1,5 bilhão, ante +US$ 1,3 bilhão no 1T25 [PR]\n- Capex: US$ 4,1 bilhões, ante US$ 3,9 bilhões no 1T25 [PR]\n\n**Produção**\n- Produção equivalente consolidada: 3.858 mil BOED, alta de 15% mundial e 24% nos EUA a/a, pela aquisição da Hess [PR]\n- Cortes de produção no Oriente Médio (Israel/Leviathan, Zona Neutra Arábia Saudita-Kuwait) por conflito regional [PR]\n\n**Retorno de Capital**\n- US$ 6,0 bilhões retornados no trimestre (US$ 2,5 bi recompras + US$ 3,5 bi dividendos) — 16º trimestre consecutivo acima de US$ 5 bilhões [PR]\n- Dividendo declarado: US$ 1,78/ação, pagável 10/06/2026 [PR]\n\n**ROCE**: 4,5% (1T26) vs 8,3% (1T25) [PR]", "conference_call_summary": "Nenhuma transcrição arquivada na SEC (Chevron disponibiliza apenas no próprio site de RI, fora do escopo desta pesquisa). Citação do CEO Mike Wirth no release: \"Despite heightened geopolitical volatility and related supply disruptions, Chevron delivered solid first quarter performance, underscoring the resilience of our portfolio.\"\n^Tradução livre: \"Apesar da volatilidade geopolítica acentuada e das interrupções de suprimento relacionadas, a Chevron entregou um desempenho sólido no primeiro trimestre, reforçando a resiliência do nosso portfólio.\"", "commodity_commentary": "A Bloomberg noticiou que a Chevron superou com folga as estimativas de Wall Street no primeiro trimestre de 2026, com lucro ajustado por ação de US$ 1,41 — 51 centavos acima da média das projeções de analistas consultados pela própria Bloomberg —, impulsionado pela alta dos preços do petróleo e gás natural e pelos ganhos de produção provenientes da aquisição da Hess Corporation [Bloomberg]. A produção mundial da companhia saltou 15% (24% nos EUA), compensando interrupções de fornecimento ligadas à guerra entre EUA/Israel e Irã, iniciada em 28 de fevereiro, que chegou a elevar os preços do petróleo em até 50% no trimestre [Bloomberg].\n\nApesar do resultado, o lucro líquido reportado (não ajustado) caiu para US$ 2,2 bilhões (US$ 1,11 por ação diluída), ante US$ 3,5 bilhões (US$ 2,00 por ação) um ano antes, penalizado por um encargo de US$ 2,9 bilhões relacionado a efeitos de tempo (timing) em avaliação de estoques e contratos de derivativos [Bloomberg]. A companhia devolveu US$ 6,0 bilhões em caixa aos acionistas no trimestre, a 16ª vez consecutiva acima de US$ 5 bilhões [Bloomberg].\n\nPosteriormente, a Bloomberg noticiou que a Berkshire Hathaway, de Warren Buffett, vendeu cerca de US$ 8 bilhões em ações da Chevron à medida que os preços do papel dispararam em maio, movimento associado pela reportagem ao contexto de valorização das petroleiras após a alta do petróleo provocada pela guerra no Oriente Médio [Bloomberg]. A reação imediata das ações ao balanço foi discreta diante da magnitude da surpresa positiva no lucro ajustado, sinal de que o mercado já vinha precificando boa parte do impacto da alta do petróleo antes da divulgação formal dos números [Bloomberg]."}, "generated_by": "claude-research", "generated_at": "2026-07-07T18:47:53Z", "status": "summarized", "note_for_reviewer": "8-K de 01/05/2026 (1T26) — release mais recente disponível em 07/07/2026. Nenhuma transcrição de call encontrada como documento primário na SEC.", "commentary_sources": [{"outlet": "Bloomberg", "title": "Chevron Blows Away Estimates on War-Driven Surge in Oil Prices", "url": "https://www.bloomberg.com/news/articles/2026-05-01/chevron-blows-away-estimates-on-war-driven-surge-in-oil-prices", "captured_at": "2026-07-08T00:00:00Z"}, {"outlet": "Bloomberg", "title": "Berkshire Sold $8 Billion of Chevron Shares as Prices Soared", "url": "https://www.bloomberg.com/news/articles/2026-05-15/berkshire-sold-8-billion-of-chevron-shares-as-prices-soared", "captured_at": "2026-07-08T00:00:00Z"}]}, "phillips66": {"company_id": "phillips66", "accession_number": "0001534701-26-000020", "company_name": "Phillips 66", "commodities": ["oil", "natural gas", "refined products"], "document_type": "earnings", "document_type_label": "Earnings Completo", "sources": [{"filename": "psx-2026331_ex991.htm", "label": "Press release da empresa — título original: \"Phillips 66 Reports First-Quarter 2026 Results\" (Anexo 99.1 ao Formulário 8-K, 29/04/2026)", "source_url": "https://www.sec.gov/Archives/edgar/data/1534701/000153470126000020/psx-2026331_ex991.htm", "captured_at": "2026-07-07T00:00:00Z"}, {"filename": "psx-20260331.htm", "label": "Formulário 10-Q referente ao trimestre encerrado em 31/03/2026", "source_url": "https://www.sec.gov/Archives/edgar/data/1534701/000153470126000022/psx-20260331.htm", "captured_at": "2026-07-07T00:00:00Z"}], "tabs": {"earnings_summary": "**Resultados do 1T2026 (encerrado 31/03/2026)**\n\n- Lucro líquido atribuível: US$ 207 milhões (US$ 0,51/ação), ante US$ 2,9 bilhões no 4T2025 e US$ 487 milhões no 1T2025 [PR]\n- Lucro ajustado: US$ 200 milhões (US$ 0,49/ação) [PR]. EBITDA ajustado: US$ 1.268 milhões, ante US$ 2.532 milhões no 4T2025 [PR]\n- Receita: US$ 32.540 milhões, alta de 7% frente ao 1T2025 [10-Q]\n- Perda de marcação a mercado (mark-to-market) em derivativos hedge: US$ 839 milhões pré-imposto, por forte alta de preços de commodities [PR]\n\n**Segmentos — Lucro Ajustado (pré-tax, US$ milhões)**\n- Midstream: 591 (vs 683 no 1T25) [PR]\n- Refining: 208 (vs -937 no 1T25) [PR]\n- Marketing and Specialties: -141 (vs 265 no 1T25) [PR]\n- Chemicals: 85 (vs 113 no 1T25) [PR]\n\n**Operações de Refino**\n- Utilização de capacidade: 95%, ante 99% no 4T2025 [PR]\n- Margem de refino realizada: US$ 10,11/barril, ante US$ 12,48/barril no 4T2025 [PR]\n\n**Fluxo de Caixa e Capex**\n- Caixa consumido pelas operações: -US$ 2.264 milhões, por aumento de estoques [PR/10-Q]\n- Capex total: US$ 582 milhões, ante US$ 423 milhões no 1T2025 [PR/10-Q]\n- Aquisição da Lindsey Oil Refinery (Reino Unido) concluída em abril/2026 [PR]\n\n**Dívida e Retorno de Capital**\n- Dívida total: US$ 27.124 milhões, ante US$ 19.716 milhões no fim de 2025 — Term Loan de US$ her quarter of strong financial and operational performance.\"\n^Tradução livre: \"Nossos pensamentos estão com nossa equipe, parceiros e todos os afetados pelo conflito em curso no Oriente Médio. Em meio à volatilidade macroeconômica contínua, a ConocoPhillips entregou mais um trimestre de forte desempenho financeiro e operacional.\"", "commodity_commentary": "A Reuters noticiou, em fevereiro de 2026, que a ConocoPhillips havia estabelecido meta de corte de custos de US$ 1 bilhão para 2026, após o lucro do quarto trimestre de 2025 ter ficado abaixo das expectativas dos analistas em meio à fraqueza dos preços do petróleo — o lucro ajustado por ação de US$ 1,02 ficou aquém da média de US$ 1,11 esperada pelo mercado, segundo dados compilados pela agência [Reuters].\n\nJá no primeiro trimestre de 2026, divulgado no fim de abril, a companhia reportou lucro ajustado por ação de US$ 1,89, acima do consenso de analistas — uma reviravolta frente ao trimestre anterior —, com receita de US$ 15,76 bilhões. Ainda assim, o lucro líquido total de US$ 2,2 bilhões (US$ 1,78 por ação) representou queda de 21% frente a igual período de 2025, refletindo produção 80 mil barris de óleo equivalente por dia menor na comparação anual e preços realizados 6% inferiores [Reuters]. A empresa gerou US$ 5,4 bilhões em caixa das operações e devolveu US$ 2,0 bilhões a acionistas entre recompras e dividendos.\n\nApesar da superação do consenso, a companhia revisou a projeção de produção para 2026 para uma faixa entre 2,295 e 2,325 milhões de barris de óleo equivalente por dia, abaixo da estimativa anterior, o que a cobertura associou a certa cautela do mercado nas semanas seguintes, em meio a preocupações com o aumento do capex e riscos geopolíticos ligados a operações no Catar [Reuters]. Por honestidade, buscas específicas não localizaram uma reportagem de Bloomberg, Reuters, FT ou WSJ detalhando o movimento intradiário exato das ações no dia da divulgação do primeiro trimestre de 2026, de modo qu o de Capital**\n- Distribuições totais: US$ 9,2 bilhões (US$ 4,3 bi dividendos + US$ 4,9 bi recompras) [PR]\n- Dívida total: US$ 47,7 bilhões, ante US$ 43,5 bilhões no fim de 2025 [PR/10-Q]\n\n**Guidance**\n- Capex 2026: US$ 27-29 bilhões (mantido) [PR/10-Q]\n- Recompra 2026: ~US$ 20 bilhões [10-Q]", "conference_call_summary": "Transcrição obtida via site de RI (fonte secundária, não arquivada na SEC). Citação do CEO Darren Woods: \"This quarter demonstrated that ExxonMobil is a fundamentally stronger company than it was a few years ago, built to perform through disruptions and across market cycles.\"\n^Tradução livre: \"Este trimestre demonstrou que a ExxonMobil é uma empresa fundamentalmente mais forte do que era há poucos anos, construída para performar através de disrupções e ao longo de ciclos de mercado.\" Sobre o Estreito de Ormuz: \"Uma vez que o Estreito reabra, levará algum tempo para retomar um fluxo estável — estimamos uma defasagem de um a dois meses.\"", "commodity_commentary": "A Bloomberg noticiou que a Exxon Mobil superou as previsões dos analistas no primeiro trimestre de 2026, divulgado em 1º de maio, mesmo em meio à turbulência causada pela guerra entre EUA/Israel e o Irã [Bloomberg]. O lucro ajustado por ação foi de US$ 1,16, 20 centavos acima da média das estimativas [Bloomberg]. Ainda assim, o lucro líquido reportado caiu para US$ 4,2 bilhões (US$ 4,9 bilhões em base ajustada), o menor patamar em cinco anos, pressionado por uma perda de US$ 706 milhões em hedges financeiros e US$ 3,9 bilhões em efeitos de tempo desfavoráveis de derivativos [Bloomberg].\n\nSegundo a Bloomberg, os preços mais altos de energia adicionaram US$ 1,7 bilhão ao resultado, mais do que compensando um impacto de US$ 400 milhões em interrupções de produção ligadas à guerra [Bloomberg]. A produção recorde na Guiana, acima de 900 mil barris brutos por dia, ajudou a suprir as perdas no Oriente Médio [Bloomberg]. A reportagem chama atenção para o risco de longo prazo: partici ões no 4T25 [PR]\n- Lucro líquido atribuível: US$ 425 milhões (US$ 1,60/ação diluída), ante US$ 213 milhões no 4T25 [PR]\n- EBITDA ajustado excluindo itens especiais: US$ 595 milhões, alta sequencial de US$ 68 milhões [PR]\n- Caixa ao final do trimestre: US$ 1,4 bilhão [PR]. Fluxo de caixa livre: -US$ 298 milhões (ante +US$ 294 milhões no 4T25) [PR]\n- Dívida líquida: US$ 1.198 milhões (ante US$ 851 milhões no 4T25) [PR]\n\n**Segmento Alumina:**\n- Produção de alumina: 2.355 mil toneladas, queda de 5% sequencial [PR]\n- Preço médio realizado de alumina: US$ 324/t (ante US$ 575/t no 1T25) — forte queda a/a [PR]\n- EBITDA ajustado do segmento: -US$ 40 milhões (negativo), ante +US$ 664 milhões no 1T25 [PR]\n\n**Segmento Aluminum:**\n- Produção de alumínio: 607 mil toneladas, estável sequencialmente [PR]\n- Preço médio realizado de alumínio: US$ 4.209/t (ante US$ 3.213/t no 1T25) — forte alta [PR]\n- EBITDA ajustado do segmento: US$ 694 milhões, ante US$ 134 milhões no 1T25 [PR]\n\n**Guidance 2026 (mantido)**\n- Alumina: produção 9,7–9,9 Mt; embarques 11,8–12,0 Mt [PR]\n- Aluminum: produção 2,4–2,6 Mt; embarques 2,6–2,8 Mt [PR]\n- Tarifas Section 232 sobre alumínio do Canadá devem custar ~US$ 35 milhões a mais sequencialmente no 2T26 [PR]", "conference_call_summary": "Não foi acessada transcrição completa da teleconferência do 1T26. Citação do CEO William F. Oplinger, no release: \"Our experienced team performed very well managing the impacts from the Middle East conflict and Cyclone Narelle.\"\n^Tradução livre: \"Nossa equipe experiente atuou muito bem ao gerenciar os impactos do conflito no Oriente Médio e do Ciclone Narelle.\"", "commodity_commentary": "As buscas não localizaram reportagem dedicada da Bloomberg, Reuters, FT ou WSJ analisando especificamente a reação de mercado ao resultado do 1T26 da Alcoa, divulgado em 16 de abril — os dados disponíveis vieram majoritariamente de agregadores financeiros, e não de cobertura própria dessas publicações; registro essa l gs", "document_type_label": "Earnings Completo", "sources": [{"filename": "a20260331q1ex991earningsre.htm", "label": "Press release da empresa — título original: \"Century Aluminum Company Reports First Quarter 2026 Results\" (Anexo 99.1 ao Formulário 8-K, arquivado em 07/05/2026)", "source_url": "https://www.sec.gov/Archives/edgar/data/949157/000162828026032082/a20260331q1ex991earningsre.htm", "captured_at": "2026-07-07T18:00:00Z"}], "tabs": {"earnings_summary": "**Resultados do 1T26 (trimestre encerrado em 31/03/2026), divulgados em 07/05/2026** — dado oficial mais recente; o 2T26 ainda não foi divulgado (previsto 06/08/2026) [PR].\n\n**Resultado consolidado:**\n- Vendas líquidas: US$ 649,2 milhões, alta de US$ 15,5 milhões sequencial [PR]\n- Embarques de alumínio primário: 122.865 toneladas (ante 168.672 t no 1T25) — queda por parada da Linha 2 em Grundartangi, Islândia [PR]\n- Lucro líquido atribuível: US$ 337,5 milhões (US$ 3,23/ação), impulsionado por ganho não recorrente de US$ 287,9 milhões na venda da planta de Hawesville e US$ 33,0 milhões de recebimento de seguro [PR]\n- Lucro líquido ajustado: US$ 170,7 milhões (US$ 1,63/ação) [PR]\n- EBITDA ajustado: US$ 231,4 milhões, alta de US$ 60,8 milhões sequencial [PR]\n- Liquidez em 31/03/2026: US$ 611,0 milhões [PR]\n\n**Destaques operacionais**\n- Início em abril/2026 da expansão dos últimos 90 potes em Mt. Holly e do restart da Linha 2 em Grundartangi [PR]\n\n**Guidance 2T26**\n- EBITDA ajustado esperado entre US$ 315–335 milhões, por prêmios/LME mais altos e expansão de Mt. Holly [PR]", "conference_call_summary": "Nenhuma citação verbatim de executivo (CEO Jesse Gary ou CFO) foi encontrada neste press release específico — verificado e reportado honestamente, diferente de outros trimestres da empresa que costumam trazer citação [PR].", "commodity_commentary": "Não foi possível localizar reportagens dedicadas da Bloomberg, Reuters, FT ou WSJ analisando especificamente a reação do mercado ao resultado do 1T26 d
