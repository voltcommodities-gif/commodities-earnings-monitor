<title>Commodity Earnings Monitor</title>
<style>
  :root {
    --bg: #15130f;
    --bg-elevated: #1b1815;
    --bg-inset: #0f0d0a;
    --border: #2b2620;
    --text: #e9e3d7;
    --text-muted: #948c7d;
    --text-faint: #635d51;
    --text-ghost: #4a453b;
    --accent: #c97a44;
    --warn: #b8944a;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f2ec; --bg-elevated: #fbfaf6; --bg-inset: #ece9e0;
      --border: #ddd8ca; --text: #24211b; --text-muted: #6d6759; --text-faint: #9a927f; --text-ghost: #bab294;
      --accent: #a9602f; --warn: #8a6a2a;
    }
  }
  :root[data-theme="dark"] {
    --bg: #15130f; --bg-elevated: #1b1815; --bg-inset: #0f0d0a;
    --border: #2b2620; --text: #e9e3d7; --text-muted: #948c7d; --text-faint: #635d51; --text-ghost: #4a453b;
    --accent: #c97a44; --warn: #b8944a;
  }
  :root[data-theme="light"] {
    --bg: #f4f2ec; --bg-elevated: #fbfaf6; --bg-inset: #ece9e0;
    --border: #ddd8ca; --text: #24211b; --text-muted: #6d6759; --text-faint: #9a927f; --text-ghost: #bab294;
    --accent: #a9602f; --warn: #8a6a2a;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: 15px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent); color: var(--bg); }

  .shell { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;
    padding: 16px 28px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .topbar .brand { font-family: var(--mono); font-size: 13.5px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar .meta { font-family: var(--mono); font-size: 12px; color: var(--text-faint); display: flex; gap: 18px; flex-wrap: wrap; }
  .topbar .meta strong { color: var(--text-muted); font-weight: 500; font-variant-numeric: tabular-nums; }
  .topbar .spacer { flex: 1; }
  .topbar .schedule { font-family: var(--mono); font-size: 12px; color: var(--text-faint); }

  .layout { display: flex; flex: 1; min-height: 0; }

  .rail { width: 296px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .rail-search { padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .rail-search input {
    width: 100%; background: var(--bg-inset); border: 1px solid var(--border); color: var(--text);
    font-family: var(--sans); font-size: 13px; padding: 7px 10px; border-radius: 5px; outline: none;
  }
  .rail-search input:focus { border-color: var(--accent); }
  .rail-search input::placeholder { color: var(--text-faint); }
  .rail-legend { display: flex; gap: 12px; padding: 8px 16px; font-family: var(--mono); font-size: 10px; color: var(--text-faint); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .rail-legend span { display: inline-flex; align-items: center; gap: 4px; }
  .rail-legend .dot { width: 5px; height: 5px; border-radius: 50%; }

  .rail-scroll { flex: 1; overflow-y: auto; padding: 8px 0 24px; }
  .rail-group h3 {
    font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-faint); margin: 16px 16px 6px; display: flex; justify-content: space-between;
  }
  .rail-group h3 .count { color: var(--text-ghost); }
  .rail-group:first-child h3 { margin-top: 8px; }
  .company-row {
    display: flex; align-items: baseline; gap: 8px; padding: 5px 24px; cursor: pointer;
  }
  .company-row:hover .name { color: var(--text); }
  .company-row.active .name { color: var(--text); }
  .company-row.active .ticker { color: var(--accent); }
  .company-row .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  .company-row .dot.new { background: var(--accent); }
  .company-row .dot.gap { background: var(--warn); }
  .company-row .dot.needs_verification { background: none; border: 1px solid var(--text-faint); }
  .company-row .dot.clear { background: transparent; }
  .company-row .dot.not_traded { background: transparent; }
  .company-row .ticker { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); min-width: 40px; }
  .company-row .name { font-size: 12.5px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .company-row.not-traded { opacity: 0.55; }
  .company-row.not-traded .name { font-size: 12px; }
  .company-row.hidden { display: none; }
  .rail-group.hidden { display: none; }

  .main { flex: 1; min-width: 0; overflow-y: auto; }
  .main-inner { max-width: 720px; margin: 0 auto; padding: 32px 32px 80px; }

  .empty-state { max-width: 560px; margin: 90px auto 0; padding: 0 32px; }
  .empty-state h2 { font-size: 16px; font-weight: 600; margin: 0 0 8px; color: var(--text); }
  .empty-state p { font-size: 13.5px; color: var(--text-muted); margin: 0 0 6px; }
  .empty-state .meta-line { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); margin-top: 14px; }

  .filing-head { margin-bottom: 8px; }
  .filing-head .toprow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .filing-head .commodities {
    font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-faint);
  }
  .doc-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border); color: var(--text-muted);
  }
  .doc-badge.trading_update { color: var(--warn); border-color: var(--warn); }
  .doc-badge.earnings { color: var(--accent); border-color: var(--accent); }
  .filing-head h1 { font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; text-wrap: balance; }
  .filing-head .sub { font-family: var(--mono); font-size: 12px; color: var(--text-faint); }
  .filing-head .sub span + span::before { content: " · "; }

  .sources { margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); }
  .sources .label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 8px; }
  .source-item { display: flex; gap: 10px; align-items: baseline; font-size: 12.5px; padding: 3px 0; color: var(--text-muted); }
  .source-item .src-code { font-family: var(--mono); font-weight: 600; color: var(--text-faint); min-width: 16px; flex-shrink: 0; }
  .source-item a { color: var(--text-muted); text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 2px; }
  .source-item a:hover { color: var(--text); text-decoration-color: var(--text-faint); }
  .source-item .captured { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); margin-left: auto; flex-shrink: 0; font-variant-numeric: tabular-nums; }

  .tabs { display: flex; gap: 26px; margin: 30px 0 0; border-bottom: 1px solid var(--border); }
  .tab-btn {
    font-family: var(--sans); font-size: 13.5px; font-weight: 500; background: none; border: none; cursor: pointer;
    padding: 10px 0; color: var(--text-faint); border-bottom: 1px solid transparent; transform: translateY(1px);
  }
  .tab-btn:hover { color: var(--text-muted); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .tabpanel { display: none; padding-top: 26px; }
  .tabpanel.active { display: block; }
  .tabpanel p { margin: 0 0 15px; font-size: 14px; color: var(--text); }
  .tabpanel h4 { font-size: 12.5px; font-weight: 600; margin: 26px 0 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; }
  .tabpanel h4:first-child { margin-top: 0; }
  .tabpanel ul { margin: 0 0 15px; padding-left: 18px; }
  .tabpanel li { margin-bottom: 7px; font-size: 14px; }
  .tabpanel strong { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  .cite { font-family: var(--mono); font-size: 11.5px; color: var(--text-faint); }
  .quote-block { border-left: 2px solid var(--border); padding-left: 16px; margin: 18px 0; color: var(--text-muted); font-size: 13.5px; }
  .translation-note { font-size: 11.5px; color: var(--text-faint); font-style: italic; margin-top: -8px; }
  .warn-banner {
    font-size: 13px; color: var(--warn); border: 1px solid var(--warn); border-radius: 6px;
    padding: 10px 14px; margin-bottom: 20px; background: color-mix(in srgb, var(--warn) 10%, transparent);
  }

  .footer-note { margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 11px; color: var(--text-faint); }

  a { color: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>

  </div>
</div>

, "status": "new"}, {"id": "endeavour-mining", "ticker": "EDV", "name": "Endeavour Mining plc", "commodities": ["gold"], "status": "new"}, {"id": "navoi-mining-metallurgical-company", "ticker": null, "name": "Navoi Mining and Metallurgical Company (NMMC)", "commodities": ["gold"], "status": "not_traded"}, {"id": "almalyk-mmc", "ticker": null, "name": "Almalyk Mining and Metallurgical Combine JSC (AMMC)", "commodities": ["copper", "gold"], "status": "not_traded"}, {"id": "kyrgyzaltyn", "ticker": null, "name": "Kyrgyzaltyn OJSC", "commodities": ["gold"], "status": "not_traded"}], "filings": {"shell": {"company_id": "shell", "accession_number": "0001171843-26-004510", "company_name": "Shell plc", "commodities": ["oil"], "document_type": "trading_update", "document_type_label": "Atualização Pré-Resultados (Trading Update) — NÃO é o earnings completo", "sources": [{"filename": "f6k_070726.htm", "label": "Shell plc — \"Second Quarter 2026 Update Note\" (Form 6-K)", "source_url": "https://www.sec.gov/Archives/edgar/data/1306965/000117184326004510/f6k_070726.htm", "captured_at": "2026-07-07T17:30:00Z"}], "tabs": {"earnings_summary": "**AVISO IMPORTANTE:** este NÃO é o earnings completo do 2T26. O documento em si afirma: \"Outlooks presented may vary from the actual second quarter 2026 results and are subject to finalisation of those results, which are scheduled to be published on July 30, 2026.\" Os resultados financeiros completos (receita, lucro líquido, EPS, fluxo de caixa consolidado) ainda não existem — isto é apenas um guidance de faixas por segmento, divulgado ~3 semanas antes do earnings real. Nenhuma cifra de earnings (receita/EPS/EBITDA) está disponível ainda.\n\n**Guidance por segmento (1T26 real vs. faixa esperada para o 2T26)** [fonte: 6-K \"Q2 2026 update note\"]\n\n*Integrated Gas*\n- Produção: 909 kboe/d (1T26) → faixa esperada 610-650 kboe/d no 2T26. A própria empresa atribui a queda explicitamente: \"Reflects the impact of the Middle East conflict on Qatari volumes.\"\n- Volumes de liquefação de GNL: 7,9 Mt (1T26) → 7,4-7,8 Mt esperado\n- Trading & Optimisation esperado \"significantly higher than Q1'26\"\n\n*Upstream*\n- Produção: 1.843 kboe/d (1T26) → faixa esperada 1.750-1.850 kboe/d\n\n*Marketing*\n- Volumes de vendas: 2.627 kb/d (1T26) → faixa esperada 2.550-2.650 kb/d\n- Lucro ajustado esperado \"in line with Q1'26\"\n\n*Chemicals and Products*\n- Margem indicativa de refino: US$ 17/bbl (1T26) → **~US$ 20/bbl** esperado no 2T26\n- Margem indicativa de química: US$ 139/tonelada (1T26) → **~US$ 240/tonelada** esperado no 2T26\n- Nota da empresa sobre essas duas margens: \"Given market dislocations, realised refining and chemicals margins are lower than the calculated IRM / ICM and have been adjusted accordingly.\"\n- Utilização de refino: 99% (1T26) → ~100% esperado\n- Trading & Optimisation esperado \"in line with Q1'26\"\n\n*Renewables and Energy Solutions*\n- Lucro ajustado: US$ 0,3 bi (1T26) → faixa esperada US$ (0,3) a US$ 0,3 bi\n\n*Corporate*\n- Lucro ajustado: US$ (0,9) bi (1T26) → faixa esperada US$ (0,7) a US$ (0,5) bi\n\n*Shell Group — itens de fluxo de caixa operacional (CFFO)*\n- Capital de giro: US$ (11,2) bi (1T26) → faixa esperada US$ 1 a 6 bi. A empresa atribui isso explicitamente: \"Reflects impact of unprecedented volatility in commodity prices.\"\n- Imposto pago: US$ 2,3 bi (1T26) → faixa esperada US$ 2,6-3,4 bi\n\n**Consenso e próximos eventos**\n- Consenso de analistas (compilado pela Vara Research, gerenciado pela empresa): esperado ser publicado em 22 de julho de 2026.\n- Resultados completos do 2T26: agendados para **30 de julho de 2026**.", "conference_call_summary": "Não há conference call associada a esta atualização — atualizações de guidance pré-resultados ('quarterly update notes') da Shell normalmente não vêm acompanhadas de teleconferência; a Shell historicamente realiza a call de resultados apenas junto com a divulgação completa dos resultados trimestrais. A call referente ao 2T26 deverá ocorrer em torno de 30 de julho de 2026, quando os resultados completos forem publicados — este processamento deverá ser refeito naquela data para capturar a call real.", "commodity_commentary": "Embora este não seja o earnings completo, o próprio documento de guidance contém comentários diretos e citáveis sobre dinâmica de commodity:\n\n**Sobre gás natural/GNL e geopolítica** — a empresa atribui a queda na faixa de produção esperada de Integrated Gas (de 909 kboe/d no 1T26 para 610-650 kboe/d no guidance do 2T26) explicitamente a fatores geopolíticos: \"Reflects the impact of the Middle East conflict on Qatari volumes.\" Isso é uma citação direta e específica sobre como o conflito no Oriente Médio está afetando volumes de produção de gás no Catar.\n\n**Sobre margens de refino e petroquímica** — a empresa elevou significativamente sua margem indicativa de refino esperada (de US$ 17/bbl no 1T26 para ~US$ 20/bbl no guidance do 2T26) e a margem indicativa de química (de US$ 139/tonelada para ~US$ 240/tonelada), mas com a ressalva explícita: \"Given market dislocations, realised refining and chemicals margins are lower than the calculated IRM / ICM and have been adjusted accordingly.\" Isso indica que a empresa está vendo distorções relevantes ('market dislocations') entre a margem de mercado teórica (IRM/ICM) e a margem que de fato consegue realizar — um sinal direcional importante sobre volatilidade no mercado de refino/petroquímica no trimestre.\n\n**Sobre volatilidade de preços de commodities (capital de giro)** — a empresa atribui a grande variação esperada em capital de giro (de US$ -11,2 bi no 1T26 para US$ +1 a +6 bi de guidance no 2T26) a: \"Reflects impact of unprecedented volatility in commodity prices.\" A palavra \"unprecedented\" (sem precedentes) é uma escolha de linguagem forte da própria empresa sobre o nível de volatilidade nos preços de commodities observado.\n\n**Sobre sensibilidade de preço/margem full-year** — a empresa nota que, dado o co 31259/000083125926000021/fcx1q26cc_final.htm", "captured_at": "2026-07-06T21:47:27.101464+00:00"}], "tabs": {"earnings_summary": "**Receita e lucratividade (1T26 vs 1T25)**\n- Receita: **US$ 6.234 milhões** vs US$ 5.728 milhões — +8,8% a/a (calculado a partir desses dois valores informados) [PR]\n- Lucro operacional: **US$ 2.137 milhões** vs US$ 1.303 milhões — +64,0% a/a [PR]\n- Lucro líquido atribuível às ações ordinárias: **US$ 881 milhões**, US$ 0,61/ação diluída, vs US$ 352 milhões, US$ 0,24/ação no 1T25 — +150% a/a [PR]\n- Lucro líquido ajustado (medida não-GAAP da própria empresa): **US$ 830 milhões**, US$ 0,57/ação diluída [PR] (a empresa não divulgou o valor ajustado do 1T25 neste release)\n- Média ponderada de ações diluídas em circulação: 1.444 milhões, estável em relação ao 1T25 [PR]\n\n**EBITDA / alavancagem**\n- EBITDA ajustado: **US$ 2.473 milhões** no 1T26 vs US$ 1.888 milhões no 1T25 (+31,0% a/a); últimos 12 meses: US$ 10.527 milhões [IP, slide 32]\n- Dívida líquida / EBITDA ajustado: **0,5x** em 31/03/2026 [IP, slide 22]\n- Dívida líquida: **US$ 2,4 bilhões** em 31 de março de 2026, excluindo explicitamente US$ 3,2 bilhões de dívida ligada às instalações de fundição/refino (PMR) da PTFI [PR]\n- Dívida total consolidada: US$ 9.414 milhões vs US$ 9.404 milhões (coluna do período anterior); caixa e equivalentes: US$ 3.737 milhões vs US$ 4.385 milhões [PR]\n\n**Fluxo de caixa livre / capex**\n- Fluxo de caixa operacional: **US$ 1.495 milhões** no 1T26, incluindo US$ 0,1 bi de capital de giro/outras fontes, vs US$ 1.058 milhões no 1T25 [PR]\n- Capex: **US$ 973 milhões**, incluindo US$ 0,6 bi para grandes projetos de mineração, vs US$ 1.172 milhões no 1T25 [PR]\n- Guidance de capex para 2026: aproximadamente **US$ 4,3 bilhões**, incluindo US$ 3,0 bilhões para grandes projetos [PR] — guidance declarado pela empresa; o release não repete o valor do guidance anterior (janeiro de 2026) para comparação direta\n\n**Detalhamento por segmento / custo unitário (cobre)**\n- Preço médio realizado do cobre: **US$ 5,78/lb** vs US$ 4,44/lb no 1T25 [IP, slide 21]\n- Custo de produção e entrega (site): **US$ 3,29/lb** vs US$ 2,59/lb no 1T25 [IP, slide 21]\n- Custo de caixa unitário consolidado: **US$ 1,91/lb** vs US$ 2,07/lb no 1T25, descrito pela empresa como \"queda de 6% vs. 1T25\" [PR, IP slide 6]\n- Custo de caixa unitário esperado para 2026 por região: Estados Unidos US$ 3,02/lb, América do Sul US$ 2,60/lb, Indonésia US$ (1,30)/lb (crédito líquido, por conta dos subprodutos ouro/prata), Consolidado US$ 1,95/lb [IP, slide 25]\n- Ouro: preço realizado US$ 4.889/oz vs US$ 3.072/oz no 1T25 [IP, slide 21]; vendas consolidadas de 121 mil onças [PR]\n- Molibdênio: preço realizado US$ 25,21/lb vs US$ 21,67/lb; vendas consolidadas de 24 milhões de libras [PR, IP slide 21]\n\n**Volumes de produção e vendas / revisão de guidance para 2026**\n- Produção consolidada 1T26: 662 milhões lb de cobre, 97 mil oz de ouro, 22 milhões lb de molibdênio [PR]\n- Vendas consolidadas 1T26: 657 milhões lb de cobre, 121 mil oz de ouro, 24 milhões lb de molibdênio [PR]\n- Guidance de vendas para 2026 (revisado): ~3,1 bilhões lb de cobre, 650 mil oz de ouro, 90 milhões lb de molibdênio, incluindo 690 milhões lb de cobre / 140 mil oz de ouro / 22 milhões lb de molibdênio no 2T26 [PR]\n- A empresa afirma explicitamente: \"as estimativas de vendas revisadas para o ano de 2026 refletem principalmente ajustes de cronograma na retomada do Grasberg Block Cave\" [PR] — uma mudança de guidance em relação ao guidance anterior (janeiro de 2026) da própria empresa, atribuída ao cronograma de retomada do Grasberg Block Cave, não a fraqueza de demanda\n- Os volumes de vendas de cobre/ouro e os custos de caixa unitários do 1T26 vieram favoráveis às próprias estimativas de janeiro de 2026 da empresa [PR] — o número-base de janeiro não é repetido neste documento, então essa comparação é apenas qualitativa aqui\n\n**Retorno de capital**\n- Dividendos: **US$ 0,15/ação** declarados em 25 de março de 2026 (US$ 0,075 base + US$ 0,075 variável, ligado a performance), pagos em 1º de maio de 2026 [PR]\n- Política: até 50% do fluxo de caixa disponível após capex planejado e distribuições a participações não controladoras vai para retorno aos acionistas, segundo a estrutura de pagamento baseada em performance [PR]\n- Recompra de ações: 1,7 milhão de ações por US$ 93 milhões (média de US$ 54,25/ação) no 1T26; total acumulado no programa: 53,7 milhões de ações por US$ 2,1 bilhões (média de US$ 39,01/ação) contra uma autorização de US$ 5,0 bilhões; US$ 2,9 bilhões ainda disponíveis em 22 de abril de 2026 [PR]", "conference_call_summary": "Nenhuma transcrição oficial da conference call está disponível na fonte primária para este filing. A FCX disponibilizou uma apresentação usada durante a call de resultados (Anexo 99.2, datada de 23 de abril de 2026) como anexo na SEC, mas é um material de slides, não uma transcrição das falas preparadas nem da sessão de perguntas e respostas — nenhum comentário verbatim da call foi encontrado publicado no site de RI da FCX nem neste filing da SEC.\n\nA única citação verbatim de um executivo disponível vem do próprio press release (Anexo 99.1), não da call em si:\n\n>Kathleen Quirk, Presidente e CEO: \"Nossos resultados financeiros do primeiro trimestre refletem a força do nosso portfólio diversificado, com crescimento em receitas, fluxo de caixa e lucros na comparação com o primeiro trimestre do ano passado, apesar da capacidade reduzida em nossas operações na Indonésia. A equipe global da Freeport está focada em restaurar as operações em Grasberg de forma segura e sustentável, impulsionando novas tecnologias e programas de eficiência para aumentar a lucratividade das nossas operações nas Américas, e buscando nosso portfólio altamente atrativo de opções de crescimento orgânico para gerar valor aos acionistas. A Freeport está fortemente posicionada como 'a Campeã do Cobre dos EUA' e como líder global em cobre, com operações em grande escala e geograficamente diversificadas, e um pipeline de opções de crescimento de curto, médio e longo prazo para sustentar um mercado em expansão.\" [PR]\n\n^Tradução livre do texto original em inglês do press release.\n\nNenhum conteúdo de perguntas e respostas sobre capex, M&A, alocação de capital ou riscos operacionais pode ser reportado aqui porque nenhuma transcrição de Q&A estava disponível nas fontes primárias analisadas. Se um filing futuro ou o site de RI da empresa publicar uma transcrição oficial desta call, esta aba deve ser reprocessada.", "commodity_commentary": "Este filing não contém uma seção dedicada de perspectiva de mercado de cobre; o comentário abaixo foi reunido a partir de declarações feitas no press release e na apresentação para investidores.\n\n**Sobre os motores de demanda por cobre**\nA apresentação para investidores traz um slide intitulado \"Cobre — o Metal da Eletrificação\", afirmando: \"espera-se que a demanda se beneficie dos avanços em IA, comunicações e conectividade em expansão\" (Tecnologia); o cobre é descrito como a \"espinha dorsal da construção, urbanização e infraestrutura de energia\", com \"condutividade elétrica e térmica superior à de qualquer metal industrial\" (Infraestrutura); e como \"componente material essencial de veículos elétricos/híbridos... usado em motores elétricos, baterias, inversores, fiação e estações de carregamento\" (Transporte). [IP, slide 5] (tradução livre)\n\n**Sobre o posicionamento de mercado da empresa**\nA citação da CEO Kathleen Quirk no press release (Aba 2) posiciona a FCX como \"fortemente posicionada como 'a Campeã do Cobre dos EUA' e como líder global em cobre... para sustentar um mercado em expansão.\" [PR] A apresentação afirma que as operações americanas da FCX \"respondem por ~70% da produção total de cobre refinado dos EUA\", descrevendo a FCX como a \"produtora dominante de cobre dos EUA\". [IP, slide 13]\n\n**Sobre pressões do lado da oferta / custos**\n\"O suprimento é suficiente para sustentar as operações atuais, mas as pressões inflacionárias estão aumentando, lideradas pela energia\"; \"as pressões de custo de energia na Indonésia estão subindo mais rápido, impulsionadas por interrupções regionais na cadeia de suprimentos\"; e \"os custos de diesel da FCX em março de 2026 aumentaram mais de 80% em comparação com a média de janeiro/fevereiro\", equivalente a aproximadamente US$ 0,5 bilhão em base anualizada, com energia representando ~15% dos custos diretos globais da empresa (~50% diesel) em 2025. [IP, slide 15] (tradução livre)\n\n**Sobre fatores regulatórios/geopolíticos**\nA FCX firmou um Memorando de Entendimento (MOU) com o governo da Indonésia em fevereiro de 2026 para uma extensão da vida útil dos direitos operacionais da PT Freeport Indonesia (PTFI) no distrito mineral de Grasberg; a licença de mineração da PTFI (IUPK) deve ser emendada, sujeita à emissão pelo governo indonésio, o que a empresa diz \"reforça a estabilidade de longo prazo e a continuidade das operações em grande escala.\" [IP, slide 34; PR] (tradução livre)\n\n**Sobre crescimento orgânico da oferta** (específico da empresa, não uma visão de mercado)\nA FCX tem como meta ~300 milhões lb de produção incremental de cobre em 2026 a partir de iniciativas de lixiviação (meta de longo prazo de ~800 milhões lb/ano até 2030), e avança estudos de expansão brownfield em El Abra (Chile), Bagdad e Safford/Lone Star (Arizona). [PR, IP slides 4/12/28/29]\n\n**Sobre tarifas / política comercial**\nA única menção relacionada a tarifas encontrada é linguagem-padrão de \"declaração prospectiva\" sobre fatores de risco: a empresa lista \"mudanças em tarifas de exportação e taxas alfandegárias\" e \"volatilidade de mercado em relação a políticas comerciais e incerteza tarifária\" entre os fatores de risco. [PR] Isso é uma divulgação legal padrão de risco, não uma visão direcional — nenhum impacto tarifário quantificado ou opinião da empresa sobre política tarifária é declarado neste filing."}, "generated_by": "claude-code-manual-demo", "generated_at": "2026-07-06T22:15:00Z", "status": "summarized", "note_for_reviewer": "Generated inline by Claude (not via scripts/generate_summary.py's Anthropic API call, and not via the scheduled routine) as a milestone-1 validation demo, reading the primary documents directly with the Read/Bash tools in this session. Every quote and figure above was located and verified against the extracted document text before being written here."}, "rio-tinto": {"company_id": "rio-tinto", "accession_number": "0000863064-26-000022", "company_name": "Rio Tinto Group", "commodities": ["copper", "iron ore", "aluminum"], "document_type": "production_report", "document_type_label": "Relatório de Produção Trimestral", "sources": [{"filename": "rio-tinto-releases-first-quarter-2026-production-results", "label": "Press release da empresa — título original: \"Rio Tinto releases first quarter 2026 production results\"", "source_url": "https://www.riotinto.com/en/news/releases/2026/rio-tinto-releases-first-quarter-2026-production-results", "captured_at": "2026-07-07T19:10:00Z"}, {"filename": "ex1d21rt1q26results.htm", "label": "Anexo 99.1/21 ao Formulário 6-K (SEC EDGAR) — \"Rio Tinto 2026 first quarter operations review\"", "source_url": "https://www.sec.gov/Archives/edgar/data/0000863064/000086306426000022/ex1d21rt1q26results.htm", "captured_at": "2026-07-07T19:10:00Z"}], "tabs": {"earnings_summary": "**Produção de Cobre**\n- Produção consolidada de cobre atingiu 229 mil toneladas no 1T26, alta de 9% em relação ao 1T25 [PR].\n- Crescimento puxado pela continuidade do ramp-up de Oyu Tolgoi (Mongólia), cuja produção de metal em concentrado saltou 56% na comparação anual [PR].\n- Em Kennecott (EUA), o metal refinado recuou 20% ano contra ano; em Escondida (Chile, participação minoritária da Rio Tinto), o metal em concentrado caiu 14% mas o metal refinado subiu 21% [PR].\n- Crescimento equivalente-cobre do port <script>
(function () {
  const data = JSON.parse(document.getElementById('data').textContent);
  const main = document.getElementById('main');
  const railNav = document.getElementById('rail');

  const commodityLabel = { oil: 'Petróleo', copper: 'Cobre', gold: 'Ouro', aluminum: 'Alumínio', platinum: 'Platina', palladium: 'Paládio' };
  const commodityOrder = ['oil', 'aluminum', 'copper', 'gold', 'platinum', 'palladium'];

  const activeCount = data.companies.filter(c => c.status !== 'not_traded').length;
  document.getElementById('stat-total').textContent = data.companies.length;
  document.getElementById('stat-active').textContent = activeCount;
  document.getElementById('stat-new').textContent = data.companies.filter(c => c.status === 'new').length;
  document.getElementById('stat-checked').textContent = new Date(data.checked_at).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

  const groups = {};
  data.companies.forEach(c => { const key = c.commodities[0]; (groups[key] = groups[key] || []).push(c); });

  function statusRank(c) {
    return { new: 0, gap: 1, needs_verification: 2, clear: 3, not_traded: 4 }[c.status] ?? 5;
  }

  let railHtml = '';
  const orderedKeys = commodityOrder.filter(k => groups[k]).concat(Object.keys(groups).filter(k => !commodityOrder.includes(k)));
  orderedKeys.forEach(key => {
    const list = groups[key].slice().sort((a, b) => statusRank(a) - statusRank(b) || a.name.localeCompare(b.name));
    railHtml += `<div class="rail-group" data-group="${key}"><h3><span>${commodityLabel[key] || key}</span><span class="count">${list.length}</span></h3>`;
    list.forEach(c => {
      const notTraded = c.status === 'not_traded' ? ' not-traded' : '';
      railHtml += `<div class="company-row${notTraded}" data-id="${c.id}" data-search="${(c.name + ' ' + (c.ticker||'')).toLowerCase()}">
        <span class="dot ${c.status}"></span>
        <span class="ticker">${c.ticker || ''}</span>
        <span class="name">${c.name}</span>
      </div>`;
    });
    railHtml += `</div>`;
  });
  railNav.innerHTML = railHtml;

  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll('.company-row').forEach(row => {
      row.classList.toggle('hidden', q.length > 0 && !row.dataset.search.includes(q));
    });
    document.querySelectorAll('.rail-group').forEach(g => {
      const anyVisible = Array.from(g.querySelectorAll('.company-row')).some(r => !r.classList.contains('hidden'));
      g.classList.toggle('hidden', q.length > 0 && !anyVisible);
    });
  });

  function renderMd(src) {
    const escapeHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const blocks = src.split(/\n\n+/);
    let html = '';
    blocks.forEach(block => {
      const lines = block.split('\n');
      if (lines.every(l => l.trim().startsWith('- '))) {
        html += '<ul>' + lines.map(l => `<li>${inline(l.trim().slice(2))}</li>`).join('') + '</ul>';
      } else if (block.trim().startsWith('>')) {
        html += `<div class="quote-block">${inline(block.replace(/^>\s?/, ''))}</div>`;
      } else if (block.trim().startsWith('^')) {
        html += `<div class="translation-note">${inline(block.replace(/^\^\s?/, ''))}</div>`;
      } else {
        html += `<p>${inline(block)}</p>`;
      }
    });
    return html;

    function inline(s) {
      s = escapeHtml(s);
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\[([A-Z0-9\-, ]+)\]/g, '<span class="cite">[$1]</span>');
      s = s.replace(/\n/g, '<br>');
      return s;
    }
  }

  function renderFiling(company, filing) {
    const sourcesHtml = filing.sources.map((s, i) => `
      <div class="source-item">
        <span class="src-code">${String.fromCharCode(65 + i)}</span>
        <a href="${s.source_url}" target="_blank" rel="noopener">${s.label}</a>
        <span class="captured">${new Date(s.captured_at).toISOString().replace('T',' ').slice(0,16)}Z</span>
      </div>`).join('');

    const tagLine = filing.commodities.map(c => commodityLabel[c] || c).join(' · ');
    const isTradingUpdate = filing.document_type === 'trading_update';
    const badgeLabel = isTradingUpdate ? 'Trading Update' : 'Earnings';
    const warnBanner = isTradingUpdate
      ? `<div class="warn-banner">Isto NÃO é o earnings completo — é uma atualização de guidance pré-resultados. ${filing.document_type_label ? filing.document_type_label.split('—')[1] || '' : ''} Veja a Aba 1 para os detalhes e a data do earnings real.</div>`
      : '';

    return `<div class="main-inner">
      <div class="filing-head">
        <div class="toprow">
          <div class="commodities">${tagLine}</div>
          <span class="doc-badge ${filing.document_type || 'earnings'}">${badgeLabel}</span>
        </div>
        <h1>${filing.company_name}</h1>
        <div class="sub"><span>Accession ${filing.accession_number}</span></div>
        <div class="sources">
          <div class="label">Fontes primárias usadas nesta análise</div>
          ${sourcesHtml}
        </div>
      </div>
      ${warnBanner}
      <div class="tabs">
        <button class="tab-btn active" data-tab="earnings_summary">Resumo do Earnings</button>
        <button class="tab-btn" data-tab="conference_call_summary">Conference Call</button>
        <button class="tab-btn" data-tab="commodity_commentary">Comentário sobre a Commodity</button>
      </div>
      <div class="tabpanel active" data-panel="earnings_summary">${renderMd(filing.tabs.earnings_summary)}</div>
      <div class="tabpanel" data-panel="conference_call_summary">${renderMd(filing.tabs.conference_call_summary)}</div>
      <div class="tabpanel" data-panel="commodity_commentary">${renderMd(filing.tabs.commodity_commentary)}</div>
      <div class="footer-note">Gerado a partir de documentos primários (SEC EDGAR) · nenhuma fonte secundária foi utilizada</div>
    </div>`;
  }

  function renderEmpty(company) {
    if (company.status === 'gap') {
      return `<div class="empty-state">
        <h2>Detecção automática pendente — ${company.name}</h2>
        <p>Emissor privado estrangeiro — reporta via Form 6-K, sem classificação Item 2.02 no EDGAR. A heurística de descoberta usada para emissores domésticos (8-K Item 2.02) não funciona para este caso. Ver notas da empresa em companies.yaml para o plano de correção.</p>
      </div>`;
    }
    if (company.status === 'needs_verification') {
      return `<div class="empty-state">
        <h2>Dados incompletos — ${company.name}</h2>
        <p>Esta empresa está na base, mas ao menos um campo (ticker, URL de IR ou CIK) ainda não foi verificado ao vivo nesta pesquisa — está marcado como <em>null</em> com uma nota "needs follow-up" em vez de ser inventado. Sem esse dado, o pipeline de descoberta automática não roda com confiança total para esta empresa ainda.</p>
      </div>`;
    }
    if (company.status === 'not_traded') {
      return `<div class="empty-state">
        <h2>${company.name}</h2>
        <p>Entidade privada, estatal ou joint venture sem obrigação de disclosure público — mantida na base apenas como referência. Não faz parte do pipeline de monitoramento ativo de earnings.</p>
      </div>`;
    }
    return `<div class="empty-state">
      <h2>Nenhum earnings novo — ${company.name}</h2>
      <p>Verificado nas últimas 36h via SEC EDGAR. Nada publicado no período — nenhum resumo é gerado até que um earnings real seja divulgado.</p>
    </div>`;
  }

  function selectCompany(id) {
    document.querySelectorAll('.company-row').forEach(r => r.classList.toggle('active', r.dataset.id === id));
    const company = data.companies.find(c => c.id === id);
    const filing = data.filings[id];
    if (filing) {
      main.innerHTML = renderFiling(company, filing);
      wireTabs();
    } else {
      main.innerHTML = renderEmpty(company);
    }
  }

  function wireTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tabpanel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.querySelector(`.tabpanel[data-panel="${btn.dataset.tab}"]`).classList.add('active');
      });
    });
  }

  railNav.addEventListener('click', e => {
    const row = e.target.closest('.company-row');
    if (row) selectCompany(row.dataset.id);
  });

  // land on Freeport-McMoRan by default (has a real earnings summary)
  selectCompany('freeport-mcmoran');
})();
</script>
