rodução e trading do primeiro trimestre de 2026 da Glencore, divulgado em 30 de abril de 2026, foi destaque em reportagem da Bloomberg intitulada 'Glencore's Traders Score Big Profits as War Rattles Energy Markets' [Bloomberg]. Segundo a Bloomberg, a mesa de trading da companhia registrou lucros excepcionais à medida que o conflito envolvendo o Irã provocou fortes distorções nos mercados globais de energia, com cargas físicas de petróleo e derivados sendo negociadas com grandes prêmios após o quase fechamento do Estreito de Ormuz [Bloomberg]. A agência informou que o lucro core anual da unidade de marketing deve superar 'confortavelmente' o topo da meta de longo prazo de US$ 3,5 bilhões [Bloomberg]. Quanto à reação do mercado, a Bloomberg registrou que as ações da Glencore subiam 0,8% por volta das 8h30 (horário de Londres) no dia da notícia, mesmo com os mercados acionários globais em geral em queda devido ao risco de escalada do conflito no Irã [Bloomberg]. Esse resultado veio poucos meses depois de a Bloomberg noticiar, em fevereiro de 2026, que o lucro anual consolidado de 2025 havia caído cerca de 6%, para US$ 13,5 bilhões, com o rali recorde do cobre insuficiente para compensar a fraqueza da divisão de carvão [Bloomberg]."},"generated_by":"claude-research","generated_at":"2026-07-07T20:50:00Z","status":"summarized","note_for_reviewer":"Relatório de produção apenas — sem demonstrativo financeiro. Glencore não é registrante SEC. Resultados financeiros do 1S26 ainda não publicados na data da pesquisa. Platina/paládio são subprodutos não detalhados individualmente neste relatório.","commentary_sources":[{"outlet":"Bloomberg","title":"Glencore's Traders Score Big Profits as War Rattles Energy Markets","url":"https://www.bloomberg.com/news/articles/2026-04-30/glencore-s-traders-score-big-profits-as-war-roils-energy-markets","captured_at":"2026-07-07T00:00:00Z"},{"outlet":"Bloomberg","title":"Glencore Profit Falls as Coal Earnings Drop Outweighs Copper Price Surge","url":"https://www.bloomberg.com/news/articles/2026-02-18/glencore-profit-slides-as-copper-rally-offset-by-coal-slump","captured_at":"2026-07-07T00:00:00Z"}]},"agnico-eagle-mines":{"company_id":"agnico-eagle-mines","accession_number":"0001104659-26-080204","document_type":"operational_update","document_type_label":"Atualização Operacional e Revisão de Guidance — Movimento de Rocha no Barnat Pit (Canadian Malartic), NÃO é o earnings completo do 2º Trimestre 2026","sources":[{"filename":"tm2619674d1_ex99-1.htm","label":"Formulário 6-K (Anexo 99.1) — comunicado sobre movimento de rocha no Barnat Pit, Canadian Malartic","source_url":"https://www.sec.gov/Archives/edgar/data/0000002809/000110465926080204/tm2619674d1_ex99-1.htm","captured_at":"2026-07-08T01:40:00Z"}],"tabs":{"earnings_summary":"Em comunicado de 2 de julho de 2026 (6-K), a Agnico Eagle informou que, em 1º de julho, ocorreu movimento de massa rochosa na parede norte da cava Barnat, no complexo Canadian Malartic (Quebec) [PR]. Sem feridos, danos a equipamentos ou impacto ambiental. Mineração na cava suspensa temporariamente por precaução [PR].\n\n**Impacto**: redução esperada de 60.000-80.000 onças de ouro na produção do complexo no 2S26 [PR]. Produção anual consolidada de 2026 deve ficar próxima do piso do guidance de 3,3-3,5 milhões de onças [PR]. Possível redução adicional de até ~150.000 onças/ano em 2027 e 2028 [PR]. Empresa reafirmou que o evento não deve afetar o desenvolvimento da mina Odyssey [PR].\n\nAtualizações adicionais de guidance serão dadas com os resultados do 2T26, em 29/07/2026. Este é um comunicado operacional/de guidance — NÃO é o resultado financeiro do 2T26.","conference_call_summary":"Sem teleconferência dedicada a este comunicado específico — publicado fora do ciclo normal de resultados como fato relevante de segurança geotécnica. Detalhamento de custo/produção previsto para a call de resultados do 2T26, em 30/07/2026.","commodity_commentary":"Segundo a BNN Bloomberg (agência The Canadian Press, 02/07/2026), a Agnico Eagle suspendeu temporariamente a mineração na cava Barnat após o movimento de rocha [Bloomberg]. A reportagem confirma os números divulgados pela empresa — redução de 60.000-80.000 onças no 2S26 e produção anual tendendo ao piso da faixa — sem comentário independente de analistas [Bloomberg]. Um dia antes do evento, em 06/07, a Jefferies havia elevado a recomendação da Agnico Eagle para \"Buy\" (preço-alvo C$ 200, de C$ 187), citando volatilidade recente como ponto de entrada — upgrade anterior ao incidente, não incorpora seu impacto [Bloomberg]. O episódio ocorre em meio a preços do ouro em patamares recordes, o que tende a suavizar o impacto financeiro da perda de produção, mas reforça o risco geotécnico como tema recorrente no setor aurífero canadense."},"commentary_sources":[{"outlet":"BNN Bloomberg","title":"Agnico Eagle suspends mining operations at Barnat pit after rock movement","url":"https://www.bnnbloomberg.ca/business/company-news/2026/07/02/agnico-eagle-suspends-mining-operations-at-barnat-pit-after-rock-movement/","captured_at":"2026-07-08T01:50:00Z"}],"generated_by":"claude-research","generated_at":"2026-07-08T00:00:00Z","note_for_reviewer":"Complementa a entrada de earnings do 1T26 (segue válida). Evento de 1-2/07/2026 levou a revisão de guidance de produção para 2S26/2026/2027-28 — mais recente e relevante que o release de Q1. Fonte primária: 6-K SEC (accession 0001104659-26-080204). Revisar após resultados do 2T26 em 29/07/2026."},"anglogold-ashanti":{"company_id":"anglogold-ashanti","accession_number":"0001973832-26-000091","company_name":"AngloGold Ashanti plc","commodities":["gold"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"agaq1march2026operatingsta.htm","label":"Demonstrativo operacional e financeiro trimestral — \"AngloGold Ashanti Q1 31 March 2026 Earnings Release and Dividend Declaration\" (Anexo ao Formulário 6-K)","source_url":"https://www.sec.gov/Archives/edgar/data/1973832/000197383226000091/agaq1march2026operatingsta.htm","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 1T2026 — AngloGold Ashanti plc**\n\n**Produção**\n- Produção total de ouro: 724 mil oz (+1% a/a) [PR]\n\n**Resultado financeiro**\n- Receita de ouro: US$ 3.154 milhões (1T2025: US$ 1.927 milhões) [PR]\n- EBITDA: US$ 2.291 milhões (+130% a/a) [PR]\n- Lucro atribuível: US$ 1.281 milhões (1T2025: US$ 443 milhões) [PR]\n\n**Custos**\n- Preço médio de ouro realizado: US$ 4.863/oz (+69% a/a) [PR]\n- AISC (grupo): US$ 1.955/oz (+19% a/a) [PR]\n\n**Caixa e balanço**\n- Fluxo de caixa livre: US$ 1.169 milhões — recorde trimestral (+190% a/a) [PR]\n- Posição de caixa líquido de US$ 868 milhões, revertendo dívida líquida de US$ 755 milhões no 1T2025 [PR]\n\n**Dividendos**\n- Dividendo trimestral recorde de US$ 585 milhões (116 centavos/ação) [PR]\n- Programa de recompra proposto de até US$ 2,0 bilhões [PR]\n\n**Projeto Arthur (Nevada)**\n- Reserva provável de 4,9 Moz; VPL após impostos de US$ 3,41–3,46 bilhões a US$ 3.500/oz; TIR de 22–26% [PR]","conference_call_summary":"Não localizada transcrição primária. Citação do CEO Alberto Calderón: \"Our focus remains to control what we can control—managing underlying costs and ensuring safe, predictable operating results.\"\n^Tradução livre: \"Nosso foco continua sendo controlar o que está ao nosso alcance — administrar custos subjacentes e garantir resultados operacionais seguros e previsíveis.\"","commodity_commentary":"A cobertura mais robusta da imprensa financeira internacional sobre a AngloGold Ashanti no ciclo recente veio da Bloomberg, em reportagem de 20 de fevereiro de 2026 intitulada 'AngloGold Profit Jumps 160% as Gold Rally Drives Record Dividend', referente aos resultados do ano fiscal de 2025 [Bloomberg]. Segundo a Bloomberg, o lucro saltou 160% em 2025, com o rali recorde do ouro impulsionando a produção e levando a companhia a distribuir o maior pagamento de sua história, totalizando US$ 1,8 bilhão no ano [Bloomberg]. Para o primeiro trimestre de 2026 — divulgado em 8 de maio de 2026 —, a pesquisa não localizou reportagem dedicada de nenhuma das quatro fontes prioritárias. Segundo dados divulgados pela própria companhia, a AngloGold registrou fluxo de caixa livre recorde de cerca de US$ 1,2 bilhão no trimestre — quase o triplo do mesmo período de 2025 —, dividendo trimestral recorde de 116 centavos de dólar por ação e aprovação de um programa de recompra de até US$ 2 bilhões. Esses números coincidiram com valorização das ações a máximas históricas em Joanesburgo e Nova York, segundo dados de mercado — embora sem confirmação de imprensa de primeira linha para esse trimestre específico."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"Nova holding no Reino Unido (CIK SEC 0001973832).","commentary_sources":[{"outlet":"Bloomberg","title":"AngloGold Profit Jumps 160% as Gold Rally Drives Record Dividend","url":"https://www.bloomberg.com/news/articles/2026-02-20/anglogold-posts-profit-surge-and-record-dividend-on-price-rally","captured_at":"2026-07-07T00:00:00Z"}]},"kinross-gold":{"company_id":"kinross-gold","accession_number":"0001171843-26-002835","company_name":"Kinross Gold Corporation","commodities":["gold"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"exh_991.htm","label":"Press release da empresa — título original: \"Kinross reports strong 2026 first-quarter results\" (Anexo 99.1 ao Formulário 6-K)","source_url":"https://www.sec.gov/Archives/edgar/data/701818/000117184326002835/exh_991.htm","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 1T2026 — Kinross Gold Corporation**\n\n**Resultado financeiro**\n- Receita de vendas de metais: US$ 2.407,7 milhões (+61% a/a) [PR]\n- Lucro líquido: US$ 843,0 milhões (US$ 0,70/ação), ante US$ 368,0 milhões no 1T2025 [PR]\n\n**Fluxo de caixa**\n- Fluxo de caixa livre atribuível: US$ 837,5 milhões — recorde pelo 4º trimestre consecutivo [PR]\n- Caixa em 31/3/2026: US$ 2.185,0 milhões; liquidez total ~US$ 3,9 bilhões [PR]\n\n**Produção**\n- Total atribuível: 492.563 oz (1T2025: 512.088 oz; -4% planejado) [PR]\n- Principais ativos: Tasiast 130.014 oz; Paracatu 160.583 oz (recorde de recuperação); Fort Knox 93.994 oz [PR]\n\n**Custos**\n- Preço médio realizado: US$ 4.873/oz (1T2025: US$ 2.857/oz) [PR]\n- AISC atribuível: US$ 1.732/oz (1T2025: US$ 1.355/oz) [PR]\n- Margem por onça: US$ 3.476, alta de 92% a/a [PR]\n\n**Guidance 2026**\n- Produção: 2,0 Moz eq.-ouro (±5%) [PR]. AISC: US$ 1.730/oz (±5%) [PR]\n\n**Projetos**\n- Great Bear (Canadá): construção de superfície ~90% concluída [PR]. Lobo-Marte (Chile): EIA submetido em abril/2026 [PR]","conference_call_summary":"Não localizada transcrição verbatim primária. Citação do CEO J. Paul Rollinson: \"We generated record free cash flow of approximately $840 million, representing our fourth consecutive quarterly record.\"\n^Tradução livre: \"Geramos um fluxo de caixa livre recorde de aproximadamente US$ 840 milhões, nosso quarto recorde trimestral consecutivo.\"","commodity_commentary":"Apesar de pesquisa extensa em Bloomberg, Reuters, Financial Times e Wall Street Journal, não foi possível confirmar uma reportagem dedicada dessas fontes analisando especificamente a reação do mercado aos resultados do primeiro trimestre de 2026 da Kinross Gold, divulgados em 29-30 de abril de 2026. Segundo dados amplamente replicados por agregadores financeiros, a Kinross registrou fluxo de caixa livre atribuível recorde de aproximadamente US$ 838 milhões no trimestre — o quarto trimestre consecutivo de recorde —, com margens de US$ 3.476 por onça equivalente de ouro (+92% a/a). O lucro líquido ajustado somou US$ 854,1 milhões (US$ 0,71/ação), superando ligeiramente a expectativa média de US$ 0,68. Dados de negociação amplamente reportados indicam que as ações chegaram a subir entre 5% e 7% no pregão seguinte, refletindo otimismo com a geração de caixa recorde. Como essas informações não puderam ser confirmadas em reportagens específicas das quatro fontes prioritárias, esta nota as registra com a ressalva de que provêm de agregadores financeiros especializados."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"Dados extraídos via Anexo 99.1 do Formulário 6-K na SEC EDGAR.","commentary_sources":[]},"b2gold":{"company_id":"b2gold","accession_number":"0001171843-26-003084","company_name":"B2Gold Corp.","commodities":["gold"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"B2Gold-Reports-Q1-2026-Results","label":"Press release da empresa — título original: \"B2Gold Reports Q1 2026 Results\" (Anexo 99.1 ao Formulário 6-K)","source_url":"https://www.b2gold.com/news-media/news-releases/news-details/2026/B2Gold-Reports-Q1-2026-Results/default.aspx","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 1T2026 — B2Gold Corp.**\n\n**Resultado financeiro**\n- Receita de ouro: US$ 1.158,7 milhões (+118% a/a) [PR]\n- Lucro líquido: US$ 205,6 milhões (US$ 0,15/ação) [PR]\n- Preço médio realizado: US$ 4.193/oz (1T2025: US$ 2.892/oz) [PR]\n\n**Fluxo de caixa**\n- Fluxo de caixa livre: US$ 361,8 milhões, ante -US$ 6,9 milhões no 1T2025 [PR]\n\n**Produção**\n- Total consolidado: 237.763 oz [PR]. Fekola Complex 117.450 oz; Goose Mine (início de produção comercial no trimestre) 42.876 oz [PR]\n\n**Custos**\n- AISC consolidado: US$ 1.964/oz (guidance 2026: US$ 2.400–2.580/oz) [PR]\n\n**Retorno de capital**\n- Recompra de US$ 80 milhões no 1T; dividendo do 2T de US$ 0,02/ação [PR]\n\n**Transações**\n- Venda de 70% da Fingold Ventures para a Agnico Eagle por US$ 325 milhões, concluída em 23/4/2026 [PR]\n\n**Incidente pós-trimestre**\n- Incêndio em 16/4/2026 no circuito de britagem da Goose Mine; produção do 2T2026 revisada para baixo [PR]","conference_call_summary":"Não localizada transcrição verbatim primária. Release descreve \"very positive first quarter of 2026 operating and financial results.\"\n^Tradução livre: \"resultados operacionais e financeiros muito positivos no primeiro trimestre de 2026\"","commodity_commentary":"Apesar de pesquisa extensa em Bloomberg, Reuters, Financial Times e Wall Street Journal, não foi localizada uma reportagem dedicada dessas fontes analisando especificamente a reação do mercado aos resultados do primeiro trimestre de 2026 da B2Gold, divulgados em 6 de maio de 2026. Segundo dados amplamente replicados por agregadores financeiros, a B2Gold reportou receita de ouro de US$ 1,16 bilhão, mais que o dobro do mesmo período de 2025, e lucro líquido de US$ 199,9 milhões (US$ 0,19/ação ajustado) — resultado que superou a expectativa média dos analistas de US$ 0,11 por ação em cerca de 73%. A produção de ouro somou 237.763 onças, com todas as operações superando as metas orçadas. Dados de negociação amplamente reportados indicam que as ações subiram cerca de 11% no pregão de 7 de maio de 2026, com ganho adicional de cerca de 8,5% em meados de junho. Ainda assim, em 3 de junho, o analista Josh Wolfson, do RBC Capital, reiterou recomendação neutra ('hold'), com preço-alvo de US$ 5,75. Como essas informações não puderam ser confirmadas em reportagens específicas das quatro fontes prioritárias, esta nota as registra com a ressalva de que provêm de agregadores financeiros."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"Nenhuma.","commentary_sources":[]},"gold-fields":{"company_id":"gold-fields","accession_number":"0001628280-26-031621","company_name":"Gold Fields Limited","commodities":["gold"],"document_type":"production_report","document_type_label":"Relatório de Produção Trimestral","sources":[{"filename":"goldfields-q12026_operat.htm","label":"Atualização operacional trimestral (JSE SENS / Anexo ao Formulário 6-K) — Q1 2026 Operating Update","source_url":"https://www.sec.gov/Archives/edgar/data/1172724/000162828026031621/goldfields-q12026_operat.htm","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Atualização operacional do 1T2026 — Gold Fields Limited**\n\n**Produção**\n- Produção total atribuível: 633 mil oz, +15% a/a e -7% t/t [PR]\n- Destaques: Salares Norte 173 mil oz (+245% a/a); Granny Smith 78 mil oz (+25% a/a) [PR]\n\n**Custos**\n- AISC: US$ 1.829/oz (+13% a/a, +9% t/t) [PR]\n- CEO sinalizou pressão de custos (diesel +30–70%, frete +40%) [PR]\n\n**Balanço**\n- Dívida líquida: US$ 1.304 milhões, -34% a/a [PR]. Dívida líquida/EBITDA ajustado: 0,19x [PR]\n\n**Guidance 2026 (mantido)**\n- Produção: 2,40–2,60 Moz [PR]. AISC: US$ 1.800–2.000/oz [PR]\n\n**Projetos**\n- Windfall (Canadá): acordo preliminar com comunidades Cree [PR]. Damang devolvida ao governo de Gana em 18/4/2026 [PR]","conference_call_summary":"Nenhuma transcrição verbatim primária localizada. Citação do CEO: \"Gold Fields delivered a solid start to 2026, building on positive safety, operational and financial delivery of 2025.\"\n^Tradução livre: \"A Gold Fields teve um início sólido em 2026, consolidando os avanços positivos de segurança, operação e resultado financeiro obtidos em 2025.\"","commodity_commentary":"A Bloomberg noticiou que o lucro da Gold Fields referente ao exercício de 2025 (divulgado em fevereiro de 2026) praticamente triplicou, impulsionado pela alta recorde do ouro: a mineradora sul-africana projetou lucro por ação entre US$ 3,87 e US$ 4,11, alta de 178% a 196% ante o ano anterior, refletindo preços do metal significativamente mais altos e maiores volumes vendidos [Bloomberg]. A produção anual atingiu 2,4 milhões de onças, 18% acima de 2024, com destaque para a rampa de produção da mina Salares Norte, no Chile [Bloomberg]. O ouro subiu quase 65% ao longo de 2025, em meio à turbulência geopolítica que impulsionou a demanda por ativos de proteção, contexto citado pela Bloomberg como pano de fundo do resultado [Bloomberg].\n\nA Reuters noticiou que a Gold Fields elevou o dividendo e chegou a cogitar recompra de ações à medida que a alta dos preços do ouro impulsionou o lucro, destacando o apetite da administração por devolver caixa aos acionistas após o salto de rentabilidade [Reuters]. Segundo a Reuters, o lucro triplicou na comparação anual, reforçando a leitura do mercado de que 2025 foi um ano recorde para a mineradora [Reuters].\n\nJá a atualização operacional do primeiro trimestre de 2026, divulgada em abril, mostrou produção trimestral de 633 mil onças (alta de 15% na comparação anual, mas queda de 7% ante o trimestre anterior), com custo total (AISC) subindo para US$ 1.829/oz em meio a pressões inflacionárias e câmbio mais forte nos países produtores; a dívida líquida recuou 34% na base anual, para US$ 1.304 milhões [Bloomberg]. A cobertura da imprensa financeira internacional concentrou-se, no entanto, nos resultados anuais de fevereiro, que foram o evento de maior repercussão para investidores no período mais recente."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"Atualização operacional/de produção (padrão JSE), não demonstrativo financeiro completo com DRE.","commentary_sources":[{"outlet":"Bloomberg","title":"Gold Fields Says Profit Almost Tripled on Bullion Price Rally","url":"https://www.bloomberg.com/news/articles/2026-02-06/gold-fields-says-profit-almost-tripled-on-bullion-price-rally","captured_at":"2026-07-08T00:00:00Z"},{"outlet":"Reuters","title":"Gold Fields boosts shareholder returns after profit more than doubles","url":"https://www.cnbcafrica.com/2026/gold-fields-boosts-shareholder-returns-after-profit-more-than-doubles","captured_at":"2026-07-08T00:00:00Z"}]},"lundin-gold":{"company_id":"lundin-gold","accession_number":null,"company_name":"Lundin Gold Inc.","commodities":["gold"],"document_type":"production_report","document_type_label":"Relatório de Produção Trimestral (Q2 2026)","sources":[{"filename":"lundin-gold-q2-2026-production-release.html","label":"Press release da empresa — título original: \"Lundin Gold Reports Q2 2026 Production of 118,994 Ounces of Gold\"","source_url":"https://lundingold.com/news/lundin-gold-reports-q2-2026-production-of-118-994-122852/","captured_at":"2026-07-08T00:00:00Z"}],"tabs":{"earnings_summary":"**Produção** — A Fruta del Norte (sudeste do Equador) produziu 118.994 oz de ouro no Q2 2026, sendo 79.208 oz na forma de concentrado e 39.786 oz na forma de doré [PR]. Na comparação anual, o Q2 2025 havia registrado 139.433 oz — a empresa atribui a queda ao fato de o Q2 2026 ser, conforme planejado, o trimestre mais fraco do ano no cronograma de mina [PR].\n\n**Operacional** — O moinho processou 500.143 t de minério no trimestre, com throughput médio de 5.496 t/dia, teor médio de 8,3 g/t e recuperação de 89,1% [PR]. Vendas de ouro no período somaram 110.385 oz a preço médio realizado de US$ 4.359/oz [PR].\n\n**Guidance** — A companhia reafirmou o guidance de produção para 2026 em 475.000–525.000 oz [PR].\n\n**Importante**: este release cobre SOMENTE dados de produção — AISC (all-in sustaining cost) e posição de caixa não constam deste comunicado. Os resultados financeiros completos do Q2 2026 serão divulgados após o fechamento de mercado em 06/08/2026, com conference call em 07/08/2026 às 8h PT / 11h ET / 17h CET [PR].","conference_call_summary":"Não houve conference call vinculado a este release de produção. Citação do CEO Jamie Beck no comunicado: \"Second quarter production of 118,994 ounces of gold, in what was planned to be the weakest quarter of the year, emphasizes the strength of our operations.\" [PR] O call de resultados financeiros completos do Q2 2026 está agendado para 07/08/2026.","commodity_commentary":"Não foi localizada cobertura dedicada da Bloomberg, Reuters, FT ou WSJ especificamente sobre este production update (padrão comum para releases operacionais intermediários de mineradoras mid-cap fora de temporada de resultados). Como fallback, a **TipRanks** publicou a matéria \"Lundin Gold Q2 Output Holds Firm as Fruta del Norte Drives Guidance\", enquadrando a queda de produção anual como esperada (manutenção planejada) e destacando que o guidance reafirmado reforça a leitura de confiabilidade operacional da mina [TipRanks]. O **Simply Wall St** publicou análise com o título \"Does Lundin Gold's (TSX:LUG) Reaffirmed 2026 Output Target Reinforce Its Operational Reliability Story?\", no mesmo sentido — usando a manutenção do guidance apesar do trimestre mais fraco como evidência de execução consistente em Fruta del Norte [Simply Wall St]. Nenhuma das duas fontes reporta reação de preço de ação específica ao release; nenhuma cifra adicional além das já constantes no PR foi identificada nesses textos."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Release cobre apenas dados de produção; AISC e caixa NÃO estão disponíveis até a divulgação financeira completa de 06/08/2026 (call em 07/08) — recomenda-se nova atualização após essa data. Não encontrei cobertura da Bloomberg/Reuters/FT; usei TipRanks e Simply Wall St como fallback. Queda YoY de produção (139.433 oz → 118.994 oz) é real e vem do próprio PR — atribuída a sazonalidade planejada de mina, não a problema operacional. Fetch direto a lundingold.com retornou bloqueio de rede neste ambiente; dados cross-checados contra múltiplas réplicas do mesmo press release.","commentary_sources":[{"outlet":"TipRanks","title":"Lundin Gold Q2 Output Holds Firm as Fruta del Norte Drives Guidance","url":"https://www.tipranks.com/news/company-announcements/lundin-gold-q2-output-holds-firm-as-fruta-del-norte-drives-guidance","captured_at":"2026-07-20T00:00:00Z"},{"outlet":"Simply Wall St","title":"Does Lundin Gold's (TSX:LUG) Reaffirmed 2026 Output Target Reinforce Its Operational Reliability Story?","url":"https://simplywall.st/stocks/ca/materials/tsx-lug/lundin-gold-shares/news/does-lundin-golds-tsxlug-reaffirmed-2026-output-target-reinf","captured_at":"2026-07-20T00:00:00Z"}]},"harmony-gold-mining":{"company_id":"harmony-gold-mining","accession_number":"0001628280-26-046150","document_type":"trading_update","document_type_label":"Atualização Pré-Fechamento do Ano Fiscal (Pre-Close Update) — Ano Fiscal 2026 completo (encerrado em 30/06/2026), NÃO é o resultado financeiro auditado completo","sources":[{"filename":"sens-fy26ceoprexcloseupdat.htm","label":"Atualização pré-fechamento do CEO para o ano fiscal 2026 (encerrado em 30/06/2026) — JSE SENS / Anexo ao Formulário 6-K","source_url":"https://www.sec.gov/Archives/edgar/data/1023514/000162828026046150/sens-fy26ceoprexcloseupdat.htm","captured_at":"2026-07-08T00:00:00Z"}],"tabs":{"earnings_summary":"**Atualização pré-fechamento do ano fiscal 2026 — divulgada em 30/06/2026, referente ao ano fiscal encerrado em 30/06/2026 (FY26)**\n\n- Meta de produção de ouro atingida pelo 11º ano consecutivo, com produção esperada entre 1,4 milhão e 1,5 milhão de onças no FY26 [PR]\n- Teor médio recuperado em operações subterrâneas de ~5,80 g/t [PR]\n- AISC dentro do intervalo de guidance; capex ligeiramente abaixo do planejado [PR]\n- Mina de cobre CSA (Austrália): produção próxima ao limite superior do guidance, entre 17.500-18.500 toneladas, com custos abaixo do guidance [PR]\n- Projeto Eva Copper: desmatamento pausado temporariamente após identificação de espécie protegida na área [PR]\n- Retorno recorde de R$ 4,4 bilhões em dividendos aos acionistas nos últimos 12 meses [PR]\n- Classificação ESG da MSCI elevada para 'A' [PR]\n- Resultados financeiros completos (auditados) agendados para 27/08/2026 [PR]\n\nIMPORTANTE: números preliminares/não auditados — sem receita/lucro/EBITDA ainda.","conference_call_summary":"Atualização divulgada por escrito (SENS/6-K, assinado pelo CEO Beyers Nel), sem teleconferência associada. Apresentação de resultados do FY26 com call/webcast está agendada para 27/08/2026.","commodity_commentary":"Não foi localizada cobertura dedicada da Bloomberg, Reuters, FT ou WSJ sobre esta atualização de 30/06/2026 até o momento (08/07/2026). O Seeking Alpha noticiou que as ações da Harmony (NYSE: HMY) tiveram reação de \"pouca variação\" no pregão do anúncio, com rating de consenso em \"Hold\" [Seeking Alpha].\n\nO contexto do mercado de ouro ajuda a explicar a reação modesta: segundo a CNBC, o ouro fechou o 2º trimestre de 2026 em recuo — à vista caindo ~0,8% para perto de US$ 3.975/oz —, descrito como o pior trimestre para o metal desde o 2T13 [CNBC]. Uma atualização operacional sólida mas dentro do esperado, sem surpresas de volume ou custo, não gerou reação forte no papel.\n\nVale notar que a ação da Harmony já havia reagido negativamente em março/2026, quando o mercado reagiu mal a um guidance de cobre mais fraco divulgado junto aos resultados do 1S FY26 (queda de até 7% em um pregão) — episódio anterior e distinto desta atualização de 30/06."},"commentary_sources":[{"outlet":"Seeking Alpha","title":"Harmony Gold says production guidance met for 11th straight year","url":"https://seekingalpha.com/news/4608539-harmony-gold-says-production-guidance-met-for-11th-straight-year","captured_at":"2026-07-08T00:00:00Z"},{"outlet":"CNBC","title":"Stock market news for July 1, 2026","url":"https://www.cnbc.com/2026/06/30/stock-market-today-live-updates.html","captured_at":"2026-07-08T00:00:00Z"}],"generated_by":"claude-research","generated_at":"2026-07-08T00:00:00Z","note_for_reviewer":"Entrada anterior cobria só os 9 meses até 31/03/2026 (Q3 FY26). Novo 6-K primário (30/06/2026) traz atualização pré-fechamento do ANO FISCAL COMPLETO. Números preliminares/não auditados — DRE completa só em 27/08/2026, quando deve ser reprocessada de novo."},"greatland-resources":{"company_id":"greatland-resources","accession_number":null,"company_name":"Greatland Resources Limited","commodities":["gold","copper"],"document_type":"production_report","document_type_label":"Relatório de Produção Trimestral","sources":[{"filename":"june-2026-quarter-production-update","label":"RNS via Investegate — \"June 2026 Quarter Production Update\" (AIM/LSE: GGP, ASX: GGP)","source_url":"https://www.investegate.co.uk/announcement/rns/greatland-gold--ggp/june-2026-quarter-production-update-/9652942","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Atualização de produção — encerramento do ano fiscal FY26 (publicado em 06/07/2026) — Greatland Resources (Telfer/Havieron)**\n\n- Produção do trimestre (abr–jun/2026): 79.099 oz de ouro; 3.573 toneladas de cobre [PR]\n- Produção do ano fiscal FY26: 328.986 oz de ouro (6% acima do topo do guidance de 260.000–310.000 oz); 14.594 toneladas de cobre [PR]\n- Caixa em 30/6/2026: US$ 1.289 milhões, zero dívida [PR]\n- Empresa mantém plena exposição à alta do ouro, com proteção parcial via opções de venda [PR]\n- AISC ainda não divulgado — virá no relatório trimestral completo, esperado ainda em julho/2026 [PR]","conference_call_summary":"Não aplicável — comunicado de produção preliminar (RNS), sem teleconferência associada. Webcast previsto quando o relatório completo sair.","commodity_commentary":"A Reuters noticiou que as ações da Greatland Resources atingiram máxima histórica após a mineradora australiana divulgar produção trimestral robusta de ouro referente ao trimestre encerrado em março de 2026, evidenciando reação positiva do mercado ao desempenho operacional da empresa dona do complexo Telfer-Havieron, na Austrália Ocidental [Reuters]. A produção do trimestre somou 82.723 onças de ouro e 4.128 toneladas de cobre, com custo total de sustentação (AISC) de US$ 2.056/oz, e a empresa reportou geração recorde de caixa de A$ 260 milhões no período, elevando o caixa total, livre de dívidas, para cerca de A$ 1,2 bilhão [Reuters].\n\nAntes disso, em fevereiro de 2026, a Reuters já havia noticiado que a Greatland registrou lucro líquido semestral de A$ 342,9 milhões, o primeiro relatório financeiro completo da companhia após a aquisição dos ativos de Telfer e Havieron, consolidando sua entrada no radar dos investidores de ouro australianos [Reuters].\n\nA reação do mercado — com o papel batendo recorde — reforça a leitura de que o rali do ouro, combinado à expansão da base de reservas (aumento de 62% no minério recuperável em Telfer anunciado no mesmo período), tem sustentado o apetite de investidores pela ação [Reuters]. Cabe registrar que a reportagem da Reuters sobre esse episódio específico está atrás de paywall, de modo que detalhes mais granulares da magnitude da alta intradiária não puderam ser integralmente verificados nesta pesquisa, ainda que a manchete confirme o novo patamar recorde atingido pelo papel."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"IMPORTANTE: comunicado de produção PRELIMINAR — AISC e relatório trimestral completo ainda por vir em julho/2026. Reprocessar quando disponível. Antiga Greatland Gold, renomeada após aquisição de Telfer/Havieron da Newmont em 2025.","commentary_sources":[{"outlet":"Reuters","title":"Australia's Greatland Resources hits record high on strong quarterly gold output","url":"https://www.tradingview.com/news/reuters.com,2026:newsml_L4N3Y8011:0-australia-s-greatland-resources-hits-record-high-on-strong-quarterly-gold-output/","captured_at":"2026-07-08T00:00:00Z"}]},"endeavour-mining":{"company_id":"endeavour-mining","accession_number":null,"company_name":"Endeavour Mining plc","commodities":["gold"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"endeavour-reports-strong-q1-2026-results","label":"Press release da empresa — título original: \"Endeavour Reports Strong Q1-2026 Results\" (LSE: EDV / TSX: EDV)","source_url":"https://www.endeavourmining.com/news-and-media/news/endeavour-reports-strong-q1-2026-results/","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 1T2026 — Endeavour Mining plc**\n\n- Receita: US$ 1.349 milhões [PR]. Lucro líquido: US$ 354 milhões (+421% t/t) [PR]\n- EBITDA ajustado: US$ 880 milhões — recorde trimestral (+29% t/t) [PR]\n- Fluxo de caixa livre: US$ 613 milhões — recorde [PR]\n- Posição de caixa líquido: US$ 405 milhões (vs. dívida líquida de US$ 158 milhões no 4T2025) [PR]\n- Produção total: 282 mil oz; preço médio realizado: US$ 4.810/oz (+24% t/t) [PR]. AISC: US$ 1.834/oz [PR]\n- Guidance 2026: produção 1.090–1.265 mil oz; AISC US$ 1.600–1.800/oz [PR]\n- Programa de retorno 2026–2028: dividendos mínimos de US$ 1,0 bilhão [PR]\n- Projeto Assafou (DFS): produção de 320 mil oz/ano nos primeiros 8 anos; VPL de US$ 5.113 milhões a US$ 4.000/oz de ouro [PR]","conference_call_summary":"Não localizada transcrição verbatim primária. Release cita \"record adjusted EBITDA of $880 million\" e \"record free cash flow of $613 million.\"\n^Tradução livre: \"EBITDA ajustado recorde de US$ 880 milhões\" e \"fluxo de caixa livre recorde de US$ 613 milhões\"","commodity_commentary":"A Reuters noticiou que o fluxo de caixa da Endeavour Mining referente ao exercício de 2025 (resultados anuais divulgados no início de 2026) cresceu de forma expressiva, impulsionado pelos preços elevados do ouro, consolidando a mineradora sediada na África Ocidental como uma das principais beneficiárias do rali do metal [Reuters].\n\nOs resultados do primeiro trimestre de 2026, divulgados em 30 de abril, mostraram EBITDA ajustado recorde de US$ 880 milhões (alta de 29% ante o trimestre anterior) e fluxo de caixa livre recorde de US$ 613 milhões, equivalente a US$ 2.176 por onça produzida. O lucro líquido atribuível aos acionistas saltou para cerca de US$ 354 milhões, e a companhia passou de uma posição de dívida líquida de US$ 158 milhões, no fim de 2025, para caixa líquido de US$ 405 milhões ao fim de março. O resultado veio mesmo com a produção de ouro recuando para 282 mil onças (ante 341 mil onças um ano antes), compensada por preço médio realizado de US$ 4.810/oz, alta de 73% na comparação anual.\n\nA companhia sinalizou que o programa de retorno a acionistas para 2026-2028, com piso de US$ 1 bilhão em dividendos, poderia mais que dobrar aos preços atuais do ouro. Embora buscas extensivas não tenham localizado uma reportagem específica da Bloomberg, Reuters, FT ou WSJ detalhando a variação exata das ações no pregão seguinte à divulgação do primeiro trimestre de 2026, a cobertura da Reuters sobre o exercício de 2025 já havia estabelecido a narrativa de que a alta do ouro estava elevando substancialmente a geração de caixa da empresa, tese que os números trimestrais subsequentes reforçaram [Reuters]."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"LSE/TSX, não é registrante SEC.","commentary_sources":[{"outlet":"Reuters","title":"Endeavour Mining's 2025 cash flow rises on high gold prices","url":"https://www.tradingview.com/news/reuters.com,2026:newsml_L1N3ZT0BF:0-endeavour-mining-s-2025-cash-flow-rises-on-high-gold-prices/","captured_at":"2026-07-08T00:00:00Z"}]},"polyus-pjsc":{"company_id":"polyus-pjsc","accession_number":null,"company_name":"PJSC Polyus","commodities":["gold"],"document_type":"earnings","document_type_label":"Resultados Operacionais e Financeiros (2S/Ano Completo)","sources":[{"filename":"proizvodstvennye-i-finansovye-rezultaty-za-2-polugodie-2025-i-2025-god","label":"Press release da empresa — \"Operating and financial results for the second half of 2025 and full year 2025\" (polyus.com, MOEX: PLZL)","source_url":"https://polyus.com/en/media/press-releases/proizvodstvennye-i-finansovye-rezultaty-za-2-polugodie-2025-i-2025-god/","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 2S e ano completo de 2025 — PJSC Polyus**\n\n- Produção total de ouro em 2025: 2.528,8 mil oz, -16% a/a, dentro do guidance de 2,5–2,6 Moz [PR]\n- Receita de 2025: US$ 8.723 milhões, +19% a/a, por maior preço médio de venda [PR]\n- EBITDA ajustado de 2025: US$ 6.347 milhões, +12% a/a [PR]\n- Custo caixa total (TCC): US$ 739/oz, +93% a/a [PR]\n- Capex de 2025: recorde de US$ 2.180 milhões, +73% a/a [PR]\n- Dívida Líquida/EBITDA Ajustado: 1,1x [PR]\n- Projeto Sukhoi Log: investimento estimado de US$ 6 bilhões, operação plena esperada para 2029 [PR]","conference_call_summary":"Não localizada transcrição verbatim entre as fontes acessíveis.","commodity_commentary":"A cobertura da imprensa financeira ocidental sobre a Polyus é significativamente mais limitada do que a de mineradoras de ouro comparáveis, reflexo direto das sanções impostas pelos Estados Unidos, Reino Unido e União Europeia à companhia e a outros grandes produtores russos desde 2022-2023, que incluíram banimento às importações de ouro russo e o deslistamento dos certificados de depósito da Polyus da Bolsa de Londres em 2023 [Reuters]. Ainda assim, a Reuters cobriu os resultados financeiros da Polyus referentes ao exercício de 2025 (divulgados em março de 2026): o EBITDA ajustado subiu 12% na comparação anual, para US$ 6,35 bilhões, enquanto o lucro líquido ajustado recuou 3%, para US$ 3,3 bilhões, mesmo com a produção de ouro caindo 16%, para 2,5 milhões de onças, em corte planejado [Reuters]. A receita cresceu 19%, para US$ 8,7 bilhões, impulsionada pelo preço médio realizado do ouro refinado, que mais que compensou o menor volume vendido [Reuters].\n\nA reportagem da Reuters também mencionou que as sanções praticamente dobraram o custo estimado de desenvolvimento do projeto Sukhoi Log, na Sibéria, de US$ 3,3 bilhões para cerca de US$ 6 bilhões, e que a companhia projeta produção estável entre 2,5 e 2,6 milhões de onças em 2026, com o projeto entrando em plena operação apenas em 2029 [Reuters].\n\nPor honestidade, não foram localizadas nas fontes solicitadas (Bloomberg, Reuters, FT, WSJ) análises de bancos de investimento ocidentais, variações de preço em bolsas internacionais ou comentários de analistas sell-side associados a este resultado — o que é esperado, já que a ação da Polyus negocia apenas na bolsa de Moscou e está fora do radar da maior parte da cobertura de analistas ocidentais desde as sanções."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"ATENÇÃO: polyus.com bloqueou acesso direto (connection refused, possível roteamento geográfico/sanções); conteúdo obtido via proxy de leitura (r.jina.ai), mesmo documento primário mas não capturado por acesso HTTP direto — recomenda-se nova verificação direta. Polyus não é mais listada na LSE (delisting por sanções); apenas MOEX (PLZL).","commentary_sources":[{"outlet":"Reuters","title":"Polyus 2025 pre-tax profit rises 12% to $6.3B","url":"https://www.mining.com/web/polyus-2025-pre-tax-profit-rises-12-to-6-3b","captured_at":"2026-07-08T00:00:00Z"}]},"chevron":{"company_id":"chevron","accession_number":"0000093410-26-000110","company_name":"Chevron Corporation","commodities":["oil","natural gas"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"a03312026ex9918-k.htm","label":"Press release da empresa — título original: \"Chevron Reports First Quarter 2026 Results\" (Anexo 99.1 ao Formulário 8-K, arquivado em 01/05/2026)","source_url":"https://www.sec.gov/Archives/edgar/data/93410/000009341026000110/a03312026ex9918-k.htm","captured_at":"2026-07-07T18:47:53Z"},{"filename":"cvx-20260331.htm","label":"Formulário 10-Q — trimestre encerrado em 31/03/2026","source_url":"https://www.sec.gov/Archives/edgar/data/93410/000009341026000113/cvx-20260331.htm","captured_at":"2026-07-07T18:47:53Z"}],"tabs":{"earnings_summary":"**Resultados Financeiros (1T2026 vs 1T2025)**\n- Lucro líquido atribuível: US$ 2,2 bilhões (US$ 1,11/ação diluída), ante US$ 3,5 bilhões (US$ 2,00/ação) no 1T2025 [PR]\n- Inclui perda líquida de US$ 360 milhões por provisão jurídica; efeitos cambiais reduziram o lucro em US$ 223 milhões [PR]\n- Lucro ajustado (non-GAAP): US$ 2,8 bilhões (US$ 1,41/ação) [PR]\n- Receita total: US$ 48.607 milhões, ante US$ 47.610 milhões no 1T25 [PR]\n- Preço médio Brent: US$ 81/barril (1T26) vs US$ 76/barril (1T25) [PR]\n\n**Segmentos**\n- Upstream EUA: lucro US$ 2.112 milhões, ante US$ 1.858 milhões no 1T25 — produção subiu 388 mil bpd a/a pela aquisição da Hess [PR]\n- Upstream Internacional: lucro US$ 1.797 milhões, ante US$ 1.900 milhões — câmbio desfavorável [PR]\n- Downstream EUA: lucro US$ 196 milhões, ante US$ 103 milhões — margens mais altas [PR]\n- Downstream Internacional: prejuízo de US$ 1.013 milhões, ante lucro de US$ 222 milhões — margens menores [PR]\n\n**Fluxo de Caixa e Capex**\n- CFFO: US$ 2,5 bilhões, ante US$ 5,2 bilhões no 1T25 — queda por maiores saídas de capital de giro [PR]\n- FCF: -US$ 1,5 bilhão, ante +US$ 1,3 bilhão no 1T25 [PR]\n- Capex: US$ 4,1 bilhões, ante US$ 3,9 bilhões no 1T25 [PR]\n\n**Produção**\n- Produção equivalente consolidada: 3.858 mil BOED, alta de 15% mundial e 24% nos EUA a/a, pela aquisição da Hess [PR]\n- Cortes de produção no Oriente Médio (Israel/Leviathan, Zona Neutra Arábia Saudita-Kuwait) por conflito regional [PR]\n\n**Retorno de Capital**\n- US$ 6,0 bilhões retornados no trimestre (US$ 2,5 bi recompras + US$ 3,5 bi dividendos) — 16º trimestre consecutivo acima de US$ 5 bilhões [PR]\n- Dividendo declarado: US$ 1,78/ação, pagável 10/06/2026 [PR]\n\n**ROCE**: 4,5% (1T26) vs 8,3% (1T25) [PR]","conference_call_summary":"Nenhuma transcrição arquivada na SEC (Chevron disponibiliza apenas no próprio site de RI, fora do escopo desta pesquisa). Citação do CEO Mike Wirth no release: \"Despite heightened geopolitical volatility and related supply disruptions, Chevron delivered solid first quarter performance, underscoring the resilience of our portfolio.\"\n^Tradução livre: \"Apesar da volatilidade geopolítica acentuada e das interrupções de suprimento relacionadas, a Chevron entregou um desempenho sólido no primeiro trimestre, reforçando a resiliência do nosso portfólio.\"","commodity_commentary":"A Bloomberg noticiou que a Chevron superou com folga as estimativas de Wall Street no primeiro trimestre de 2026, com lucro ajustado por ação de US$ 1,41 — 51 centavos acima da média das projeções de analistas consultados pela própria Bloomberg —, impulsionado pela alta dos preços do petróleo e gás natural e pelos ganhos de produção provenientes da aquisição da Hess Corporation [Bloomberg]. A produção mundial da companhia saltou 15% (24% nos EUA), compensando interrupções de fornecimento ligadas à guerra entre EUA/Israel e Irã, iniciada em 28 de fevereiro, que chegou a elevar os preços do petróleo em até 50% no trimestre [Bloomberg].\n\nApesar do resultado, o lucro líquido reportado (não ajustado) caiu para US$ 2,2 bilhões (US$ 1,11 por ação diluída), ante US$ 3,5 bilhões (US$ 2,00 por ação) um ano antes, penalizado por um encargo de US$ 2,9 bilhões relacionado a efeitos de tempo (timing) em avaliação de estoques e contratos de derivativos [Bloomberg]. A companhia devolveu US$ 6,0 bilhões em caixa aos acionistas no trimestre, a 16ª vez consecutiva acima de US$ 5 bilhões [Bloomberg].\n\nPosteriormente, a Bloomberg noticiou que a Berkshire Hathaway, de Warren Buffett, vendeu cerca de US$ 8 bilhões em ações da Chevron à medida que os preços do papel dispararam em maio, movimento associado pela reportagem ao contexto de valorização das petroleiras após a alta do petróleo provocada pela guerra no Oriente Médio [Bloomberg]. A reação imediata das ações ao balanço foi discreta diante da magnitude da surpresa positiva no lucro ajustado, sinal de que o mercado já vinha precificando boa parte do impacto da alta do petróleo antes da divulgação formal dos números [Bloomberg]."},"generated_by":"claude-research","generated_at":"2026-07-07T18:47:53Z","status":"summarized","note_for_reviewer":"8-K de 01/05/2026 (1T26) — release mais recente disponível em 07/07/2026. Nenhuma transcrição de call encontrada como documento primário na SEC.","commentary_sources":[{"outlet":"Bloomberg","title":"Chevron Blows Away Estimates on War-Driven Surge in Oil Prices","url":"https://www.bloomberg.com/news/articles/2026-05-01/chevron-blows-away-estimates-on-war-driven-surge-in-oil-prices","captured_at":"2026-07-08T00:00:00Z"},{"outlet":"Bloomberg","title":"Berkshire Sold $8 Billion of Chevron Shares as Prices Soared","url":"https://www.bloomberg.com/news/articles/2026-05-15/berkshire-sold-8-billion-of-chevron-shares-as-prices-soared","captured_at":"2026-07-08T00:00:00Z"}]},"phillips66":{"company_id":"phillips66","accession_number":"0001534701-26-000020","company_name":"Phillips 66","commodities":["oil","natural gas","refined products"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"psx-2026331_ex991.htm","label":"Press release da empresa — título original: \"Phillips 66 Reports First-Quarter 2026 Results\" (Anexo 99.1 ao Formulário 8-K, 29/04/2026)","source_url":"https://www.sec.gov/Archives/edgar/data/1534701/000153470126000020/psx-2026331_ex991.htm","captured_at":"2026-07-07T00:00:00Z"},{"filename":"psx-20260331.htm","label":"Formulário 10-Q referente ao trimestre encerrado em 31/03/2026","source_url":"https://www.sec.gov/Archives/edgar/data/1534701/000153470126000022/psx-20260331.htm","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 1T2026 (encerrado 31/03/2026)**\n\n- Lucro líquido atribuível: US$ 207 milhões (US$ 0,51/ação), ante US$ 2,9 bilhões no 4T2025 e US$ 487 milhões no 1T2025 [PR]\n- Lucro ajustado: US$ 200 milhões (US$ 0,49/ação) [PR]. EBITDA ajustado: US$ 1.268 milhões, ante US$ 2.532 milhões no 4T2025 [PR]\n- Receita: US$ 32.540 milhões, alta de 7% frente ao 1T2025 [10-Q]\n- Perda de marcação a mercado (mark-to-market) em derivativos hedge: US$ 839 milhões pré-imposto, por forte alta de preços de commodities [PR]\n\n**Segmentos — Lucro Ajustado (pré-tax, US$ milhões)**\n- Midstream: 591 (vs 683 no 1T25) [PR]\n- Refining: 208 (vs -937 no 1T25) [PR]\n- Marketing and Specialties: -141 (vs 265 no 1T25) [PR]\n- Chemicals: 85 (vs 113 no 1T25) [PR]\n\n**Operações de Refino**\n- Utilização de capacidade: 95%, ante 99% no 4T2025 [PR]\n- Margem de refino realizada: US$ 10,11/barril, ante US$ 12,48/barril no 4T2025 [PR]\n\n**Fluxo de Caixa e Capex**\n- Caixa consumido pelas operações: -US$ 2.264 milhões, por aumento de estoques [PR/10-Q]\n- Capex total: US$ 582 milhões, ante US$ 423 milhões no 1T2025 [PR/10-Q]\n- Aquisição da Lindsey Oil Refinery (Reino Unido) concluída em abril/2026 [PR]\n\n**Dívida e Retorno de Capital**\n- Dívida total: US$ 27.124 milhões, ante US$ 19.716 milhões no fim de 2025 — Term Loan de US$ 2,25 bilhões firmado em 18/03/2026 [PR/10-Q]\n- Retorno total: US$ 778 milhões (US$ 269 milhões recompras + US$ 509 milhões dividendos) [PR]\n- Dividendo declarado: US$ 1,27/ação, alta de 7% [10-Q][PR]","conference_call_summary":"Nenhuma transcrição localizada na SEC nem no site de RI. Citação do CEO Mark Lashier no press release: \"We are confident in our ability to navigate market volatility given our integrated business and strong balance sheet.\"\n^Tradução livre: \"Estamos confiantes em nossa capacidade de navegar pela volatilidade de mercado, graças ao nosso negócio integrado e à solidez do nosso balanço patrimonial.\"","commodity_commentary":"A Reuters — cujo conteúdo circulou também via BNN Bloomberg — noticiou que a Phillips 66 registrou lucro surpresa no primeiro trimestre de 2026, revertendo as expectativas do mercado: o lucro ajustado por ação veio em US$ 0,49, muito acima da previsão de Wall Street, que projetava prejuízo ajustado de US$ 0,40 por ação [Reuters]. O lucro líquido total somou US$ 207 milhões (US$ 0,51 por ação diluída), sustentado pela forte recuperação das margens de refino: a margem realizada subiu para US$ 10,11 por barril, ante US$ 6,81 no mesmo trimestre do ano anterior, com o resultado ajustado antes de impostos do segmento de refino saltando para US$ 208 milhões, revertendo um prejuízo de US$ 937 milhões um ano antes [Reuters].\n\nSegundo a reportagem, a utilização da capacidade de refino subiu para 95%, ante 80% no mesmo período de 2025, beneficiada por margens de refino ao longo da Costa do Golfo dos EUA entre as mais favoráveis dos últimos anos — as margens de referência nos EUA subiram cerca de 73% na comparação anual no trimestre [Reuters]. As ações da Phillips 66 subiram 1,7% no pré-mercado logo após a divulgação dos resultados, refletindo a reação inicial positiva dos investidores à reversão de lucro [Reuters].\n\nA companhia também elevou o dividendo trimestral anualizado em 7% e encerrou o trimestre com liquidez de aproximadamente US$ 6,0 bilhões, dados que, segundo a cobertura, reforçaram a leitura do mercado de que a Phillips 66 está conseguindo capitalizar o momento favorável de margens após concluir a integração total das refinarias de Borger e Wood River no início do ano [Reuters]."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"8-K de 29/04/2026 (1T2026) — release mais recente disponível em 07/07/2026. Nenhuma transcrição de call encontrada.","commentary_sources":[{"outlet":"Reuters","title":"Phillips 66 posts surprise profit on higher refining margins","url":"https://www.bnnbloomberg.ca/business/2026/04/29/phillips-66-posts-surprise-profit-on-higher-refining-margins/","captured_at":"2026-07-08T00:00:00Z"}]},"conocophillips":{"company_id":"conocophillips","accession_number":"0001163165-26-000016","company_name":"ConocoPhillips","commodities":["oil","natural gas"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"cop-20260430x8kexx991.htm","label":"Press release da empresa — título original: \"ConocoPhillips announces first-quarter 2026 results and quarterly dividend\" (Anexo 99.1 ao Formulário 8-K)","source_url":"https://www.sec.gov/Archives/edgar/data/1163165/000116316526000016/cop-20260430x8kexx991.htm","captured_at":"2026-07-07T00:00:00Z"},{"filename":"cop-20260430x8kexx992.htm","label":"Informações financeiras suplementares detalhadas — título original: \"First-Quarter 2026 Detailed Supplemental Information\" (Anexo 99.2 ao Formulário 8-K)","source_url":"https://www.sec.gov/Archives/edgar/data/1163165/000116316526000016/cop-20260430x8kexx992.htm","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Visão Geral do Trimestre**\n- Período: 1T26 (encerrado 31/03/2026), divulgado 30/04/2026 [PR]\n- Lucro líquido de US$ 2.183 milhões (US$ 1,78/ação), ante US$ 2.849 milhões (US$ 2,23/ação) no 1T25 [PR][EX-99.2]\n- Lucro ajustado (não-GAAP) de US$ 2.324 milhões (US$ 1,89/ação ajustado), ante US$ 2.679 milhões no 1T25 [PR][EX-99.2]\n- Receita total: US$ 16.054 milhões, ante US$ 17.101 milhões no 1T25 [EX-99.2]\n- Preço médio total realizado: US$ 50,36/BOE, 6% inferior aos US$ 53,34/BOE do 1T25, por preços de gás mais baixos no Permian [PR][EX-99.2]\n\n**Segmentos (Lucro Ajustado, 1T26 vs 1T25)**\n- Lower 48: US$ 1.403 mi (vs US$ 1.697 mi) [EX-99.2]\n- Alaska: US$ 294 mi (vs US$ 269 mi) [EX-99.2]\n- Canadá: US$ 207 mi (vs US$ 256 mi) [EX-99.2]\n- EMENA: US$ 265 mi (vs US$ 419 mi) [EX-99.2]\n- Ásia-Pacífico: US$ 295 mi (vs US$ 311 mi) [EX-99.2]\n\n**Fluxo de Caixa e Capex**\n- Caixa operacional: US$ 4.295 milhões [PR][EX-99.2]. CFO (não-GAAP): US$ 5.387 milhões [PR][EX-99.2]\n- Capex total: US$ 2.948 milhões, ante US$ 3.378 milhões no 1T25 [PR][EX-99.2]\n- Retorno de capital: US$ 2,0 bilhões (US$ 1,0 bi recompras + US$ 1,0 bi dividendos) [PR][EX-99.2]\n- Dívida total: US$ 23.327 milhões; relação dívida/capital de 27% [EX-99.2]\n- Dividendo do 2T26 declarado em US$ 0,84/ação [PR]\n\n**Produção**\n- Total: 2.309 mil BOE/dia, queda de 80 mil BOE/dia frente ao 1T25 [PR][EX-99.2]\n- Lower 48: 1.453 MBOED (Delaware 698, Midland 200, Eagle Ford 367, Bakken 183) [PR]\n- Queda atribuída a paradas não programadas (incl. impacto do conflito no Oriente Médio sobre o Catar) e royalties mais altos em Surmont [PR]\n\n**Guidance**\n- Produção 2T26 (excluindo Catar): 2,185–2,215 milhões BOED [PR]\n- Produção ano cheio 2026: 2,295–2,325 milhões BOED [PR]\n- Capex 2026: US$ 12,0–12,5 bilhões [PR]\n- Meta reiterada de devolver 45% do CFO aos acionistas em 2026 [PR]","conference_call_summary":"Nenhuma transcrição de teleconferência arquivada na SEC como documento primário. Citação do CEO Ryan Lance no press release: \"Our thoughts are with our team, partners and all those impacted by the ongoing conflict in the Middle East. Amid continued macro volatility, ConocoPhillips delivered another quarter of strong financial and operational performance.\"\n^Tradução livre: \"Nossos pensamentos estão com nossa equipe, parceiros e todos os afetados pelo conflito em curso no Oriente Médio. Em meio à volatilidade macroeconômica contínua, a ConocoPhillips entregou mais um trimestre de forte desempenho financeiro e operacional.\"","commodity_commentary":"A Reuters noticiou, em fevereiro de 2026, que a ConocoPhillips havia estabelecido meta de corte de custos de US$ 1 bilhão para 2026, após o lucro do quarto trimestre de 2025 ter ficado abaixo das expectativas dos analistas em meio à fraqueza dos preços do petróleo — o lucro ajustado por ação de US$ 1,02 ficou aquém da média de US$ 1,11 esperada pelo mercado, segundo dados compilados pela agência [Reuters].\n\nJá no primeiro trimestre de 2026, divulgado no fim de abril, a companhia reportou lucro ajustado por ação de US$ 1,89, acima do consenso de analistas — uma reviravolta frente ao trimestre anterior —, com receita de US$ 15,76 bilhões. Ainda assim, o lucro líquido total de US$ 2,2 bilhões (US$ 1,78 por ação) representou queda de 21% frente a igual período de 2025, refletindo produção 80 mil barris de óleo equivalente por dia menor na comparação anual e preços realizados 6% inferiores [Reuters]. A empresa gerou US$ 5,4 bilhões em caixa das operações e devolveu US$ 2,0 bilhões a acionistas entre recompras e dividendos.\n\nApesar da superação do consenso, a companhia revisou a projeção de produção para 2026 para uma faixa entre 2,295 e 2,325 milhões de barris de óleo equivalente por dia, abaixo da estimativa anterior, o que a cobertura associou a certa cautela do mercado nas semanas seguintes, em meio a preocupações com o aumento do capex e riscos geopolíticos ligados a operações no Catar [Reuters]. Por honestidade, buscas específicas não localizaram uma reportagem de Bloomberg, Reuters, FT ou WSJ detalhando o movimento intradiário exato das ações no dia da divulgação do primeiro trimestre de 2026, de modo que a magnitude precisa dessa reação de curto prazo não pôde ser confirmada com as fontes solicitadas."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"8-K de 30/04/2026 (Item 2.02), referente ao 1T26 — earnings release mais recente disponível em 07/07/2026. Nenhuma transcrição de call encontrada como documento primário na SEC.","commentary_sources":[{"outlet":"Reuters","title":"ConocoPhillips targets US$1 billion cost cut in 2026 after quarterly profit miss","url":"https://www.ctvnews.ca/business/article/conocophillips-targets-us1-billion-cost-cut-in-2026-after-quarterly-profit-miss/","captured_at":"2026-07-08T00:00:00Z"}]},"marathon-petroleum":{"company_id":"marathon-petroleum","accession_number":"0001510295-26-000039","company_name":"Marathon Petroleum Corporation","commodities":["oil","refined products"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"mpcq12026earningsrelease.htm","label":"Press release da empresa — título original: \"Marathon Petroleum Corp. Reports First-Quarter 2026 Results\" (Anexo 99.1 ao Formulário 8-K, arquivado em 05/05/2026)","source_url":"https://www.sec.gov/Archives/edgar/data/1510295/000151029526000039/mpcq12026earningsrelease.htm","captured_at":"2026-07-07T00:00:00Z"},{"filename":"mpc-20260331.htm","label":"Formulário 10-Q referente ao trimestre encerrado em 31/03/2026","source_url":"https://www.sec.gov/Archives/edgar/data/1510295/000151029526000042/mpc-20260331.htm","captured_at":"2026-07-07T00:00:00Z"}],"tabs":{"earnings_summary":"**Resumo do 1T26 (encerrado 31/03/2026), divulgado 05/05/2026**\n\n- Receita total: US$ 34.200 milhões, ante US$ 31.517 milhões no 1T25 [PR]\n- Resultado operacional: US$ 1.404 milhões, ante US$ 687 milhões no 1T25 [PR]\n- Lucro líquido atribuível à MPC: US$ 511 milhões (US$ 1,73/ação), ante prejuízo de US$ (74) milhões (US$ (0,24)/ação) no 1T25 [PR]\n- EBITDA ajustado consolidado: US$ 2.763 milhões, ante US$ 1.975 milhões no 1T25 [PR]\n\n**Segmentos — EBITDA Ajustado**\n- Refining & Marketing: US$ 1.377 milhões (US$ 5,37/barril) vs US$ 489 milhões (US$ 1,91/barril) no 1T25 — beneficiado por crack spreads mais altos [PR]\n- Midstream (via MPLX): US$ 1.598 milhões, ante US$ 1.720 milhões no 1T25 [PR]\n- Renewable Diesel: US$ 38 milhões, ante US$ (42) milhões no 1T25, beneficiado por créditos fiscais 45Z [PR]\n\n**Fluxo de Caixa e Capex**\n- Caixa operacional: US$ 1.121 milhões, ante consumo de US$ (64) milhões no 1T25 [PR]\n- Capex total: US$ 1.252 milhões, ante US$ 776 milhões no 1T25 [PR]\n- Guidance capex 2026 (excl. MPLX): US$ 1,5 bilhão [PR]\n\n**Retorno de Capital**\n- Mais de US$ 1,0 bilhão retornado no 1T26 (US$ 750 milhões recompras + US$ 295 milhões dividendos) [10-Q]\n- Nova autorização incremental de recompra de US$ 5 bilhões aprovada em 05/05/2026 [PR]\n- Dividendo declarado de US$ 1,00/ação (+10% a/a), pagável 10/06/2026 [10-Q]\n\n**Volumes**\n- Throughput líquido de refino: 2.850 mil bpd; utilização de capacidade de 89% [PR]\n\n**Guidance 2T26**\n- Custos operacionais de refino: US$ 5,65/barril [PR]. Throughput esperado: 2.990 mil bpd [PR]","conference_call_summary":"Nenhuma transcrição arquivada na SEC. Citação da CEO Maryann Mannen: \"Our first quarter results underscore the strength and reliability of our integrated system and disciplined capital allocation approach.\"\n^Tradução livre: \"Nossos resultados do primeiro trimestre reforçam a solidez e a confiabilidade do nosso sistema integrado e nossa abordagem disciplinada de alocação de capital.\"","commodity_commentary":"Segundo a Reuters, a Marathon Petroleum superou com folga as expectativas de Wall Street para o primeiro trimestre de 2026, divulgado em 5 de maio [Reuters]. O lucro ajustado por ação ficou em US$ 1,65, muito acima da média das estimativas de analistas [Reuters]. A maior refinadora dos EUA por volume reportou receita de US$ 34,57 bilhões, também acima do previsto, e reverteu o prejuízo líquido de US$ 74 milhões do 1T25 para um lucro líquido de US$ 511 milhões [Reuters].\n\nDe acordo com a Reuters, o resultado foi impulsionado pela margem de refino e marketing, que somou US$ 17,74 por barril, alta de 32,6% ante o ano anterior, refletindo o aperto na oferta global de combustíveis causado pela guerra no Oriente Médio e pelo quase fechamento do Estreito de Hormuz, que levaram as exportações americanas de derivados a recorde em março [Reuters]. A reportagem destaca que a companhia elevou o programa de recompra de ações em US$ 5 bilhões e devolveu mais de US$ 1 bilhão aos acionistas no trimestre [Reuters].\n\nA reação do mercado foi positiva: as ações da Marathon subiram 2,8% nos primeiros negócios após o resultado, consolidando uma valorização de cerca de 60% no acumulado de 2026 [Reuters]. A imprensa financeira enquadrou o resultado dentro de uma tendência mais ampla entre refinadoras americanas, cujos lucros do primeiro trimestre foram impulsionados pelas interrupções de fornecimento ligadas ao conflito no Irã [Reuters]."},"generated_by":"claude-research","generated_at":"2026-07-07T00:00:00Z","status":"summarized","note_for_reviewer":"8-K de 05/05/2026 (1T26) — release mais recente disponível em 07/07/2026. Nenhuma transcrição de call encontrada como documento primário.","commentary_sources":[{"outlet":"Reuters","title":"UPDATE 2-Marathon Petroleum profit beats estimates on refining margin boost","url":"https://www.sahmcapital.com/news/content/update-2-marathon-petroleum-profit-beats-estimates-on-refining-margin-boost-2026-05-05","captured_at":"2026-07-07T00:00:00Z"}]},"exxonmobil":{"company_id":"exxonmobil","accession_number":"0000034088-26-000065","company_name":"Exxon Mobil Corporation","commodities":["oil","natural gas"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"livef8k1q26991.htm","label":"Press release da empresa — título original: \"ExxonMobil Announces First-Quarter 2026 Results\" (Anexo 99.1 ao Formulário 8-K)","source_url":"https://www.sec.gov/Archives/edgar/data/34088/000003408826000065/livef8k1q26991.htm","captured_at":"2026-07-07T18:48:04Z"},{"filename":"livef8k1q26992.htm","label":"Sumário de dados para investidores (Anexo 99.2 ao Formulário 8-K)","source_url":"https://www.sec.gov/Archives/edgar/data/34088/000003408826000065/livef8k1q26992.htm","captured_at":"2026-07-07T18:48:04Z"},{"filename":"xom-20260331.htm","label":"Formulário 10-Q referente ao trimestre encerrado em 31/03/2026","source_url":"https://www.sec.gov/Archives/edgar/data/34088/000003408826000067/xom-20260331.htm","captured_at":"2026-07-07T18:48:04Z"}],"tabs":{"earnings_summary":"**Resultados do 1T26 (encerrado 31/03/2026), divulgado 01/05/2026**\n\n- Lucro líquido atribuível (GAAP): US$ 4,183 bilhões (US$ 1,00/ação), ante US$ 7,713 bilhões (US$ 1,76/ação) no 1T25 [PR]\n- Lucro excl. itens identificados e efeitos de tempo (não-GAAP): US$ 8,772 bilhões (US$ 2,09/ação), ante US$ 7,584 bilhões no 1T25 [PR]\n- Efeitos de tempo desfavoráveis de US$ 3,883 bilhões por descasamento de marcação a mercado de derivativos [PR]\n- Receita: US$ 83,161 bilhões, ante US$ 81,058 bilhões no 1T25 [PR]\n\n**Segmentos**\n- Upstream: US$ 5,737 bilhões GAAP (excl. itens: US$ 6,265 bilhões); produção de 4.594 mil BOE/dia; recorde na Guiana (>900 mil bpd) [PR]\n- Energy Products: prejuízo GAAP de US$ 1,262 bilhão (excl. itens: lucro de US$ 2,799 bilhões, +US$ 1,9 bi a/a) por margens melhores [PR]\n- Chemical Products: US$ 110 milhões, queda de US$ 163 milhões a/a por margens mais fracas [PR]\n\n**Fluxo de Caixa e Capex**\n- Caixa operacional (GAAP): US$ 8,705 bilhões, ante US$ 12,953 bilhões no 1T25 [PR]\n- Fluxo de caixa livre: US$ 2,699 bilhões, ante US$ 8,840 bilhões no 1T25 [PR]\n- Capex: US$ 6,187 bilhões, dentro da faixa de guidance anual de US$ 27-29 bilhões [PR]\n\n**Retorno de Capital**\n- Distribuições totais: US$ 9,2 bilhões (US$ 4,3 bi dividendos + US$ 4,9 bi recompras) [PR]\n- Dívida total: US$ 47,7 bilhões, ante US$ 43,5 bilhões no fim de 2025 [PR/10-Q]\n\n**Guidance**\n- Capex 2026: US$ 27-29 bilhões (mantido) [PR/10-Q]\n- Recompra 2026: ~US$ 20 bilhões [10-Q]","conference_call_summary":"Transcrição obtida via site de RI (fonte secundária, não arquivada na SEC). Citação do CEO Darren Woods: \"This quarter demonstrated that ExxonMobil is a fundamentally stronger company than it was a few years ago, built to perform through disruptions and across market cycles.\"\n^Tradução livre: \"Este trimestre demonstrou que a ExxonMobil é uma empresa fundamentalmente mais forte do que era há poucos anos, construída para performar através de disrupções e ao longo de ciclos de mercado.\" Sobre o Estreito de Ormuz: \"Uma vez que o Estreito reabra, levará algum tempo para retomar um fluxo estável — estimamos uma defasagem de um a dois meses.\"","commodity_commentary":"A Bloomberg noticiou que a Exxon Mobil superou as previsões dos analistas no primeiro trimestre de 2026, divulgado em 1º de maio, mesmo em meio à turbulência causada pela guerra entre EUA/Israel e o Irã [Bloomberg]. O lucro ajustado por ação foi de US$ 1,16, 20 centavos acima da média das estimativas [Bloomberg]. Ainda assim, o lucro líquido reportado caiu para US$ 4,2 bilhões (US$ 4,9 bilhões em base ajustada), o menor patamar em cinco anos, pressionado por uma perda de US$ 706 milhões em hedges financeiros e US$ 3,9 bilhões em efeitos de tempo desfavoráveis de derivativos [Bloomberg].\n\nSegundo a Bloomberg, os preços mais altos de energia adicionaram US$ 1,7 bilhão ao resultado, mais do que compensando um impacto de US$ 400 milhões em interrupções de produção ligadas à guerra [Bloomberg]. A produção recorde na Guiana, acima de 900 mil barris brutos por dia, ajudou a suprir as perdas no Oriente Médio [Bloomberg]. A reportagem chama atenção para o risco de longo prazo: participações da Exxon em duas plantas de GNL no Catar foram seriamente danificadas por mísseis iranianos em março, e autoridades catarenses estimam que a reconstrução pode levar até cinco anos [Bloomberg].\n\nApesar do resultado acima do esperado, as ações da Exxon caíram cerca de 0,8% no dia do anúncio, mesmo com o petróleo acumulando alta superior a 50% desde o início do conflito [Bloomberg]. A Bloomberg publicou a cobertura em conjunto com a Chevron, cujo lucro ajustado também bateu o consenso [Bloomberg]."},"generated_by":"claude-research","generated_at":"2026-07-07T18:48:04Z","status":"summarized","note_for_reviewer":"8-K de 01/05/2026 (1T26) — release mais recente disponível em 07/07/2026. Transcrição de call obtida via site de RI (não SEC), sinalizado explicitamente.","commentary_sources":[{"outlet":"Bloomberg","title":"Exxon Profit Surprises Analysts Despite Iran War's Tumult","url":"https://www.bloomberg.com/news/articles/2026-05-01/exxon-profit-surprises-analysts-despite-iran-war-s-tumult","captured_at":"2026-07-07T00:00:00Z"}]},"alcoa":{"company_id":"alcoa","accession_number":"0001193125-26-306118","company_name":"Alcoa Corporation","commodities":["aluminum","alumina","bauxite"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"aa-ex99_1.htm","label":"Press release da empresa — título original: \"Alcoa Corporation Reports Second Quarter 2026 Results\" (Anexo 99.1 ao Formulário 8-K)","source_url":"https://www.sec.gov/Archives/edgar/data/0001675149/000119312526306118/aa-ex99_1.htm","captured_at":"2026-07-20T00:00:00Z"},{"filename":"Alcoa-Corporation-Reports-Second-Quarter-2026-Results.html","label":"Press release da empresa — página de Relações com Investidores (news.alcoa.com)","source_url":"https://news.alcoa.com/press-releases/press-release-details/2026/Alcoa-Corporation-Reports-Second-Quarter-2026-Results/default.aspx","captured_at":"2026-07-20T00:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 2T26 (trimestre encerrado em 30/06/2026), divulgados em 16/07/2026** — maior receita trimestral da história da Alcoa Corporation (quase uma década como companhia independente), divulgados no mesmo dia do anúncio da aquisição dos ativos de bauxita/alumina/alumínio da South32 [PR].\n\n**Resultado consolidado:**\n- Receita total: US$ 3.966 milhões (~US$ 4,0 bilhões), alta de 24% sequencial ante o 1T26 — ligeiramente abaixo do consenso de mercado (~US$ 3,99 bilhões) [PR].\n- Lucro líquido atribuível (GAAP): US$ 407 milhões, segundo agregadores que citam o release — não confirmado diretamente no documento primário (ver nota do revisor) [PR].\n- Lucro líquido ajustado: US$ 562 milhões (US$ 2,12/ação ajustado), alta de 51% sequencial — abaixo do consenso de EPS ajustado de US$ 2,32 (miss de ~9%) [PR].\n- EBITDA ajustado excluindo itens especiais: US$ 901 milhões, alta de 51% sequencial (+US$ 306 milhões ante os US$ 595 milhões do 1T26) [PR].\n- Caixa ao final do trimestre: US$ 1,4 bilhão. Fluxo de caixa operacional: US$ 608 milhões. Fluxo de caixa livre: US$ 422 milhões [PR].\n\n**Segmento Alumina:**\n- Produção: 2,2 milhões de toneladas, queda de 6% sequencial, por instabilidade na refinaria de Pinjarra (Austrália Ocidental), agravada por interrupção no fornecimento de gás associada ao Ciclone Narelle [PR].\n- EBITDA ajustado do segmento: -US$ 96 milhões (negativo) [PR].\n\n**Segmento Aluminum:**\n- Produção: 636 mil toneladas, alta de 5% sequencial, refletindo a conclusão do restart do smelter de San Ciprián (Espanha) em 07/04/2026, avanço do restart de Alumar (Brasil) e conclusão dos restarts de Lista (Noruega) e Portland (Austrália) [PR].\n- Embarques: 726 mil toneladas, alta de 113 mil toneladas sequencial [PR].\n- EBITDA ajustado do segmento: recorde de US$ 1,1 bilhão, margem de 32,3% [PR].\n\n**Guidance 2026 (revisado para baixo na Alumina)**\n- Alumina: produção cortada para 9,5–9,6 Mt (de 9,7–9,9 Mt anteriormente), por causa dos problemas em Pinjarra [PR].\n- Aluminum: guidance detalhado para o 2S26 não confirmado nas fontes consultadas (ver nota do revisor).\n\n**Aquisição da South32 (acordo definitivo assinado em 30/06/2026, anunciada junto com o resultado do 2T26)**\n- Alcoa vai adquirir os ativos de bauxita/alumina/alumínio da South32: mina de bauxita de Boddington e refinaria de alumina de Worsley (Austrália Ocidental); smelter de alumínio de Hillside e a propriedade do smelter hoje parado de Bayside (África do Sul); mina de bauxita MRN e a refinaria de alumina/smelter de alumínio de Alumar (Brasil) — fica de fora o smelter de Mozal, em Moçambique [PR].\n- Contraprestação inicial de ~US$ 4,1 bilhões: US$ 3,1 bilhões em caixa + ~17,0 milhões de ações ordinárias da Alcoa (~US$ 1,0 bilhão), mais dívida líquida assumida de ~US$ 0,6 bilhão e um CVR (contingent value right) de até US$ 750 milhões ao longo de 4 anos, atrelado a preços futuros de alumínio/alumina [PR].\n- Financiamento: bridge loan de US$ 3,1 bilhões do Goldman Sachs, a ser substituído por caixa do balanço e dívida permanente antes do fechamento [PR].\n- Fechamento esperado no 1S27, sujeito à aprovação dos acionistas da South32 e a aprovações regulatórias [PR].","conference_call_summary":"Citação do CEO William F. Oplinger no press release: \"During the second quarter, in addition to delivering strong financial results that captured favorable aluminum prices, our team executed on strategic initiatives, most notably the announced agreement with South32.\"\n^Tradução livre: \"Durante o segundo trimestre, além de entregar resultados financeiros sólidos que capturaram preços favoráveis de alumínio, nossa equipe executou iniciativas estratégicas, principalmente o acordo anunciado com a South32.\"\n\nTambém no release: \"We continue to demonstrate operational excellence and positive momentum in our disciplined approach to maximize value creation.\"\n^Tradução livre: \"Continuamos demonstrando excelência operacional e momentum positivo em nossa abordagem disciplinada para maximizar a criação de valor.\"\n\nNão foi possível acessar a transcrição completa e verbatim da teleconferência de resultados (bloqueio de acesso às páginas primárias — ver nota do revisor); as citações acima vêm do texto do press release oficial, não da call em si.","commodity_commentary":"Apesar da receita recorde e do anúncio simultâneo da aquisição de ativos da South32, a reação de mercado ao 2T26 da Alcoa foi negativa: as ações caíram 3,56% no pregão regular, para US$ 46,85, e recuaram ainda mais no after-hours (estimativas entre 2,4% e 4,2% adicionais, para a faixa de US$ 45,73), à medida que investidores digeriram o EPS ajustado de US$ 2,12 — abaixo do consenso de US$ 2,32 (miss de ~9%) — e o corte na guidance de produção de alumina [Investing.com][Benzinga].\n\nO miss foi atribuído majoritariamente aos problemas na refinaria de Pinjarra, agravados pelo Ciclone Narelle, que levaram ao corte da guidance de produção de alumina para 2026 [Investing.com]. Em contraste, o segmento de alumínio entregou EBITDA ajustado recorde de US$ 1,1 bilhão (margem de 32,3%), beneficiado pela conclusão de restarts de capacidade em San Ciprián, Lista e Portland [Investing.com].\n\nO evento do trimestre mais comentado na imprensa, porém, foi o acordo definitivo assinado em 30/06/2026 para a Alcoa adquirir os ativos de bauxita/alumina/alumínio da South32 por consideração inicial de ~US$ 4,1 bilhões (~US$ 3,1 bi em caixa + ~US$ 1,0 bi em ações), avaliado pela Bloomberg em até US$ 5,6 bilhões somando CVR e dívida assumida, descrito como uma aposta da Alcoa em um boom prolongado do mercado de alumínio [Bloomberg].\n\nNão foi localizada cobertura dedicada da Bloomberg, Reuters, FT ou WSJ especificamente sobre a reação ao print do 2T26 em si (16/07) — a análise da reação do papel ao resultado veio de Investing.com e Benzinga; a citação da Bloomberg refere-se à cobertura do anúncio da aquisição da South32 em 30/06/2026, evento relacionado mas cronologicamente anterior (e por isso tratado aqui como contexto, não como cobertura do earnings)."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Todas as tentativas de acessar diretamente o press release primário (news.alcoa.com) e o Exhibit 99.1 do 8-K no SEC EDGAR retornaram HTTP 403 — bloqueio do próprio site (anti-bot), não da política de proxy da sessão. Os números reportados vêm de múltiplas fontes secundárias (TradingView, StockTitan, Investing.com, Alphastreet) que citam o release textualmente e são altamente consistentes entre si (ex.: EBITDA ajustado de US$ 901M bate exatamente com US$ 595M do 1T26 + US$ 306M de alta sequencial reportada). Ainda assim, o lucro líquido GAAP de US$ 407 milhões veio de uma única fonte secundária e não pôde ser cruzado com o documento primário — tratar com cautela até confirmação direta. Guidance detalhado do segmento Aluminum para o 2S26 e a data exata de arquivamento do 8-K não puderam ser confirmados (accession number inferido da URL do EDGAR). Cobertura de imprensa de primeira linha (Bloomberg/Reuters/FT/WSJ) especificamente sobre a reação ao print do 2T26 não foi localizada — usei Investing.com e Benzinga como fallback, mais uma matéria da Bloomberg sobre o M&A com a South32 (evento relacionado, mas anunciado em 30/06, antes do release trimestral).","commentary_sources":[{"outlet":"Investing.com","title":"Earnings call transcript: Alcoa misses Q2 2026 EPS forecast as shares fall","url":"https://www.investing.com/news/transcripts/earnings-call-transcript-alcoa-misses-q2-2026-eps-forecast-as-shares-fall-93CH-4797191","captured_at":"2026-07-20T00:00:00Z"},{"outlet":"Benzinga","title":"Alcoa Stock Sinks On Q2 Earnings Miss: Details","url":"https://www.benzinga.com/markets/earnings/26/07/60514126/alcoa-stock-sinks-on-q2-earnings-miss-details","captured_at":"2026-07-20T00:00:00Z"},{"outlet":"Bloomberg","title":"Alcoa Bets on Aluminum Boom With $5.6 Billion South32 Deal","url":"https://www.bloomberg.com/news/articles/2026-06-30/south32-sells-aluminum-assets-to-alcoa-in-5-6-billion-deal","captured_at":"2026-06-30T00:00:00Z"}]},"century-aluminum":{"company_id":"century-aluminum","accession_number":"0001628280-26-032082","company_name":"Century Aluminum Company","commodities":["aluminum","alumina"],"document_type":"earnings","document_type_label":"Earnings Completo","sources":[{"filename":"a20260331q1ex991earningsre.htm","label":"Press release da empresa — título original: \"Century Aluminum Company Reports First Quarter 2026 Results\" (Anexo 99.1 ao Formulário 8-K, arquivado em 07/05/2026)","source_url":"https://www.sec.gov/Archives/edgar/data/949157/000162828026032082/a20260331q1ex991earningsre.htm","captured_at":"2026-07-07T18:00:00Z"}],"tabs":{"earnings_summary":"**Resultados do 1T26 (trimestre encerrado em 31/03/2026), divulgados em 07/05/2026** — dado oficial mais recente; o 2T26 ainda não foi divulgado (previsto 06/08/2026) [PR].\n\n**Resultado consolidado:**\n- Vendas líquidas: US$ 649,2 milhões, alta de US$ 15,5 milhões sequencial [PR]\n- Embarques de alumínio primário: 122.865 toneladas (ante 168.672 t no 1T25) — queda por parada da Linha 2 em Grundartangi, Islândia [PR]\n- Lucro líquido atribuível: US$ 337,5 milhões (US$ 3,23/ação), impulsionado por ganho não recorrente de US$ 287,9 milhões na venda da planta de Hawesville e US$ 33,0 milhõe de moagem em Sierra Gorda, com expectativa de aumentar produção de cobre-equivalente em ~30% [PR]. Em Hermosa (Arizona), concluído o licenciamento federal do projeto Taylor (zinco-chumbo-prata) [PR]. Guidance FY27 de Sierra Gorda mantido em 90,2 kt de cobre atribuível; guidance FY27 completo para os demais ativos (Worsley, Hillside, GEMCO, Illawarra) deve ser detalhado no resultado anual (Appendix 4E), ainda não coberto nesta varredura.\n\n**Divestimento de alumínio para a Alcoa — status**: o relatório trata como evento confirmado/em andamento (não concluído) o acordo vinculante condicional anunciado em 30/06/2026 para vender a maior parte da cadeia de alumínio (Worsley Alumina 86%, Hillside Aluminium 100%, MRN bauxita 33%, Brazil Alumina 36%, Brazil Aluminium 40%) à Alcoa por até US$ 5,6 bilhões (US$ 3,1 bi em caixa + ~US$ 1,0 bi em ações Alcoa + assunção de US$ 750 milhões em dívida líquida/leasing + até US$ 750 milhões em CVR ligado a preços) mais ~US$ 1,2 bilhão em provisões de reabilitação [PR-Alcoa]. Mozal Aluminium (Moçambique) está EXCLUÍDA da transação e segue em care & maintenance [PR-Alcoa]. Fechamento (closing) previsto para o 2º semestre do FY27 (1S calendário 2027), sujeito a aprovação de acionistas e órgãos reguladores — **ainda não fechado**, importante não confundir assinatura do acordo (30/06) com conclusão da venda.","conference_call_summary":"Não localizada teleconferência associada a este relatório de produção trimestral (padrão da South32 é teleconferência apenas nos resultados semestrais/anuais). Nenhuma citação direta de executivo sobre este relatório específico foi localizada nesta varredura — sinalizado para verificação futura.","commodity_commentary":"Cobertura de imprensa internacional de primeira linha (Bloomberg/Reuters/FT) localizada nesta varredura refere-se especificamente ao anúncio do acordo com a Alcoa em 30/06/2026, não ao relatório de produção de hoje (20/07): a Bloomberg noticiou que a Alcoa \"aposta em boom do alumínio\" com acordo de até US$ 5,6 bilhões pelos ativos da South32, pagando US$ 3,1 bilhões em caixa e ~US$ 1 bilhão em ações, além de assumir US$ 750 milhões em dívida [Bloomberg, 30/06]. Para comentário especificamente sobre o relatório de produção divulgado hoje, a imprensa financeira australiana registrou reação positiva: ações da South32 subiram no pregão de 20/07/2026 após resultado operacional forte do trimestre de junho combinado com avanço do negócio com a Alcoa, descrito como \"resultado histórico\" (landmark deal) [Motley Fool Australia]. A Australian Mining destacou que a companhia entrega resultados operacionais sólidos em meio à reestruturação de portfólio, com Sierra Gorda e manganês superando guidance e avanço em Hermosa [Australian Mining]. Não foi localizada nesta varredura matéria da Bloomberg/Reuters/FT publicada especificamente em 20/07/2026 sobre este relatório trimestral — sinalizado como lacuna abaixo."},"generated_by":"claude-research","generated_at":"2026-07-20T00:00:00Z","status":"summarized","note_for_reviewer":"Acesso direto ao PDF do relatório em south32.net e à página do Investegate retornou erro 403 nesta sessão (bloqueio de rede/proxy) — dados reconstruídos via agregadores que citam o release primário. LACUNA IMPORTANTE: não foi localizada cobertura de Bloomberg/Reuters/FT publicada especificamente sobre o relatório de produção de 20/07/2026 (toda cobertura de tier 1 encontrada é sobre o anúncio do acordo com a Alcoa em 30/06/2026, um evento relacionado mas distinto); commodity_commentary usa fallback de imprensa financeira australiana (Motley Fool Australia, Australian Mining) para o evento de hoje, conforme regra do painel. Números de produção trimestral absolutos por ativo (toneladas exatas de Worsley, Hillside, GEMCO, Illawarra, Hermosa no trimestre) não foram confirmados em base numérica — apenas variações percentuais vs. guidance foram encontradas nesta varredura; recomenda-se puxar o PDF oficial para números absolutos antes de decisão de in
